<html lang="ja">
<head>

  <script>
    const _originalRequire = window.require;
    window.require = function(moduleName) {
      if (moduleName === 'react') return window.React;
      if (moduleName === 'react-dom') return window.ReactDOM;

</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    const lucide = window.lucideReact || window.LucideReact || window.lucide || {};
    const { 
      MapPin, Plus, ListTodo, Clock, CheckCircle2, 
      X, Search, Edit3, Trash2, Crosshair, Upload,
      ChevronLeft, ChevronRight, FileText, Loader2, 
      Kanban, Layout, GripVertical, ExternalLink, BarChartHorizontal,
      Cloud, User, Stamp, Settings, Highlighter, PanelLeftClose, PanelLeft,
      Minus, Download, ChevronDown, Undo, Redo, Ruler, Maximize, Hexagon,
      Printer, Layers, Eye, EyeOff, Tag, Camera, Save, AlertTriangle, Image: ImageIcon,
      Map: MapIcon, PenLine, PenTool, History, MessageSquare, Send,
      FolderUp, FolderDown, Sun, SlidersHorizontal, MousePointerClick, MoreVertical,
      FilePlus, CalendarDays, FileSpreadsheet, CalendarPlus, RefreshCw
    } = lucide;

    const getToday = (offset = 0) => {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    };

    const getNow = () => {
      const d = new Date();
      const pad = (n) => n.toString().padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    const formatArea = (areaPx2, ratio, unit, isCalibrated) => {
      let actualRatio = isCalibrated ? ratio : 1;
      let actualUnit = isCalibrated ? unit : 'mm';
      let area = areaPx2 * (actualRatio ** 2);
      
      if (actualUnit === 'mm') {
        if (area >= 1000000) return `${(area / 1000000).toFixed(2)} ㎡`;
        if (area >= 100) return `${(area / 100).toFixed(2)} c㎡`;
        return `${area.toFixed(1)} m㎡`;
      } else if (actualUnit === 'cm') {
        if (area >= 10000) return `${(area / 10000).toFixed(2)} ㎡`;
        return `${area.toFixed(1)} c㎡`;
      } else if (actualUnit === 'm') {
        return `${area.toFixed(2)} ㎡`;
      }
      return `${Math.round(area)} px²`;
    };

    const INPUT_CLASS = "w-full px-3 py-2 border border-gray-300 rounded-md focus:border-black focus:ring-1 focus:ring-black outline-none text-sm transition-all bg-white font-medium";

    const MARKER_COLORS = [
      { id: 'primary', stroke: '#0067a6', name: '深藍' },
      { id: 'secondary', stroke: '#00abd8', name: '淺藍' },
      { id: 'success', stroke: '#008972', name: '碧綠' },
      { id: 'warning', stroke: '#efc028', name: '銘黃' },
      { id: 'danger', stroke: '#f2572d', name: '橘紅' },
      { id: 'black', stroke: '#000000', name: '黑色' },
      { id: 'white', stroke: '#ffffff', name: '白色' },
    ];

    const INITIAL_USERS = [
      { id: 'u1', name: '王小明', avatar: 'https://i.pravatar.cc/150?u=11' },
      { id: 'u2', name: '李大華', avatar: 'https://i.pravatar.cc/150?u=22' },
      { id: 'u3', name: '陳建志', avatar: 'https://i.pravatar.cc/150?u=33' }
    ];

    const INITIAL_TAGS = [
      { id: 'tg1', name: '水電' },
      { id: 'tg2', name: '泥作' },
      { id: 'tg3', name: '消防' },
      { id: 'tg4', name: '木作' }
    ];

    const STATUS_CONFIG = {
      'todo': { label: '待辦', color: 'bg-brand-danger', bgColor: 'bg-brand-danger/10', textColor: 'text-brand-danger', icon: ListTodo },
      'in-progress': { label: '進行中', color: 'bg-brand-warning', bgColor: 'bg-brand-warning/20', textColor: 'text-brand-warningDark', icon: Clock },
      'done': { label: '已完成', color: 'bg-brand-success', bgColor: 'bg-brand-success/10', textColor: 'text-brand-success', icon: CheckCircle2 },
    };

    const INITIAL_STAMPS = [
      { id: 'st1', code: 'W-01', title: '壁面漏水', description: '發現牆面有不正常水痕或滲漏狀況，請相關人員進行管線或防水層查驗。' },
      { id: 'st2', code: 'E-01', title: '機電干涉', description: '管線、插座或照明位置與結構體/木作有干涉，需重新檢討圖面。' },
      { id: 'st3', code: 'F-01', title: '表面受損', description: '地板、牆面或設備表面有刮傷或破損，需安排修補或更換。' }
    ];

    const INITIAL_TASKS = [
      { id: '1', type: 'pin', title: '主臥室管線確認', description: '冷氣排水管似乎與柱子干擾，請機電人員確認。', status: 'done', x: 35.5, y: 42.1, page: 1, startDate: getToday(-5), endDate: getToday(-2), assigneeId: 'u1', tagId: 'tg1', attachments: [], history: [{ date: '2026-03-25 09:00', message: '任務建立' }, { date: '2026-03-27 14:30', message: '狀態由「進行中」變更為「已完成」' }], comments: [{id: 'c1', userId: 'u2', text: '請問這個問題有確認了嗎 @王小明？', date: '2026-03-26 10:15'}, {id: 'c2', userId: 'u1', text: '已經確認並修改圖面囉。', date: '2026-03-27 14:25'}] },
      { id: '2', type: 'stamp', stampCode: 'W-01', title: '壁面漏水', description: '發現牆面有不正常水痕或滲漏狀況，請相關人員進行管線或防水層查驗。', status: 'in-progress', x: 65.2, y: 55.4, page: 1, startDate: getToday(-1), endDate: getToday(2), assigneeId: 'u2', tagId: 'tg2', attachments: [], history: [{ date: '2026-03-31 10:15', message: '任務建立' }, { date: '2026-04-01 08:20', message: '狀態由「待辦」變更為「進行中」' }], comments: [] },
      { id: '3', type: 'cloud', title: '牆面裂縫修補', description: '此範圍內的牆面裂縫需要進行修補作業。', status: 'todo', x: 10, y: 65, width: 25, height: 18, page: 1, startDate: getToday(2), endDate: getToday(5), assigneeId: 'u3', tagId: 'tg2', attachments: [], isInverted: false, history: [{ date: getNow(), message: '任務建立' }], comments: [] },
      { id: '4', type: 'highlight', colorId: 'warning', title: '確認弱電走線', description: '請再次確認這段走廊の弱電線槽配置，確認是否有足夠空間。', status: 'done', x: 45, y: 15, width: 35, height: 10, page: 1, points: [{x: 0, y: 5}, {x: 15, y: 0}, {x: 25, y: 8}, {x: 35, y: 10}], startDate: getToday(-3), endDate: getToday(0), assigneeId: 'u1', tagId: 'tg1', attachments: [], history: [{ date: getNow(), message: '任務建立' }], comments: [] },
      { id: '5', type: 'pen', colorId: 'danger', title: '新增管線路徑', description: '建議以此路線重新配置消防管線。', status: 'todo', x: 20, y: 30, width: 20, height: 20, page: 1, points: [{x: 0, y: 0}, {x: 10, y: 5}, {x: 15, y: 15}, {x: 20, y: 20}], startDate: getToday(), endDate: getToday(2), assigneeId: 'u2', tagId: 'tg3', attachments: [], history: [{ date: getNow(), message: '任務建立' }], comments: [] },
      { id: '6', type: 'pin', title: '油漆修補', description: '角落有掉漆現象。', status: 'todo', x: 15, y: 40, page: 1, startDate: getToday(1), endDate: getToday(3), assigneeId: 'unassigned', tagId: 'tg2', attachments: [], history: [], comments: [] }
    ];

    const INITIAL_SNAPSHOTS = [
      {
        id: 'snap_demo_1',
        name: '2026-04-01 初驗版',
        date: '2026-04-01',
        tasks: INITIAL_TASKS.map(t => ({ ...t, status: 'todo' })) 
      }
    ];

    const UserAvatar = ({ user, size = 'w-5 h-5', iconSize = 12 }) => {
      const safeUser = user || { name: '未指派', avatar: null };
      return safeUser.avatar ? (
        <img src={safeUser.avatar} alt={safeUser.name} className={`${size} rounded-full border border-gray-200 object-cover`} />
      ) : (
        <div className={`${size} rounded-full bg-gray-100 flex items-center justify-center text-gray-400 border border-gray-200`}><User size={iconSize} /></div>
      );
    };

    const StatusBadge = ({ status }) => {
      const config = STATUS_CONFIG[status];
      const Icon = config?.icon || ListTodo;
      return (
        <span className={`text-[11px] font-bold px-2 py-0.5 rounded-sm flex items-center gap-1 ${config?.bgColor} ${config?.textColor}`}>
          <Icon size={12} /> {config?.label}
        </span>
      );
    };

    const TaskIcon = ({ type, colorId, size = 14, className = "" }) => {
      const markerColor = MARKER_COLORS.find(c => c.id === colorId)?.stroke || '#efc028';
      if (type === 'area') return <Hexagon size={size} className={`text-brand-primary flex-shrink-0 ${className}`} />;
      if (type === 'highlight') return <Highlighter size={size} color={markerColor} className={`flex-shrink-0 ${className}`} />;
      if (type === 'pen') return <PenLine size={size} color={markerColor} className={`flex-shrink-0 ${className}`} /> || <Edit3 size={size} color={markerColor} className={`flex-shrink-0 ${className}`} />;
      if (type === 'cloud') return <Cloud size={size} className={`text-gray-500 flex-shrink-0 ${className}`} />;
      if (type === 'stamp') return <Stamp size={size} className={`text-brand-danger flex-shrink-0 ${className}`} />; 
      return <MapPin size={size} className={`text-gray-400 flex-shrink-0 ${className}`} />;
    };

    const TaskTooltip = ({ task }) => (
      <div className="absolute top-full mt-2 left-1/2 -translate-x-1/2 w-48 p-2.5 bg-black text-white text-xs rounded-md shadow-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-50">
        <div className="font-bold truncate leading-tight">{task.title}</div>
        <div className="text-gray-400 truncate mt-1 text-[10px]">{STATUS_CONFIG[task.status]?.label}</div>
        {task.attachments && task.attachments.length > 0 && (
          <div className="flex items-center gap-1 text-gray-400 mt-1 text-[10px]">
            <ImageIcon size={10} /> 附 {task.attachments.length} 張照片
          </div>
        )}
      </div>
    );

    const FormField = ({ label, children }) => (
      <div>
        <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">{label}</label>
        {children}
      </div>
    );

    const CloudMark = ({ task, isActive, onClick, onContextMenu }) => {
      const [size, setSize] = useState({ w: 0, h: 0 });
      const ref = useRef();
      useEffect(() => {
        if (!ref.current) return;
        const observer = new ResizeObserver(entries => setSize({ w: entries[0].contentRect.width, h: entries[0].contentRect.height }));
        observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
      const getCloudPath = (w, h, inverted) => {
        if (w <= 0 || h <= 0) return "";
        const r = 10, step = r * 1.5;
        const sweep = inverted ? 1 : 0;
        let path = `M ${Math.min(r, w)} 0`;
        for (let x = Math.min(r, w); x < w; x += step) path += ` A ${r} ${r} 0 0 ${sweep} ${Math.min(x + step, w)} 0`;
        for (let y = 0; y < h; y += step) path += ` A ${r} ${r} 0 0 ${sweep} ${w} ${Math.min(y + step, h)}`;
        for (let x = w; x > 0; x -= step) path += ` A ${r} ${r} 0 0 ${sweep} ${Math.max(x - step, 0)} ${h}`;
        for (let y = h; y > 0; y -= step) {
           let ny = Math.max(y - step, 0);
           path += ny === 0 ? ` A ${r} ${r} 0 0 ${sweep} 0 0 A ${r} ${r} 0 0 ${sweep} ${Math.min(r, w)} 0` : ` A ${r} ${r} 0 0 ${sweep} 0 ${ny}`;
        }
        return path;
      };
      const colorMap = { 'bg-brand-danger': '#f2572d', 'bg-brand-warning': '#efc028', 'bg-brand-success': '#008972' };
      const strokeColor = colorMap[STATUS_CONFIG[task.status]?.color] || '#f2572d';
      return (
        <div ref={ref} className={`absolute cursor-pointer group ${isActive ? 'z-30' : 'z-10'}`} style={{ left: `${task.x}%`, top: `${task.y}%`, width: `${task.width}%`, height: `${task.height}%` }} onClick={(e) => { e.stopPropagation(); onClick(); }} onContextMenu={onContextMenu}>
          {isActive && <span className={`absolute -inset-2 rounded opacity-20 animate-pulse ${STATUS_CONFIG[task.status]?.color}`}></span>}
          <svg width="100%" height="100%" style={{ overflow: 'visible' }} className="relative z-10 pointer-events-none">
            <path d={getCloudPath(size.w, size.h, task.isInverted)} fill={isActive ? `${strokeColor}22` : 'transparent'} stroke={strokeColor} strokeWidth={isActive ? "4" : "2.5"} strokeLinecap="round" strokeLinejoin="round" className="transition-all duration-300 drop-shadow-sm" />
          </svg>
          <TaskTooltip task={task} />
        </div>
      );
    };

    const HighlightMark = ({ task, isActive, onClick, onContextMenu }) => {
      const markerColor = MARKER_COLORS.find(c => c.id === task.colorId) || MARKER_COLORS[0];
      const pts = task.points.map(p => `${p.x},${p.y}`).join(' ');
      return (
        <div className={`absolute cursor-pointer group ${isActive ? 'z-30' : 'z-10'}`} style={{ left: `${task.x}%`, top: `${task.y}%`, width: `${task.width}%`, height: `${task.height}%` }} onClick={(e) => { e.stopPropagation(); onClick(); }} onContextMenu={onContextMenu}>
          {isActive && <span className={`absolute -inset-2 rounded opacity-20 animate-pulse ${STATUS_CONFIG[task.status]?.color}`}></span>}
          <svg viewBox={`0 0 ${task.width} ${task.height}`} preserveAspectRatio="none" width="100%" height="100%" style={{ overflow: 'visible' }} className="relative z-10 pointer-events-none">
            <polyline points={pts} fill="none" stroke={markerColor.stroke} strokeWidth="12" strokeLinecap="round" strokeLinejoin="round" opacity="0.6" vectorEffect="non-scaling-stroke" className={isActive ? "brightness-110 drop-shadow-md" : ""} />
            <polyline points={pts} fill="none" stroke="transparent" strokeWidth="24" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" className="pointer-events-auto" />
          </svg>
          <TaskTooltip task={task} />
        </div>
      );
    };

    const PenMark = ({ task, isActive, onClick, onContextMenu }) => {
      const markerColor = MARKER_COLORS.find(c => c.id === task.colorId) || MARKER_COLORS[0];
      const pts = task.points.map(p => `${p.x},${p.y}`).join(' ');
      return (
        <div className={`absolute cursor-pointer group ${isActive ? 'z-30' : 'z-10'}`} style={{ left: `${task.x}%`, top: `${task.y}%`, width: `${task.width}%`, height: `${task.height}%` }} onClick={(e) => { e.stopPropagation(); onClick(); }} onContextMenu={onContextMenu}>
          {isActive && <span className={`absolute -inset-2 rounded opacity-20 animate-pulse ${STATUS_CONFIG[task.status]?.color}`}></span>}
          <svg viewBox={`0 0 ${task.width} ${task.height}`} preserveAspectRatio="none" width="100%" height="100%" style={{ overflow: 'visible' }} className="relative z-10 pointer-events-none">
            <polyline points={pts} fill="none" stroke={markerColor.stroke} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" className={isActive ? "brightness-110 drop-shadow-md" : ""} />
            <polyline points={pts} fill="none" stroke="transparent" strokeWidth="16" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" className="pointer-events-auto" />
          </svg>
          <TaskTooltip task={task} />
        </div>
      );
    };

    const AreaMark = ({ task, isActive, onClick, onContextMenu }) => {
      const colorMap = { 'bg-brand-danger': '#f2572d', 'bg-brand-warning': '#efc028', 'bg-brand-success': '#008972' };
      const strokeColor = colorMap[STATUS_CONFIG[task.status]?.color] || '#0067a6';
      const pts = task.points.map(p => `${p.x},${p.y}`).join(' ');
      return (
        <div className={`absolute cursor-pointer group ${isActive ? 'z-30' : 'z-10'}`} style={{ left: `${task.x}%`, top: `${task.y}%`, width: `${task.width}%`, height: `${task.height}%` }} onClick={(e) => { e.stopPropagation(); onClick(); }} onContextMenu={onContextMenu}>
          {isActive && <span className={`absolute -inset-2 rounded opacity-20 animate-pulse ${STATUS_CONFIG[task.status]?.color}`}></span>}
          <svg viewBox={`0 0 ${task.width} ${task.height}`} preserveAspectRatio="none" width="100%" height="100%" style={{ overflow: 'visible' }} className="relative z-10 pointer-events-none">
            <polygon points={pts} fill={strokeColor} fillOpacity="0.2" stroke={strokeColor} strokeWidth="2" strokeDasharray="4,4" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" className={isActive ? "brightness-110 drop-shadow-md" : ""} />
            <polygon points={pts} fill="transparent" stroke="transparent" strokeWidth="24" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" className="pointer-events-auto" />
          </svg>
          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none font-bold text-white text-[10px] drop-shadow-md bg-black/60 px-1.5 py-0.5 rounded whitespace-nowrap opacity-90">
            {task.area}
          </div>
          <TaskTooltip task={task} />
        </div>
      );
    };

    const PinMark = ({ task, isActive, onClick, onContextMenu }) => {
      const statusColor = STATUS_CONFIG[task.status]?.color || 'bg-gray-500';
      return (
        <div className="absolute transform -translate-x-1/2 -translate-y-1/2 group pointer-events-auto" style={{ left: `${task.x}%`, top: `${task.y}%` }} onClick={(e) => { e.stopPropagation(); onClick(); }} onContextMenu={onContextMenu}>
          <div className={`relative flex items-center justify-center cursor-pointer transition-transform duration-300 ${isActive ? 'scale-125 z-30' : 'scale-100 z-10 hover:scale-110'}`}>
            {isActive && <span className={`absolute inline-flex h-full w-full rounded-full opacity-50 animate-ping ${statusColor}`}></span>}
            <div className={`relative flex items-center justify-center w-7 h-7 rounded-full shadow-sm text-white border-2 border-white ${statusColor}`}>
              <MapPin size={14} fill="currentColor" className="text-white/30" />
            </div>
            <TaskTooltip task={task} />
          </div>
        </div>
      );
    };

    const StampMark = ({ task, isActive, onClick, onContextMenu }) => (
      <div className="absolute transform -translate-x-1/2 -translate-y-1/2 group pointer-events-auto" style={{ left: `${task.x}%`, top: `${task.y}%` }} onClick={(e) => { e.stopPropagation(); onClick(); }} onContextMenu={onContextMenu}>
        <div className={`relative flex items-center justify-center cursor-pointer transition-transform duration-300 ${isActive ? 'scale-110 z-30' : 'scale-100 z-10 hover:scale-105'}`}>
          <div className={`border-2 border-brand-danger text-brand-danger bg-white font-bold px-1.5 py-0.5 rounded-sm shadow-sm text-[11px] whitespace-nowrap tracking-wider ${isActive ? 'ring-2 ring-brand-danger/50 shadow-md' : ''}`}>
            [{task.stampCode}]
          </div>
          <TaskTooltip task={task} />
        </div>
      </div>
    );

    // --- Main App ---
    function App() {
      const [appView, setAppView] = useState('blueprint'); 
      
      const [tasks, setTasks] = useState(INITIAL_TASKS);
      const [snapshots, setSnapshots] = useState(INITIAL_SNAPSHOTS);
      const [activeSnapshotId, setActiveSnapshotId] = useState(null); 
      const [newSnapshotName, setNewSnapshotName] = useState('');
      
      const [pastTasks, setPastTasks] = useState([]);
      const [futureTasks, setFutureTasks] = useState([]);

      const [stamps, setStamps] = useState(INITIAL_STAMPS); 
      const [users, setUsers] = useState(INITIAL_USERS); 
      const [tags, setTags] = useState(INITIAL_TAGS);
      const [activeTaskId, setActiveTaskId] = useState(null);
      
      const [currentUserId, setCurrentUserId] = useState(INITIAL_USERS[0].id);
      const [addMode, setAddMode] = useState('none'); 
      const [activeColor, setActiveColor] = useState(MARKER_COLORS[0]);

      const [isDrawing, setIsDrawing] = useState(false);
      const [drawStart, setDrawStart] = useState(null);

          setFormData({ title: defaultStamp?.title || '', description: defaultStamp?.description || '', stampCode: defaultStamp?.code || '', ...baseData });
          setEditingId(null); setShowTaskModal(true); setAddMode('none');
        } else if (addMode === 'cloud' || addMode === 'measure' || addMode === 'calibrate') {
          setIsDrawing(true); setDrawStart({ x, y }); setDrawCurrent({ x, y });
        } else if (addMode === 'area') {
          if (!isDrawing) {
            setIsDrawing(true);
            setDrawPoints([{ x, y }]);
            setDrawCurrent({ x, y });
          } else {
            const firstPt = drawPoints[0];
            const dist = Math.hypot(x - firstPt.x, y - firstPt.y);
            if (drawPoints.length >= 3 && dist < 3) {
              const finalPoints = [...drawPoints];
              const xs = finalPoints.map(p => p.x), ys = finalPoints.map(p => p.y), minX = Math.min(...xs), minY = Math.min(...ys);
              const width = Math.max(...xs) - minX, height = Math.max(...ys) - minY;
              
              if (width < 0.5 && height < 0.5) {
                 setIsDrawing(false); setDrawPoints([]); setDrawCurrent(null); return;
              }

              let areaPx2 = 0;
              for (let i = 0; i < finalPoints.length; i++) {
                  const j = (i + 1) % finalPoints.length;
                  areaPx2 += (finalPoints[i].x * 12) * (finalPoints[j].y * 12) - (finalPoints[j].x * 12) * (finalPoints[i].y * 12);
              }
              areaPx2 = Math.abs(areaPx2) / 2;
              const areaStr = formatArea(areaPx2, scaleInfo.ratio, scaleInfo.unit, scaleInfo.isCalibrated);
              
              setAreaResult({ points: finalPoints, area: areaStr });
              setIsDrawing(false); setDrawPoints([]); setDrawCurrent(null); setAddMode('none');
            } else {
              setDrawPoints(prev => [...prev, { x, y }]);
            }
          }
        } else if (addMode === 'highlight' || addMode === 'pen') {
          setIsDrawing(true); setDrawPoints([{ x, y }]);
        }
      };

      const handleContentPointerMove = (e) => {
        if (!isDrawing || activePointers.current.size >= 2 || isSpacePressed || isPanning || isReadOnly) return;
        const rect = e.currentTarget.getBoundingClientRect();
        let x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        let y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));

        if (e.shiftKey) {
          if (addMode === 'measure' || addMode === 'calibrate') {
            if (drawStart) {
              const dx = x - drawStart.x; const dy = y - drawStart.y;
              const absDx = Math.abs(dx); const absDy = Math.abs(dy);
              if (absDx > absDy * 2) y = drawStart.y; 
              else if (absDy > absDx * 2) x = drawStart.x; 
              else { const avg = (absDx + absDy) / 2; x = drawStart.x + Math.sign(dx) * avg; y = drawStart.y + Math.sign(dy) * avg; }
            }
          } else {
            const snapGrid = 0.5; 
            x = Math.round(x / snapGrid) * snapGrid; y = Math.round(y / snapGrid) * snapGrid;
          }
        }

        if ((addMode === 'cloud' || addMode === 'measure' || addMode === 'calibrate') && drawStart) setDrawCurrent({ x, y });
        else if (addMode === 'area') setDrawCurrent({ x, y });
        else if (addMode === 'highlight' || addMode === 'pen') setDrawPoints(prev => { const last = prev[prev.length - 1]; if (last && last.x === x && last.y === y) return prev; return [...prev, { x, y }]; });
      };

      const handleContentPointerUp = (e) => {
        if (!isDrawing || activePointers.current.size >= 2 || isSpacePressed || isPanning || isReadOnly) return;
        
        if (addMode === 'area') return; 

        setIsDrawing(false);
        const baseData = { type: addMode, colorId: activeColor.id, title: '', description: '', status: 'todo', startDate: getToday(), endDate: getToday(1), assigneeId: 'unassigned', stampCode: '', tagId: 'none', attachments: [], history: [], comments: [] };

        if (addMode === 'cloud' && drawStart && drawCurrent) {
          const width = Math.abs(drawCurrent.x - drawStart.x), height = Math.abs(drawCurrent.y - drawStart.y);
          if (width < 1 || height < 1) { setDrawStart(null); setDrawCurrent(null); return; }
          const newTask = { id: Date.now().toString(), type: 'cloud', x: Math.min(drawStart.x, drawCurrent.x), y: Math.min(drawStart.y, drawCurrent.y), width, height, page: currentPage, isInverted: drawCurrent.x < drawStart.x, ...baseData, title: '雲狀線標記', history: [{ date: getNow(), message: '任務建立' }] };
          updateTasks([...tasks, newTask]); setActiveTaskId(newTask.id);
          setEditingId(null); setAddMode('none'); setDrawStart(null); setDrawCurrent(null);
        } 
        else if (addMode === 'calibrate' && drawStart && drawCurrent) {
          const logicalDist = Math.hypot((drawCurrent.x - drawStart.x) * 12, (drawCurrent.y - drawStart.y) * 12);
          if (logicalDist > 1) { setCalibrateData({ logicalDist }); setShowCalibrateModal(true); }
          setDrawStart(null); setDrawCurrent(null); setAddMode('none');
        }
        else if (addMode === 'measure' && drawStart && drawCurrent) {
          const logicalDist = Math.hypot((drawCurrent.x - drawStart.x) * 12, (drawCurrent.y - drawStart.y) * 12);
          const distance = scaleInfo.isCalibrated ? +(logicalDist * scaleInfo.ratio).toFixed(1) : Math.round(logicalDist);
          setMeasureResult({ p1: drawStart, p2: drawCurrent, distance, unit: scaleInfo.isCalibrated ? scaleInfo.unit : 'mm' });
          setDrawStart(null); setDrawCurrent(null);
        }
        else if ((addMode === 'highlight' || addMode === 'pen') && drawPoints.length >= 2) {
          const xs = drawPoints.map(p => p.x), ys = drawPoints.map(p => p.y), minX = Math.min(...xs), minY = Math.min(...ys);
          const width = Math.max(...xs) - minX, height = Math.max(...ys) - minY;
          if (width < 0.5 && height < 0.5) { setDrawPoints([]); return; }
          const relativePoints = drawPoints.map(p => ({ x: p.x - minX, y: p.y - minY }));

          const safeWidth = Math.max(width, 0.1);
          const safeHeight = Math.max(height, 0.1);

          const newTask = { id: Date.now().toString(), type: addMode, x: minX, y: minY, width: safeWidth, height: safeHeight, points: relativePoints, page: currentPage, colorId: activeColor.id, ...baseData, title: addMode === 'highlight' ? '螢光筆標記' : '色筆標記', history: [{ date: getNow(), message: '任務建立' }] };
          updateTasks([...tasks, newTask]); setActiveTaskId(newTask.id);
          setEditingId(null); setAddMode('none'); setDrawPoints([]);
        }
      };

      const handlePhotoUpload = (e) => {
        if (isReadOnly) return;
        const files = Array.from(e.target.files);
        if (!files.length) return;
        
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            setFormData(prev => ({
              ...prev,
              attachments: [...(prev.attachments || []), ev.target.result]
            }));
          };
          reader.readAsDataURL(file);
        });
      };

      const handleCommentChange = (e) => {
        const val = e.target.value;
        setCommentText(val);
        
        const cursorP = e.target.selectionStart;
        const textBeforeCursor = val.slice(0, cursorP);
        const match = textBeforeCursor.match(/@(\S*)$/);
        
        if (match) {
          setShowMentionPopup(true);
          setMentionFilter(match[1]);
        } else {
          setShowMentionPopup(false);
        }
      };

      const insertMention = (userName) => {
        const cursorP = commentInputRef.current.selectionStart;
        const textBeforeCursor = commentText.slice(0, cursorP);
        const textAfterCursor = commentText.slice(cursorP);
        
        const newTextBefore = textBeforeCursor.replace(/@\S*$/, `@${userName} `);
        setCommentText(newTextBefore + textAfterCursor);
        setShowMentionPopup(false);
        setTimeout(() => commentInputRef.current?.focus(), 0);
      };

      const handleAddComment = () => {
        if (!commentText.trim() || isReadOnly) return;
        const newComment = {
          id: `c_${Date.now()}`,
          userId: currentUserId,
          text: commentText.trim(),
          date: getNow()
        };
        setFormData(prev => ({
          ...prev,
          comments: [...(prev.comments || []), newComment]
        }));
        setCommentText('');
        setShowMentionPopup(false);
      };

      const renderCommentText = (text, isMe) => {
        const parts = text.split(/(@\S+)/g);
        return parts.map((part, i) => {
          if (part.startsWith('@')) {
            const name = part.slice(1);
            const isUser = users.some(u => u.name === name);
            if (isUser) {
              return (
                <span 
                  key={i} 
                  className={`font-bold px-1 rounded mx-0.5 ${isMe ? 'bg-white/25 text-white shadow-sm' : 'text-brand-secondary bg-brand-secondary/10 border border-brand-secondary/20'}`}
                >
                  {part}
                </span>
              );
            }
          }
          return <span key={i}>{part}</span>;
        });
      };

      const handleSaveTask = () => {
        if (isReadOnly || !formData.title.trim()) return;
        const safeData = { ...formData, endDate: new Date(formData.startDate) > new Date(formData.endDate) ? formData.startDate : formData.endDate };
        
        if (editingId) {
          const oldTask = tasks.find(t => t.id === editingId);
          let newHistory = [...(oldTask.history || [])];
          if (oldTask.status !== safeData.status) {
            newHistory.push({ date: getNow(), message: `狀態由「${STATUS_CONFIG[oldTask.status]?.label}」變更為「${STATUS_CONFIG[safeData.status]?.label}」` });
          }
          if (oldTask.assigneeId !== safeData.assigneeId) {
            const oldUser = users.find(u => u.id === oldTask.assigneeId)?.name || '未指派';
            const newUser = users.find(u => u.id === safeData.assigneeId)?.name || '未指派';
            newHistory.push({ date: getNow(), message: `經手人由「${oldUser}」變更為「${newUser}」` });
          }
          updateTasks(tasks.map(t => t.id === editingId ? { ...t, ...safeData, history: newHistory } : t));
        } else {
          const newTask = { id: Date.now().toString(), ...newTaskCoords, ...safeData, history: [{ date: getNow(), message: '任務建立' }] };
          updateTasks([...tasks, newTask]); setActiveTaskId(newTask.id);
        }
        setShowTaskModal(false);
        setCommentText('');
      };

      const openEditModal = (task) => {
        setFormData({ 
          type: task.type, colorId: task.colorId || 'warning', title: task.title, description: task.description, status: task.status, 
          startDate: task.startDate || getToday(), endDate: task.endDate || getToday(1), assigneeId: task.assigneeId || 'unassigned', 
          stampCode: task.stampCode || '', tagId: task.tagId || 'none', attachments: task.attachments || [], history: task.history || [], comments: task.comments || []
        });
        setEditingId(task.id); setShowTaskModal(true);
        setCommentText('');
      };

      const jumpToBlueprintTask = (task) => {
        setAppView('blueprint'); if (task.page !== currentPage) setCurrentPage(task.page); setActiveTaskId(task.id);
        if (viewportRef.current) setPan({ x: (viewportRef.current.clientWidth / 2) - ((task.x / 100) * 1200 * scale), y: (viewportRef.current.clientHeight / 2) - ((task.y / 100) * 1200 * scale) });
      };

      const handleExportCSV = () => {
        if (filteredTasks.length === 0) return alert("目前沒有可匯出的任務資料！");
        const headers = ['任務名稱', '任務類型', '印章編號', '狀態', '工種/標籤', '經手人', '所在頁數', '開始日期', '結束日期', '照片數量', '詳細說明'];
        const rows = filteredTasks.map(task => [
          `"${task.title}"`, `"${task.type === 'stamp' ? '印章' : task.type === 'cloud' ? '雲形' : task.type === 'area' ? '面積' : task.type === 'highlight' ? '螢光筆' : task.type === 'pen' ? '色筆' : '圖釘'}"`, `"${task.stampCode || ''}"`,
          `"${STATUS_CONFIG[task.status].label}"`, `"${tags.find(t => t.id === task.tagId)?.name || '無標籤'}"`, `"${users.find(u => u.id === task.assigneeId)?.name || '未指派'}"`, `"${`P.${task.page}`}"`, `"${task.startDate}"`, `"${task.endDate}"`, `"${(task.attachments || []).length}"`, `"${String(task.description).replace(/"/g, '""')}"`
        ].join(','));
        const link = document.createElement('a');
        link.href = URL.createObjectURL(new Blob(['\uFEFF' + [headers.join(','), ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' }));
        link.download = `巡檢缺失報表_${getToday()}.csv`; link.click();
      };

      const handleExportGanttExcel = async () => {
        if (!window.ExcelJS) {
          alert("Excel 引擎載入中，請稍後再試。");
          return;
        }
        if (filteredTasks.length === 0) {
          alert("目前沒有任務可匯出！");
          return;
        }

        const workbook = new window.ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('專案進度表', {
          views: [{ state: 'frozen', xSplit: 3, ySplit: 3 }] 
        });

        const columns = [
          { width: 3 },  
          { width: 18 }, 
          { width: 35 }, 
        ];
        ganttData.days.forEach(() => columns.push({ width: 4.5 }));
        sheet.columns = columns;

        sheet.getCell('A1').value = `圖面任務進度表 (${getToday()})`;
        sheet.getCell('A1').font = { size: 14, bold: true };
        
        let currentMonth = -1;
        let monthStartCol = 4;
        ganttData.days.forEach((d, index) => {
          const colIdx = index + 4;
          if (d.getMonth() !== currentMonth) {
            if (currentMonth !== -1) {
               sheet.mergeCells(2, monthStartCol, 2, colIdx - 1);
               const cell = sheet.getCell(2, monthStartCol);
               cell.value = `${ganttData.days[monthStartCol-4].getFullYear()}年 ${currentMonth + 1}月`;
               cell.alignment = { horizontal: 'center', vertical: 'middle' };
            }
            currentMonth = d.getMonth();
            monthStartCol = colIdx;
          }
        });
        sheet.mergeCells(2, monthStartCol, 2, ganttData.days.length + 3);
        const lastMonthCell = sheet.getCell(2, monthStartCol);
        lastMonthCell.value = `${ganttData.days[monthStartCol-4].getFullYear()}年 ${currentMonth + 1}月`;
        lastMonthCell.alignment = { horizontal: 'center', vertical: 'middle' };

        sheet.getCell('B3').value = '分類 / 負責人';
        sheet.getCell('C3').value = '任務名稱';
        ganttData.days.forEach((d, index) => {
          const cell = sheet.getCell(3, index + 4);
          cell.value = d.getDate();
          cell.alignment = { horizontal: 'center' };
          if ([0, 6].includes(d.getDay())) {
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF3F4F6' } };
          }
        });

        sheet.getRow(2).font = { bold: true };
        sheet.getRow(3).font = { bold: true };
        sheet.getRow(3).border = { bottom: { style: 'thin', color: { argb: 'FF000000' } } };

        let currentRow = 4;
        ganttTasksByAssignee.forEach(group => {
          const groupRow = sheet.getRow(currentRow);
          groupRow.getCell(2).value = group.name;
          groupRow.font = { bold: true };
          groupRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF3F4F6' } };
          sheet.mergeCells(currentRow, 2, currentRow, 3);
          
          ganttData.days.forEach((d, index) => {
            if ([0, 6].includes(d.getDay())) {
               groupRow.getCell(index + 4).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF3F4F6' } };
            }
          });
          currentRow++;

          group.tasks.forEach(task => {
            const row = sheet.getRow(currentRow);
            row.getCell(3).value = task.title;

            const colorMap = {
              'todo': 'FFFAD1D1',
              'in-progress': 'FFFDF6B2',
              'done': 'FFDEF7EC'
            };
            const fillColor = colorMap[task.status] || 'FFEEEEEE';

            const sD = new Date(task.startDate + 'T00:00:00');
            const eD = new Date(task.endDate + 'T00:00:00');
            const durationDays = Math.round((eD - sD) / 86400000) + 1;
            
            let isFirstCell = true;
            ganttData.days.forEach((d, index) => {
              const colIdx = index + 4;
              const cell = row.getCell(colIdx);
              const dTime = d.getTime();

              if (dTime >= sD.getTime() && dTime <= eD.getTime()) {
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: fillColor } };
                if (isFirstCell) {
                  cell.value = ` ${STATUS_CONFIG[task.status]?.label} (${durationDays}天)`;
                  cell.font = { size: 9, color: { argb: 'FF555555' } };
                  isFirstCell = false;
                }
              } else if ([0, 6].includes(d.getDay())) {
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF9FAFB' } };
              }
            });

            currentRow++;
          });
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `專案進度表_${getToday()}.xlsx`;
        link.click();
      };

      const filteredTasks = useMemo(() => currentDisplayTasks.filter(task => {
        const matchSearch = [task.title, task.description, task.stampCode].some(val => val && val.toLowerCase().includes(filterQuery.toLowerCase()));
        const matchAssignee = filterAssignees.length === 0 || filterAssignees.includes(task.assigneeId);
        const matchPage = filterPage === 'all' || task.page.toString() === filterPage;
        const matchStatus = layerVisibility.statuses[task.status] !== false;
        const matchTag = task.tagId ? layerVisibility.tags[task.tagId] !== false : layerVisibility.tags['none'] !== false;
        return matchSearch && matchAssignee && matchPage && matchStatus && matchTag;
      }), [currentDisplayTasks, filterQuery, filterAssignees, filterPage, layerVisibility]);

      const ganttTasksByAssignee = useMemo(() => {
        const groups = {
          unassigned: { name: '未指派', tasks: [], user: null }
        };
        users.forEach(u => { groups[u.id] = { name: u.name, user: u, tasks: [] }; });
        
        filteredTasks.forEach(t => {
          if (groups[t.assigneeId]) {
            groups[t.assigneeId].tasks.push(t);
          } else {
            groups['unassigned'].tasks.push(t);
          }
        });

        Object.values(groups).forEach(g => {
          g.tasks.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
        });

        return Object.values(groups).filter(g => g.tasks.length > 0);
      }, [filteredTasks, users]);

      const ganttData = useMemo(() => {
        let minD = new Date(projectStartDate + 'T00:00:00');
        let maxD = new Date(projectEndDate + 'T00:00:00');
        
        if (isNaN(minD.getTime())) minD = new Date();
        if (isNaN(maxD.getTime())) maxD = new Date(minD.getTime() + 86400000 * 30);

        filteredTasks.forEach(t => { 
          const s = new Date(t.startDate + 'T00:00:00'); 
          const e = new Date(t.endDate + 'T00:00:00'); 
          if (s < minD) minD = s; 
          if (e > maxD) maxD = e; 
        });

        if (maxD < minD) maxD = new Date(minD.getTime() + 86400000);

        const totalDays = Math.ceil((maxD - minD) / 86400000) + 1;
        const days = Array.from({length: totalDays}, (_, i) => new Date(minD.getTime() + i * 86400000));
        
        return { minD, maxD, totalDays, days };
      }, [filteredTasks, projectStartDate, projectEndDate]);

      const filterStyle = {
        filter: `brightness(${imageFilters.brightness}%) contrast(${imageFilters.contrast}%) ${imageFilters.invert ? 'invert(100%) hue-rotate(180deg)' : ''} ${imageFilters.grayscale ? 'grayscale(100%)' : ''}`
      };

      const handleTaskContextMenu = (e, task) => {
        if (isReadOnly) return;
        e.preventDefault();
        e.stopPropagation();
        setContextMenu({ x: e.clientX, y: e.clientY, task });
        setActiveTaskId(task.id);
      };

      const changeTaskStatus = (taskId, newStatus) => {
        const task = tasks.find(t => t.id === taskId);
        if (task && task.status !== newStatus) {
           const newHistory = [...(task.history || []), { date: getNow(), message: `透過快速選單將狀態變更為「${STATUS_CONFIG[newStatus]?.label}」` }];
           updateTasks(tasks.map(t => t.id === taskId ? { ...t, status: newStatus, history: newHistory } : t)); 
        }
        setContextMenu(null);
      };

      // 導航按鈕 (純圖示)
      const NavButton = ({ view, icon: Icon, label }) => (
        <button 
          onClick={() => setAppView(view)} 
          title={label} 
          className={`p-2 rounded-lg transition-all flex items-center justify-center ${appView === view ? 'bg-white text-brand-primary shadow-sm border border-gray-200' : 'text-gray-500 hover:text-gray-900 hover:bg-gray-200/50 border border-transparent'}`}
        >
          <Icon size={20} />
        </button>
      );

      const ToolbarBtn = ({ mode, icon: Icon, title, onClick }) => (
        <button onClick={onClick || (() => setAddMode(addMode === mode ? 'none' : mode))} className={`flex items-center justify-center p-2 rounded-full transition-colors ${addMode === mode ? 'bg-black text-white shadow-md' : 'text-gray-600 hover:bg-gray-100 hover:text-black'}`} title={title}><Icon size={16} /></button>
      );

      useEffect(() => {
        if (appView === 'gantt' && ganttScrollRef.current && ganttData.days.length > 0) {
          const timer = setTimeout(() => {
            if (!ganttScrollRef.current) return;
            const todayStr = getToday();
            const todayDate = new Date(todayStr + 'T00:00:00');
            const minD = ganttData.minD;
            
            const daysDiff = Math.floor((todayDate - minD) / 86400000);
            
            if (daysDiff >= 0 && daysDiff < ganttData.totalDays) {
               const scrollContainer = ganttScrollRef.current;
               const leftSidebarWidth = 288;
               const dayWidth = 40; 
               
               const targetX = leftSidebarWidth + (daysDiff * dayWidth) + (dayWidth / 2);
               const scrollLeft = targetX - (scrollContainer.clientWidth / 2);
               
               scrollContainer.scrollTo({
                 left: Math.max(0, scrollLeft),
                 behavior: 'smooth'
               });
            }
          }, 100);
          return () => clearTimeout(timer);
        }
      }, [appView, ganttData]);

      return (
        <div className="flex flex-col h-screen w-full bg-white font-sans overflow-hidden text-gray-900 selection:bg-gray-200 relative">
          
          {isShiftPressedUI && appView === 'blueprint' && addMode !== 'none' && !isReadOnly && (
            <div className="absolute top-24 left-1/2 -translate-x-1/2 z-50 pointer-events-none mt-4">
              <div className="bg-brand-primary text-white text-xs px-3 py-1.5 rounded-full shadow-lg font-bold tracking-wider animate-pulse flex items-center gap-1.5">
                🔒 鎖點模式啟動 (正交 / 網格)
              </div>
            </div>
          )}

          {/* 新增專案確認 Modal */}
          {showConfirmNew && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/40 backdrop-blur-sm">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 overflow-hidden">
                <div className="p-6">
                  <h3 className="text-lg font-black flex items-center gap-2 text-brand-danger mb-3">
                    <AlertTriangle size={20} /> 警告：開啟新專案
                  </h3>
                  <p className="text-sm text-gray-600 mb-6 leading-relaxed">
                    您確定要開啟一個全新的專案嗎？<br/>
                    <span className="font-bold text-red-500">目前所有未備份的圖面、標記與設定都將被清除且無法復原！</span><br/><br/>
                    建議您先點擊「備份專案」將目前進度下載儲存。
                  </p>
                  <div className="flex justify-end gap-3">
                    <button onClick={() => setShowConfirmNew(false)} className="px-4 py-2 text-sm font-bold text-gray-700 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                      取消
                    </button>
                    <button 
                      onClick={() => {
                        setTasks([]);
                        setSnapshots([]);
                        setPastTasks([]);
                        setFutureTasks([]);
                        setActiveTaskId(null);
                        setMeasureResult(null);
                        setScaleInfo({ ratio: 1, unit: 'mm', isCalibrated: false });
                        setActiveSnapshotId(null);
                        setImageFilters({ brightness: 100, contrast: 100, invert: false, grayscale: false });
                        setBackgroundImage(null);
                        setPdfDocument(null);
                        setViewMode('image');
                        setProjectStartDate(getToday(-7));
                        setProjectEndDate(getToday(30));
                        setTags(INITIAL_TAGS);
                        setUsers(INITIAL_USERS);
                        setStamps(INITIAL_STAMPS);
                        setCurrentPage(1);
                        setTotalPages(1);
                        setAppView('blueprint');
                        resetView();
                        setShowConfirmNew(false);
                      }} 
                      className="px-4 py-2 text-sm font-bold text-white bg-brand-danger rounded-md hover:bg-brand-danger/90 transition-colors shadow-sm"
                    >
                      確定捨棄並開啟新專案
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* === 修改區塊：雙層選單設計 === */}
          <header className="bg-white flex flex-col z-50 flex-shrink-0 shadow-sm relative print:hidden">
            
            {/* 上方第一欄：標題、快照下拉、人員、搜尋過濾 */}
            <div className="px-6 py-3 flex justify-between items-center w-full border-b border-gray-200">
              <div className="flex items-center gap-3">
                <div className="bg-gradient-to-br from-brand-primary to-brand-secondary w-8 h-8 rounded text-white shadow-md flex items-center justify-center font-black tracking-tighter">DT</div>
                <div>
                  <h1 className="text-lg font-black text-black leading-tight tracking-tight">Drawing Tasker <span className="text-sm font-bold text-gray-400 ml-1 align-middle">Pro</span></h1>
                </div>
              </div>

              <div className="hidden lg:flex items-center gap-2 bg-gray-100 p-1 rounded-lg border border-gray-200 ml-6 flex-shrink-0">
                 <Camera size={14} className="text-gray-500 ml-2" />
                 <select value={activeSnapshotId || 'live'} onChange={e => { setActiveSnapshotId(e.target.value === 'live' ? null : e.target.value); }} className="bg-transparent border-none outline-none text-sm font-bold text-gray-800 cursor-pointer py-1 pr-2 w-48 truncate">
                   <option value="live">🟢 最新進度 (即時編輯)</option>
                   {snapshots.length > 0 && <optgroup label="歷史快照 (唯讀模式)">{snapshots.map(s => <option key={s.id} value={s.id}>📸 {s.name}</option>)}</optgroup>}
                 </select>
              </div>

              <div className="hidden xl:flex items-center gap-2 ml-4 pl-4 border-l border-gray-200">
                <span className="text-xs font-bold text-gray-400">當前身分:</span>
                <div className="flex items-center gap-1.5 bg-gray-100 px-2 py-1 rounded-md border border-gray-200 hover:border-gray-300 transition-colors">
                  <UserAvatar user={users.find(u => u.id === currentUserId)} size="w-5 h-5" />
                  <select value={currentUserId} onChange={e => setCurrentUserId(e.target.value)} className="bg-transparent border-none text-xs font-bold outline-none cursor-pointer text-gray-800">
                    {users.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                  </select>
                </div>
              </div>

              <div className="flex items-center gap-4 ml-auto">
                {appView !== 'settings' && appView !== 'snapshots' && appView !== 'report' && (
                  <div className="flex items-center gap-2">
                    <div className="relative w-40">
                      <Search className="absolute left-3 top-2.5 h-4 w-4 text-gray-400" />
                      <input type="text" placeholder="搜尋..." className="w-full pl-9 pr-3 py-1.5 bg-gray-50 border border-gray-200 rounded-md text-sm focus:bg-white focus:border-black outline-none" value={filterQuery} onChange={e => setFilterQuery(e.target.value)} />
                    </div>
                    
                    <div className="relative">
                      <button 
                        onClick={(e) => { e.stopPropagation(); setShowAssigneeFilter(!showAssigneeFilter); }}
                        className="pl-8 pr-6 py-1.5 bg-gray-50 border border-gray-200 rounded-md text-sm focus:border-black outline-none text-gray-700 font-medium transition-all flex items-center min-w-[120px] justify-between cursor-pointer"
                      >
                        <User className="absolute left-2.5 top-2 h-4 w-4 text-gray-400 pointer-events-none" />
                        <span className="truncate pr-2 select-none">
                          {filterAssignees.length === 0 ? '所有人員' : `已篩選 ${filterAssignees.length} 人`}
                        </span>
                        <ChevronDown className="h-3 w-3 text-gray-400 flex-shrink-0" />
                      </button>
                      
                      {showAssigneeFilter && (
                        <div 
                          className="absolute top-full right-0 mt-1.5 w-56 bg-white border border-gray-200 shadow-xl rounded-lg p-2 z-50 max-h-64 overflow-y-auto"
                          onClick={e => e.stopPropagation()}
                        >
                          <div className="text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-wider px-2 pt-1">篩選經手人員 (可複選)</div>
                          <div 
                            className="flex items-center gap-2 px-2 py-1.5 hover:bg-gray-50 rounded cursor-pointer transition-colors"
                            onClick={() => setFilterAssignees([])}
                          >
                            <input type="checkbox" checked={filterAssignees.length === 0} readOnly className="rounded text-brand-primary focus:ring-brand-primary w-4 h-4 cursor-pointer" />
                            <span className={`text-sm ${filterAssignees.length === 0 ? 'font-bold text-brand-primary' : 'font-medium text-gray-700'}`}>顯示所有人</span>
                          </div>
                          <div className="w-full h-px bg-gray-100 my-1"></div>
                          <div 
                            className="flex items-center gap-2 px-2 py-1.5 hover:bg-gray-50 rounded cursor-pointer transition-colors"
                            onClick={() => {
                              if (filterAssignees.includes('unassigned')) setFilterAssignees(filterAssignees.filter(id => id !== 'unassigned'));
                              else setFilterAssignees([...filterAssignees, 'unassigned']);
                            }}
                          >
                            <input type="checkbox" checked={filterAssignees.includes('unassigned')} readOnly className="rounded text-brand-primary focus:ring-brand-primary w-4 h-4 cursor-pointer" />
                            <span className="text-sm font-medium text-gray-600">未指派任務</span>
                          </div>
                          {users.map(u => (
                            <div 
                              key={u.id}
                              className="flex items-center gap-2 px-2 py-1.5 hover:bg-gray-50 rounded cursor-pointer transition-colors"
                              onClick={() => {
                                if (filterAssignees.includes(u.id)) setFilterAssignees(filterAssignees.filter(id => id !== u.id));
                                else setFilterAssignees([...filterAssignees, u.id]);
                              }}
                            >
                              <input type="checkbox" checked={filterAssignees.includes(u.id)} readOnly className="rounded text-brand-primary focus:ring-brand-primary w-4 h-4 cursor-pointer" />
                              <div className="flex items-center gap-2 truncate">
                                <UserAvatar user={u} size="w-5 h-5" />
                                <span className="text-sm font-medium text-gray-700 truncate">{u.name}</span>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>

                    <div className="relative">
                      <select value={filterPage} onChange={e => setFilterPage(e.target.value)} className="pl-8 pr-6 py-1.5 bg-gray-50 border border-gray-200 rounded-md text-sm focus:border-black outline-none text-gray-700 font-medium appearance-none cursor-pointer transition-all">
                        <option value="all">所有頁面</option>{Array.from({length: totalPages}, (_, i) => i + 1).map(p => <option key={p} value={p}>第 {p} 頁</option>)}
                      </select>
                      <FileText className="absolute left-2.5 top-2 h-4 w-4 text-gray-400 pointer-events-none" /><ChevronDown className="absolute right-2 top-2.5 h-3 w-3 text-gray-400 pointer-events-none" />
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* 下方第二欄：導覽列 / 動作按鈕 */}
            <div className="px-6 py-2 bg-gray-50 border-b border-gray-200 flex items-center justify-start gap-2 overflow-x-auto min-h-[48px]">
              <NavButton view="blueprint" icon={Crosshair} label="圖面" />
              <NavButton view="board" icon={Kanban} label="看板" />
              <NavButton view="calendar" icon={CalendarDays} label="日曆" />
              <NavButton view="gantt" icon={BarChartHorizontal} label="進度表" />
              <NavButton view="snapshots" icon={Camera} label="快照" />
              <NavButton view="settings" icon={Settings} label="設定" />
              
              <div className="w-px h-5 bg-gray-300 mx-2 flex-shrink-0" />
              
              <button 
                onClick={() => { setAppView('report'); setAddMode('none'); setShowLayerMenu(false); }} 
                className={`p-2 rounded-lg transition-all flex items-center justify-center ${appView === 'report' ? 'bg-brand-primary/10 text-brand-primary shadow-inner border border-brand-primary/20' : 'text-brand-primary hover:bg-brand-primary/10 border border-transparent'}`} 
                title="產生 PDF"
              >
                <Printer size={20} />
              </button>
              <button 
                onClick={handleExportCSV} 
                className="p-2 rounded-lg transition-all flex items-center justify-center text-gray-600 hover:text-black hover:bg-gray-200/50 border border-transparent" 
                title="匯出 Excel 相容的 CSV"
              >
                <Download size={20} />
              </button>
              
              <div className="w-px h-5 bg-gray-300 mx-2 flex-shrink-0" />
              
              <button 
                onClick={() => setShowConfirmNew(true)} 
                className="p-2 rounded-lg transition-all flex items-center justify-center text-gray-600 hover:text-brand-danger hover:bg-red-50 border border-transparent" 
                title="開啟新專案 (清除目前所有資料)"
              >
                <FilePlus size={20} />
              </button>
              
              <button 
                onClick={handleExportProject} 
                className="p-2 rounded-lg transition-all flex items-center justify-center text-brand-secondary bg-brand-secondary/10 hover:bg-brand-secondary/20 border border-brand-secondary/20 shadow-sm ml-1" 
                title="備份專案 (將專案所有資料匯出成 JSON)"
              >
                <FolderDown size={20} />
              </button>
              
              <input type="file" className="hidden" ref={projectInputRef} accept=".json" onChange={handleImportProject} />
              <button 
                onClick={() => projectInputRef.current?.click()} 
                className="p-2 rounded-lg transition-all flex items-center justify-center text-gray-600 hover:text-black hover:bg-gray-200/50 border border-transparent" 
                title="讀取專案 (讀取先前儲存的 JSON 專案)"
              >
                <FolderUp size={20} />
              </button>
            </div>
          </header>
          {/* === 修改區塊結束 === */}

          {isReadOnly && (
            <div className="bg-brand-warning text-[#4a3904] px-6 py-2 flex justify-between items-center z-40 shadow-sm font-bold text-sm shrink-0 border-b border-brand-warningDark">
              <div className="flex items-center gap-2">
                <AlertTriangle size={16} />
                注意：目前正在檢視歷史快照【{snapshots.find(s => s.id === activeSnapshotId)?.name}】。此為唯讀預覽模式，無法進行修改。
              </div>
              <button onClick={() => setActiveSnapshotId(null)} className="bg-white/80 hover:bg-white px-4 py-1 rounded shadow-sm transition-colors text-black text-xs uppercase tracking-wider">
                返回最新進度
              </button>
            </div>
          )}

          {/* Context Menu (右鍵選單) */}
          {contextMenu && !isReadOnly && (
            <div 
              className="fixed z-50 bg-white border border-gray-200 shadow-xl rounded-lg py-1.5 w-44 text-sm overflow-hidden"
              style={{ top: contextMenu.y, left: contextMenu.x }}
              onContextMenu={e => e.preventDefault()}
            >
              <div className="px-3 py-1.5 text-xs font-bold text-gray-400 border-b border-gray-100 mb-1 truncate">{contextMenu.task.title}</div>
              
              {/* === 新增：右鍵選單顏色選擇區 === */}
              <div className="px-3 py-1 flex flex-wrap gap-1.5 border-b border-gray-100 pb-2 mb-1">
                <button 
                  onClick={() => { updateTasks(tasks.map(t => t.id === contextMenu.task.id ? { ...t, colorId: null } : t)); setContextMenu(null); }}
                  className={`w-6 h-6 rounded-full border-2 text-[10px] flex items-center justify-center font-bold transition-all bg-gray-100 text-gray-500 hover:bg-gray-200 ${!contextMenu.task.colorId ? 'border-gray-500 shadow-sm scale-110' : 'border-transparent hover:scale-110'}`}
                  title="依狀態顯示預設顏色"
                >
                  <RefreshCw size={12} />
                </button>
                {MARKER_COLORS.filter(c => c.id !== 'white').map(c => (
                  <button 
                    key={c.id} 
                    onClick={() => { updateTasks(tasks.map(t => t.id === contextMenu.task.id ? { ...t, colorId: c.id } : t)); setContextMenu(null); }}
                    className={`w-6 h-6 rounded-full border-2 transition-transform ${contextMenu.task.colorId === c.id ? 'scale-110 shadow-sm border-black' : 'border-transparent hover:scale-110'}`}
                    style={{ backgroundColor: c.stroke }}
                    title={`標示為${c.name}`}
                  />
                ))}
              </div>

              <button onClick={() => { changeTaskStatus(contextMenu.task.id, 'todo'); }} className="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-brand-danger"></div> 設為待辦</button>
              <button onClick={() => { changeTaskStatus(contextMenu.task.id, 'in-progress'); }} className="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-brand-warning"></div> 設為進行中</button>
              <button onClick={() => { changeTaskStatus(contextMenu.task.id, 'done'); }} className="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center gap-2 border-b border-gray-100"><div className="w-2 h-2 rounded-full bg-brand-success"></div> 設為已完成</button>
              <button onClick={() => { setContextMenu(null); openEditModal(contextMenu.task); }} className="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center gap-2 text-brand-secondary"><Edit3 size={14} /> 編輯詳情</button>
              <button onClick={() => { setContextMenu(null); updateTasks(prev => prev.filter(t => t.id !== contextMenu.task.id)); setActiveTaskId(null); }} className="w-full text-left px-3 py-1.5 hover:bg-brand-danger/10 flex items-center gap-2 text-brand-danger"><Trash2 size={14} /> 刪除標記</button>
            </div>
          )}

          {/* Main Content Area */}
          <div className="flex-1 flex overflow-hidden relative bg-white">
            
            {/* ================= 快照管理ビュー (Snapshots View) ================= */}
            {appView === 'snapshots' && (
              <div className="flex-1 p-8 overflow-auto bg-gray-50">
                <div className="max-w-4xl mx-auto space-y-6">
                  <div className="bg-white rounded-lg border border-gray-200 p-8 shadow-sm">
                     <h2 className="text-xl font-bold mb-2 flex items-center gap-2 text-black"><Camera size={20} className="text-brand-secondary" /> 圖面歷史快照 (Snapshots)</h2>
                     <p className="text-sm text-gray-500 mb-8 pb-6 border-b border-gray-100">將目前的圖面與所有任務狀態完整備份。適用於「初驗」、「複驗」等重要里程碑，方便日後隨時切換比對進度（對比紅綠燈變化）。</p>
                     
                     <div className="bg-brand-secondary/10 p-5 rounded-lg border border-brand-secondary/20 mb-8 flex gap-3 items-end shadow-sm">
                       <div className="flex-1">
                         <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">為新快照命名</label>
                         <input type="text" placeholder={`例如：${getToday()} 複驗版`} className={INPUT_CLASS} value={newSnapshotName} onChange={e => setNewSnapshotName(e.target.value)} />
                       </div>
                       <button 
                         onClick={() => { 
                           const newSnap = { id: `snap_${Date.now()}`, name: newSnapshotName || `${getToday()} 版本`, date: getToday(), tasks: JSON.parse(JSON.stringify(tasks)) };
                           setSnapshots([newSnap, ...snapshots]); 
                           setNewSnapshotName(''); 
                         }} 
                         className="bg-brand-primary text-white px-5 py-2 rounded-md text-sm font-bold hover:opacity-90 transition-colors h-[38px] flex items-center gap-2 shadow-sm"
                       >
                         <Save size={16} /> 儲存目前狀態為快照
                       </button>
                     </div>

                     <div className="space-y-3">
                       <h3 className="text-sm font-bold text-gray-800 mb-3">已儲存の歷史快照</h3>
                       {snapshots.map(snap => (
                         <div key={snap.id} className={`flex items-center justify-between p-4 border rounded-lg hover:bg-gray-50 group shadow-sm transition-all ${activeSnapshotId === snap.id ? 'border-brand-primary bg-brand-primary/10' : 'border-gray-200 bg-white'}`}>
                           <div className="flex flex-col">
                             <div className="flex items-center gap-2 mb-1">
                                <Camera size={14} className={activeSnapshotId === snap.id ? 'text-brand-primary' : 'text-gray-400'} />
                                <span className={`font-bold text-base ${activeSnapshotId === snap.id ? 'text-brand-primary' : 'text-black'}`}>{snap.name}</span>
                                <span className="text-xs text-gray-400 font-mono ml-2">{snap.date}</span>
                                {activeSnapshotId === snap.id && <span className="text-[10px] bg-brand-primary text-white px-1.5 py-0.5 rounded ml-2 font-bold tracking-wider">檢視中</span>}
                             </div>
                             <div className="flex gap-3 text-xs font-bold mt-2">
                                <span className="text-brand-danger bg-brand-danger/10 px-2 py-0.5 rounded">待辦: {snap.tasks.filter(t=>t.status==='todo').length}</span>
                                <span className="text-brand-warningDark bg-brand-warning/20 px-2 py-0.5 rounded">進行中: {snap.tasks.filter(t=>t.status==='in-progress').length}</span>
                                <span className="text-brand-success bg-brand-success/10 px-2 py-0.5 rounded">已完成: {snap.tasks.filter(t=>t.status==='done').length}</span>
                             </div>
                           </div>
                           <div className="flex items-center gap-2">
                             <button 
                               onClick={() => { setActiveSnapshotId(snap.id); setAppView('blueprint'); }} 
                               className={`px-3 py-1.5 text-sm font-bold rounded flex items-center gap-1.5 transition-colors ${activeSnapshotId === snap.id ? 'bg-brand-primary/20 text-brand-primary' : 'bg-gray-100 hover:bg-gray-200 text-gray-800'}`}
                             >
                               <Eye size={14} /> 預覽圖面
                             </button>
                             <button onClick={() => setSnapshots(snapshots.filter(s => s.id !== snap.id))} className="p-1.5 text-gray-400 hover:text-brand-danger hover:bg-brand-danger/10 rounded transition-colors" title="刪除此快照">
                               <Trash2 size={16} />
                             </button>
                           </div>
                         </div>
                       ))}
                       {snapshots.length === 0 && <div className="text-center text-gray-400 py-8 text-sm border border-dashed border-gray-300 rounded-lg">目前沒有建立任何快照</div>}
                     </div>
                  </div>
                </div>
              </div>
            )}

            {/* ================= 設定ビュー (Settings View) ================= */}
            {appView === 'settings' && (
              <div className="flex-1 p-8 overflow-auto">
                <div className="max-w-4xl mx-auto space-y-6">
                  
                  <div className="bg-white rounded-lg border border-gray-200 p-8 shadow-sm">
                     <h2 className="text-xl font-bold mb-2 flex items-center gap-2 text-black"><Tag size={20} className="text-brand-secondary" /> 工種 / 標籤管理</h2>
                     <p className="text-sm text-gray-500 mb-8 pb-6 border-b border-gray-100">設定專案の工種分類（如水電、泥作、消防），以便在圖面上透過圖層選單一鍵篩選顯示。</p>
                     <div className="bg-gray-50 p-5 rounded-lg border border-gray-200 mb-8 shadow-sm flex gap-3">
                       <input type="text" placeholder="輸入標籤名稱 (如：弱電、空調)" className={`${INPUT_CLASS} flex-1`} value={newTagForm.name} onChange={e => setNewTagForm({name: e.target.value})} disabled={isReadOnly}/>
                       <button onClick={() => { setTags([...tags, { id: `tg_${Date.now()}`, name: newTagForm.name }]); setNewTagForm({name:''}); }} disabled={isReadOnly || !newTagForm.name.trim()} className="bg-black text-white px-5 rounded-md text-sm font-bold hover:bg-gray-800 disabled:opacity-50">新增工種</button>
                     </div>
                     <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                       {tags.map(tag => (
                         <div key={tag.id} className="flex items-center justify-between p-3 border border-gray-200 rounded-lg hover:bg-gray-50 group">
                           <div className="flex items-center gap-2"><Tag size={14} className="text-brand-secondary"/><span className="font-bold text-sm text-black">{tag.name}</span></div>
                           <button onClick={() => setTags(tags.filter(t => t.id !== tag.id))} disabled={isReadOnly} className="text-gray-400 hover:text-brand-danger p-1 opacity-0 group-hover:opacity-100 disabled:opacity-0"><Trash2 size={14} /></button>
                         </div>
                       ))}
                       {tags.length === 0 && <div className="col-span-full text-center text-gray-400 py-4 text-sm bg-gray-50 border border-dashed rounded-lg">目前沒有設定任何工種標籤</div>}
                     </div>
                  </div>

                  <div className="bg-white rounded-lg border border-gray-200 p-8 shadow-sm">
                     <h2 className="text-xl font-bold mb-2 flex items-center gap-2 text-black"><Stamp size={20} className="text-brand-primary" /> 常用印章管理</h2>
                     <p className="text-sm text-gray-500 mb-8 pb-6 border-b border-gray-100">預先設定常見の缺失與問題，在圖面上蓋章時可快速帶入標準說明。</p>
                     <div className="bg-gray-50 p-5 rounded-lg border border-gray-200 mb-8 shadow-sm flex gap-3">
                       <input type="text" placeholder="編號" className={`${INPUT_CLASS} w-1/4`} value={newStampForm.code} onChange={e => setNewStampForm({...newStampForm, code: e.target.value})} disabled={isReadOnly}/>
                       <input type="text" placeholder="標題" className={`${INPUT_CLASS} w-1/3`} value={newStampForm.title} onChange={e => setNewStampForm({...newStampForm, title: e.target.value})} disabled={isReadOnly}/>
                       <input type="text" placeholder="說明" className={`${INPUT_CLASS} flex-1`} value={newStampForm.description} onChange={e => setNewStampForm({...newStampForm, description: e.target.value})} disabled={isReadOnly}/>
                       <button onClick={() => { setStamps([...stamps, { id: Date.now().toString(), ...newStampForm }]); setNewStampForm({code:'', title:'', description:''}); }} disabled={isReadOnly || !newStampForm.code || !newStampForm.title} className="bg-black text-white px-5 rounded-md text-sm font-bold hover:bg-gray-800 disabled:opacity-50">新增</button>
                     </div>
                     <div className="space-y-2">
                       {stamps.map(stamp => (
                         <div key={stamp.id} className="flex items-start gap-4 p-4 border border-gray-200 rounded-lg hover:bg-gray-50 group">
                           <div className="border-2 border-black font-bold px-2 py-1 rounded text-sm text-center flex-shrink-0">{stamp.code}</div>
                           <div className="flex-1 pt-0.5"><h4 className="font-bold text-sm">{stamp.title}</h4><p className="text-gray-500 text-xs mt-1.5">{stamp.description}</p></div>
                           <button onClick={() => setStamps(stamps.filter(s => s.id !== stamp.id))} disabled={isReadOnly} className="text-gray-400 hover:text-brand-danger p-2 opacity-0 group-hover:opacity-100 disabled:opacity-0"><Trash2 size={16} /></button>
                         </div>
                       ))}
                     </div>
                  </div>

                  <div className="bg-white rounded-lg border border-gray-200 p-8 shadow-sm">
                     <h2 className="text-xl font-bold mb-2 flex items-center gap-2 text-black"><User size={20} className="text-brand-primary" /> 經手人員管理</h2>
                     <p className="text-sm text-gray-500 mb-8 pb-6 border-b border-gray-100">設定專案參與人員。</p>
                     <div className="bg-gray-50 p-5 rounded-lg border border-gray-200 mb-8 flex gap-3 shadow-sm">
                       <input type="text" placeholder="姓名" className={`${INPUT_CLASS} w-1/3`} value={newUserForm.name} onChange={e => setNewUserForm({...newUserForm, name: e.target.value})} disabled={isReadOnly}/>
                       <input type="text" placeholder="大頭貼網址" className={`${INPUT_CLASS} flex-1`} value={newUserForm.avatar} onChange={e => setNewUserForm({...newUserForm, avatar: e.target.value})} disabled={isReadOnly}/>
                       <button onClick={() => { setUsers([...users, { id: `u_${Date.now()}`, name: newUserForm.name, avatar: newUserForm.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${newUserForm.name}` }]); setNewUserForm({name:'', avatar:''}); }} disabled={isReadOnly || !newUserForm.name} className="bg-black text-white px-5 rounded-md text-sm font-bold hover:bg-gray-800 disabled:opacity-50">新增</button>
                     </div>
                     <div className="grid grid-cols-3 gap-4">
                       {users.map(user => (
                         <div key={user.id} className="flex items-center justify-between p-3 border border-gray-200 rounded-lg hover:bg-gray-50 group">
                           <div className="flex items-center gap-3"><UserAvatar user={user} size="w-8 h-8" iconSize={14} /><span className="font-bold text-sm text-black">{user.name}</span></div>
                           <button onClick={() => setUsers(users.filter(u => u.id !== user.id))} disabled={isReadOnly} className="text-gray-400 hover:text-brand-danger p-2 opacity-0 group-hover:opacity-100 disabled:opacity-0"><Trash2 size={16} /></button>
                         </div>
                       ))}
                     </div>
                  </div>
                  
                  <div className="bg-white rounded-lg border border-gray-200 p-8 shadow-sm">
                     <h2 className="text-xl font-bold mb-2 flex items-center gap-2 text-black"><Settings size={20} className="text-brand-primary" /> 系統說明</h2>
                     <div className="prose text-sm text-gray-600">
                       <p>進階版新增了以下功能以提升效率：</p>
                       <ul className="list-disc pl-5 space-y-2 mt-4 font-medium">
                         <li><strong>全新配色：</strong> 已套用您指定的客製化品牌色調（深藍、淺藍、碧綠、銘黃、橘紅）。</li>
                         <li><strong>快捷鍵：</strong> 在圖面檢視時，按下 <code>1</code>~<code>6</code> 可以快速切換不同的繪圖工具。</li>
                         <li><strong>右鍵選單：</strong> 在圖面的標記上點擊右鍵，可以直接更改任務狀態或刪除。</li>
                         <li><strong>本地備份：</strong> 點擊下方選單「備份專案」，可以將目前所有設定與標記打包存入您的電腦。</li>
                         <li><strong>顯示濾鏡：</strong> 點擊右下角設定圖示，可調整底圖亮度與對比。</li>
                       </ul>
                     </div>
                  </div>
                </div>
              </div>
            )}

            {/* ================= PDF 報表匯出視圖 (Report Print View) ================= */}
            {appView === 'report' && (
              <div className="flex-1 bg-gray-200 overflow-auto print:bg-white flex flex-col relative w-full h-full">
                <div className="bg-white border-b border-gray-300 px-8 py-4 flex justify-between items-center sticky top-0 z-50 print:hidden shadow-sm">
                  <div>
                    <h2 className="text-lg font-black text-gray-900">巡檢總表 PDF 預覽</h2>
                    <p className="text-xs text-gray-500 font-medium mt-1">請確認圖面標記與下方表格，點擊右側按鈕進行列印或儲存為 PDF。</p>
                  </div>
                  <div className="flex gap-3">
                    <button onClick={() => setAppView('blueprint')} className="px-4 py-2 text-sm font-bold text-gray-700 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                      返回圖面
                    </button>
                    <button onClick={() => window.print()} className="px-5 py-2 text-sm font-bold text-white bg-brand-primary rounded-md hover:opacity-90 shadow-md flex items-center gap-2 transition-colors">
                      <Printer size={16} /> 列印 / 儲存 PDF
                    </button>
                  </div>
                </div>

                <div className="max-w-[210mm] w-full mx-auto bg-white my-8 p-10 shadow-2xl print:shadow-none print:m-0 print:p-0 print:max-w-none">
                  
                  <div className="border-b-2 border-black pb-4 mb-6 flex justify-between items-end">
                    <div>
                      <h1 className="text-3xl font-black text-black tracking-wider">圖面巡檢總表</h1>
                      <div className="text-sm font-bold text-gray-500 mt-2">
                        {isReadOnly ? `歷史快照：${snapshots.find(s=>s.id===activeSnapshotId)?.name}` : `日期: ${getToday()}`} | 頁面: 第 {currentPage} 頁
                      </div>
                    </div>
                    <div className="text-sm font-bold text-gray-700">
                      共計 {filteredTasks.filter(t => t.page === currentPage).length} 項紀錄
                    </div>
                  </div>

                  <div className="relative w-full border-2 border-gray-300 mb-8 overflow-hidden bg-gray-50">
                     <div style={filterStyle} className="w-full">
                       {viewMode === 'pdf' ? (
                         <canvas ref={canvasRef} className="w-full h-auto block bg-white" />
                       ) : backgroundImage ? (
                         <img src={backgroundImage} alt="BP" className="w-full h-auto block opacity-95 sepia hue-rotate-[190deg] saturate-200 contrast-125 brightness-90" draggable={false} />
                       ) : (
                         <div className="w-full bg-[#f8fafc]" style={{ height: '210mm', backgroundImage: 'linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px)', backgroundSize: '40px 40px' }} />
                       )}
                     </div>
                     
                     {filteredTasks.filter(t => t.page === currentPage).map((task, index) => {
                        const num = index + 1;
                        const isAreaType = ['cloud', 'area', 'highlight', 'pen', 'measure'].includes(task.type);

                        if (isAreaType && task.width && task.height) {
                          return (
                            <div key={task.id} className={`absolute border-2 border-brand-danger ${task.type==='area'||task.type==='cloud' ? 'bg-brand-danger/10' : ''} pointer-events-none`} style={{ left: `${task.x}%`, top: `${task.y}%`, width: `${task.width}%`, height: `${task.height}%` }}>
                               {(task.type === 'highlight' || task.type === 'pen') && task.points && (
                                  <svg viewBox={`0 0 ${task.width} ${task.height}`} preserveAspectRatio="none" className="w-full h-full absolute inset-0 pointer-events-none" style={{ opacity: task.type === 'highlight' ? 0.6 : 1 }}>
                                    <polyline points={task.points.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke={MARKER_COLORS.find(c => c.id === task.colorId)?.stroke || '#efc028'} strokeWidth={task.type === 'highlight' ? "12" : "4"} strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />
                                  </svg>
                               )}
