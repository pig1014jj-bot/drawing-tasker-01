                                  e.currentTarget.classList.add('border-t-2', 'border-t-brand-primary');
                                }}
                                onDragLeave={(e) => {
                                  e.currentTarget.classList.remove('border-t-2', 'border-t-brand-primary');
                                }}
                                onDrop={(e) => {
                                  if (isReadOnly) return;
                                  e.preventDefault();
                                  e.currentTarget.classList.remove('border-t-2', 'border-t-brand-primary');
                                  const draggedId = e.dataTransfer.getData('taskId');
                                  if (draggedId && draggedId !== task.id) {
                                     const newTasks = [...tasks];
                                     const dragIndex = newTasks.findIndex(t => t.id === draggedId);
                                     const dropIndex = newTasks.findIndex(t => t.id === task.id);
                                     if (dragIndex > -1 && dropIndex > -1) {
                                        const draggedTask = { ...newTasks[dragIndex] };
                                        const targetTask = newTasks[dropIndex];
                                        
                                        if (draggedTask.assigneeId !== targetTask.assigneeId) {
                                           const oldAssigneeName = users.find(u => u.id === draggedTask.assigneeId)?.name || '未指派';
                                           const newAssigneeName = users.find(u => u.id === targetAssigneeId)?.name || '未指派';
                                           draggedTask.history = [...(draggedTask.history || []), { date: getNow(), message: `透過進度表拖曳，將經手人由「${oldAssigneeName}」變更為「${newAssigneeName}」` }];
                                           draggedTask.assigneeId = targetTask.assigneeId;
                                        }

                                        newTasks.splice(dragIndex, 1);
                                        const adjustedDropIndex = dragIndex < dropIndex ? dropIndex - 1 : dropIndex;
                                        newTasks.splice(adjustedDropIndex, 0, draggedTask);
                                        updateTasks(newTasks);
                                     }
                                  }
                                }}
                              >
                                {!isReadOnly && (
                                  <button 
                                    onPointerDown={(e) => e.stopPropagation()}
                                    onClick={(e) => { e.stopPropagation(); updateTasks(tasks.filter(t => t.id !== task.id)); if (activeTaskId === task.id) setActiveTaskId(null); }} 
                                    className="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-white hover:bg-brand-danger rounded opacity-0 group-hover:opacity-100 transition-all shadow-sm bg-white border border-gray-200 z-30 cursor-pointer"
                                    title={LANGUAGES[language].deleteTask}
                                  >
                                    <Trash2 size={14} />
                                  </button>
                                )}

                                <div className="flex items-center gap-2 pr-8">
                                  {!isReadOnly && (
                                    <button
                                      type="button"
                                      onClick={(e) => {
                                        e.stopPropagation();
                                        if (!ganttLinkSourceTaskId) {
                                          setGanttLinkSourceTaskId(task.id);
                                          return;
                                        }
                                        if (ganttLinkSourceTaskId === task.id) {
                                          setGanttLinkSourceTaskId(null);
                                          return;
                                        }
                                        connectGanttTasks(ganttLinkSourceTaskId, task.id);
                                      }}
                                      className={`w-3.5 h-3.5 rounded-full border ${ganttLinkSourceTaskId === task.id ? 'bg-blue-600 border-blue-600' : 'bg-white border-gray-300 hover:bg-blue-100'} transition-all`}
                                      title={ganttLinkSourceTaskId ? (ganttLinkSourceTaskId === task.id ? '取消選取此任務' : '將此任務設為後續任務') : '選取此任務為前置任務'}
                                    />
                                  )}
                                  {!isReadOnly && <GripVertical size={14} className="text-gray-300 flex-shrink-0" title={LANGUAGES[language].dragToSortOrChangeAssignee} />}
                                  <span className="text-sm font-bold cursor-pointer hover:underline flex items-center gap-1.5 truncate" onClick={() => jumpToBlueprintTask(task)}>
                                    <TaskIcon type={task.type} colorId={task.colorId} />
                                    <span className="truncate">{task.title}</span>
                                    {task.attachments && task.attachments.length > 0 && <ImageIcon size={12} className="text-gray-400 flex-shrink-0" />}
                                  </span>
                                </div>
                                <div className="flex items-center gap-2 mt-2 pl-7">
                                   <StatusBadge status={task.status} />
                                   {task.tagId && task.tagId !== 'none' && (
                                      <span className="text-[10px] font-bold text-brand-secondary bg-brand-secondary/10 px-1.5 py-0.5 rounded border border-brand-secondary/20 flex items-center gap-1">
                                         {tags.find(t => t.id === task.tagId)?.name}
                                      </span>
                                   )}
                                </div>
                              </div>
                              <div className="flex relative w-full overflow-hidden">
                                {ganttData.days.map((d, i) => {
                                  const isToday = d.toISOString().split('T')[0] === getToday();
                                  return <div key={i} className={`w-10 border-r border-gray-100 h-14 shrink-0 ${isToday ? 'bg-brand-warning/10' : [0,6].includes(d.getDay()) ? 'bg-gray-50/50' : ''}`} />
                                })}
                                
                                <div 
                                   ref={el => ganttTaskBarRefs.current[task.id] = el}
                                   className={`absolute top-3 h-8 rounded shadow-sm flex items-center text-xs font-bold z-10 group/bar ${task.status === 'done' && !task.colorId ? 'opacity-60' : ''}`} 
                                   style={{ 
                                     left: left, 
                                     width: duration * 40,
                                     backgroundColor: bgColor,
                                     color: textColor,
                                     border: `1px solid ${borderColor}`,
                                     cursor: isReadOnly ? 'default' : (ganttInteraction.type === 'resize' && isInteracting ? 'ew-resize' : 'grab'),
                                     transition: isInteracting ? 'none' : 'all 0.2s ease-out'
                                   }}
                                   onPointerDown={(e) => {
                                     if (isReadOnly || e.button !== 0) return;
                                     e.preventDefault(); 
                                     e.stopPropagation();
                                     e.currentTarget.setPointerCapture(e.pointerId);
                                     
                                     const rect = e.currentTarget.getBoundingClientRect();
                                     const isRightEdge = e.clientX > rect.right - 15;
                                     
                                     setGanttInteraction({
                                       active: true,
                                       type: isRightEdge ? 'resize' : 'move',
                                       taskId: task.id,
                                       startX: e.clientX,
                                       currentX: e.clientX,
                                       originalStart: task.startDate,
                                       originalEnd: task.endDate
                                     });
                                   }}
                                   onPointerCancel={(e) => {
                                      if (ganttInteraction.active && ganttInteraction.taskId === task.id) {
                                         e.currentTarget.releasePointerCapture(e.pointerId);
                                         setGanttInteraction({ active: false, type: null, taskId: null, startX: 0, currentX: 0, originalStart: null, originalEnd: null });
                                      }
                                   }}
                                   onContextMenu={(e) => handleTaskContextMenu(e, task)}
                                >
                                   <span className="px-2 truncate pointer-events-none w-full select-none text-left">
                                     {duration >= 1 && task.title}
                                   </span>
                                   
                                   {!isReadOnly && (
                                     <div 
                                       className="absolute right-0 top-0 bottom-0 w-3.5 cursor-ew-resize opacity-0 group-hover/bar:opacity-100 flex items-center justify-center rounded-r transition-opacity hover:bg-black/20 z-20"
                                       title={LANGUAGES[language].dragToAdjustEndDate}
                                     >
                                       <div className="w-[2px] h-3 border-l border-r border-white/50" />
                                     </div>
                                   )}
                                </div>
                              </div>
                            </div>
                          )
                        })}
                      </React.Fragment>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {appView === 'blueprint' && (
              <>
                {isSidebarVisible && (
                  <div 
                    className="w-80 lg:w-96 bg-gray-50 border-r border-gray-200 flex flex-col z-10 shrink-0 shadow-xl"
                    onTouchStart={handleSidebarTouchStart}
                    onTouchMove={handleSidebarTouchMove}
                  >
                    <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-white">
                      <span className="font-bold text-sm">圖面標記列表</span><span className="text-xs bg-gray-100 px-2 py-0.5 rounded-md font-bold border">可見 {filteredTasks.length} 件</span>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                      {filteredTasks.map(task => (
                        <div 
                          key={task.id} 
                          onClick={() => jumpToBlueprintTask(task)} 
                          draggable={!isReadOnly}
                          onDragStart={(e) => {
                            if (isReadOnly) return;
                            e.dataTransfer.setData('blueprintTaskId', task.id);
                            e.dataTransfer.effectAllowed = 'move';
                            setTimeout(() => e.target.classList.add('opacity-40', 'bg-gray-100'), 0);
                          }}
                          onDragEnd={(e) => {
                            e.target.classList.remove('opacity-40', 'bg-gray-100');
                          }}
                          onDragOver={(e) => {
                            if (isReadOnly) return;
                            e.preventDefault();
                            e.currentTarget.classList.add('border-t-4', 'border-t-brand-primary');
                          }}
                          onDragLeave={(e) => {
                            e.currentTarget.classList.remove('border-t-4', 'border-t-brand-primary');
                          }}
                          onDrop={(e) => {
                            if (isReadOnly) return;
                            e.preventDefault();
                            e.currentTarget.classList.remove('border-t-4', 'border-t-brand-primary');
                            const draggedId = e.dataTransfer.getData('blueprintTaskId');
                            if (draggedId && draggedId !== task.id) {
                               const newTasks = [...tasks];
                               const dragIndex = newTasks.findIndex(t => t.id === draggedId);
                               const dropIndex = newTasks.findIndex(t => t.id === task.id);
                               if (dragIndex > -1 && dropIndex > -1) {
                                  const [draggedItem] = newTasks.splice(dragIndex, 1);
                                  newTasks.splice(dropIndex, 0, draggedItem);
                                  updateTasks(newTasks);
                               }
                            }
                          }}
                          className={`bg-white p-4 rounded-lg border transition-all cursor-pointer group ${activeTaskId === task.id ? 'border-black shadow-md ring-1' : 'border-gray-200 shadow-sm'} ${task.page !== currentPage ? 'opacity-50' : ''}`}
                        >
                          <div className="flex justify-between items-start mb-2.5">
                            <div className="flex gap-2 items-center">
                              {!isReadOnly && <GripVertical size={14} className="text-gray-300 opacity-50 hover:opacity-100 cursor-grab" title={LANGUAGES[language].dragToSort} />}
                              <StatusBadge status={task.status} />
                              <span className="text-[11px] font-bold text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded-sm border flex items-center gap-1"><FileText size={10} /> P.{task.page}</span>
                            </div>
                            <button onClick={(e) => { e.stopPropagation(); openEditModal(task); }} className="p-1 text-gray-400 hover:text-black opacity-0 group-hover:opacity-100 bg-gray-50 rounded transition-opacity"><Eye size={14} /></button>
                          </div>
                          <h3 className={`font-bold text-sm mb-1.5 flex items-center gap-2 ${activeTaskId === task.id ? 'text-black' : 'text-gray-800'}`}>
                            <TaskIcon type={task.type} colorId={task.colorId} /><span className="leading-snug">{task.type === 'stamp' && <span className="bg-gray-100 border px-1 rounded-sm text-[10px] mr-1">[{task.stampCode}]</span>}{task.title}</span>
                          </h3>
                          <p className="text-gray-500 text-xs line-clamp-2 mb-3">{task.description}</p>
                          <div className="flex items-center justify-between pt-3 border-t border-gray-100">
                            <div className="flex items-center gap-1.5">
                               <UserAvatar user={users.find(u => u.id === task.assigneeId)} />
                               <span className="text-[11px] text-gray-600 font-medium">{users.find(u => u.id === task.assigneeId)?.name || '未指派'}</span>
                            </div>
                            <div className="flex items-center gap-1.5">
                               {task.attachments && task.attachments.length > 0 && <ImageIcon size={12} className="text-gray-400" title={LANGUAGES[language].containsPhotoAttachment} />}
                               {task.tagId && task.tagId !== 'none' && (
                                  <span className="text-[10px] font-bold text-brand-secondary bg-brand-secondary/10 px-1.5 py-0.5 rounded border border-brand-secondary/20 flex items-center gap-1">
                                     <Tag size={10} /> {tags.find(t => t.id === task.tagId)?.name}
                                  </span>
                               )}
                            </div>
                          </div>
                        </div>
                      ))}
                      {filteredTasks.length === 0 && <div className="text-center text-gray-400 py-10 text-sm font-medium">目前的圖層/條件下沒有任何標記</div>}
                    </div>
                  </div>
                )}

                {showConfirmTemplate && (
                  <div className="fixed inset-0 z-[65] flex items-center justify-center bg-black/40 backdrop-blur-sm">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 overflow-hidden">
                      <div className="p-6">
                        <h3 className="text-lg font-black flex items-center gap-2 text-brand-danger mb-3">
                          <AlertTriangle size={20} /> {LANGUAGES[language].confirmTemplateTitle}
                        </h3>
                        <p className="text-sm text-gray-600 mb-6 leading-relaxed">
                          {LANGUAGES[language].confirmTemplateMessage}
                        </p>
                        <div className="flex justify-end gap-3">
                          <button onClick={() => setShowConfirmTemplate(false)} className="px-4 py-2 text-sm font-bold text-gray-700 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                            {LANGUAGES[language].cancel}
                          </button>
                          <button 
                            onClick={resetToTemplate} 
                            className="px-4 py-2 text-sm font-bold text-white bg-brand-danger rounded-md hover:bg-brand-danger/90 transition-colors shadow-sm"
                          >
                            {LANGUAGES[language].confirmTemplate}
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                <div 
                  ref={viewportRef} 
                  className={`flex-1 overflow-hidden relative bg-[#e5e7eb] touch-none ${isSpacePressed || isPanning ? 'cursor-grab active:cursor-grabbing' : ''}`} 
                  style={{ touchAction: 'none' }}
                  onPointerDown={(e)=>{ if(e.button!==2) handleViewportPointerDown(e); }} 
                  onPointerMove={handleViewportPointerMove} 
                  onPointerUp={handleViewportPointerUp} 
                  onPointerLeave={handleViewportPointerUp} 
                  onPointerCancel={handleViewportPointerUp} 
                  onContextMenu={e => e.preventDefault()}
                >
                  
                  <div className="absolute z-20 flex flex-col items-center gap-2" style={{ top: '20px', left: '50%', transform: `translate(calc(-50% + ${toolbarPos.x}px), ${toolbarPos.y}px)` }}>
                    <div className="bg-white shadow-sm border border-gray-200 rounded-full px-2 py-1.5 flex items-center gap-1.5 pointer-events-auto">
                      <div className="cursor-grab text-gray-400 hover:text-black p-1 flex items-center" title={LANGUAGES[language].dragToolbar} onPointerDown={(e) => { e.stopPropagation(); e.target.setPointerCapture(e.pointerId); setIsDraggingToolbar(true); setToolbarDragStart({ x: e.clientX - toolbarPos.x, y: e.clientY - toolbarPos.y }); }} onPointerMove={(e) => isDraggingToolbar && setToolbarPos({ x: e.clientX - toolbarDragStart.x, y: e.clientY - toolbarDragStart.y })} onPointerUp={() => setIsDraggingToolbar(false)}><GripVertical size={16} /></div>
                      <div className="w-px h-4 bg-gray-200" />
                      <button onClick={() => setIsHeaderVisible(!isHeaderVisible)} className="p-1.5 rounded-full text-gray-500 hover:bg-gray-100 hover:text-black" title={isHeaderVisible ? LANGUAGES[language].hideHeader : LANGUAGES[language].showHeader}>{isHeaderVisible ? <PanelTopClose size={16} /> : <PanelTop size={16} />}</button>
                      <button onClick={() => setIsSidebarVisible(!isSidebarVisible)} className="p-1.5 rounded-full text-gray-500 hover:bg-gray-100 hover:text-black" title={isSidebarVisible ? LANGUAGES[language].hideSidebar : LANGUAGES[language].showSidebar}>{isSidebarVisible ? <PanelLeftClose size={16} /> : <PanelLeft size={16} />}</button>
                      
                      {!isReadOnly && (
                        <>
                          <div className="w-px h-4 bg-gray-200" />
                          <button onClick={handleUndoAction} disabled={!pastTasks.length} className="p-1.5 rounded-full text-gray-500 hover:bg-gray-100 hover:text-black disabled:opacity-30 disabled:hover:bg-transparent" title={LANGUAGES[language].undo}><Undo size={16} /></button>
                          <button onClick={handleRedoAction} disabled={!futureTasks.length} className="p-1.5 rounded-full text-gray-500 hover:bg-gray-100 hover:text-black disabled:opacity-30 disabled:hover:bg-transparent" title={LANGUAGES[language].redo}><Redo size={16} /></button>
                        </>
                      )}

                      <div className="w-px h-4 bg-gray-200" />
                      <button onClick={(e) => { e.stopPropagation(); setShowLayerMenu(!showLayerMenu); setAddMode('none'); }} className={`p-1.5 rounded-full transition-colors flex items-center justify-center ${showLayerMenu ? 'bg-black text-white shadow-md' : 'text-gray-600 hover:bg-gray-100 hover:text-black'}`} title={LANGUAGES[language].layerMenuTooltip}><Layers size={16} /></button>
                      
                      <button 
                        onClick={(e) => { e.stopPropagation(); setShowLockIcons(!showLockIcons); }} 
                        className={`p-1.5 rounded-full transition-colors flex items-center justify-center ${showLockIcons ? 'bg-gray-100 text-brand-primary shadow-inner' : 'text-gray-500 hover:bg-gray-100 hover:text-black'}`} 
                        title={showLockIcons ? LANGUAGES[language].hideLockIcons : LANGUAGES[language].showLockIcons}
                      >
                        <Lock size={16} />
                      </button>

                      {!isReadOnly && (
                        <>
                          <div className="w-px h-4 bg-gray-200" />
                          <input type="file" className="hidden" ref={oldFileInputRef} accept="application/pdf" onChange={handleOldFileUpload} />
                          <button onClick={() => oldFileInputRef.current?.click()} className="p-1.5 rounded-full text-gray-600 hover:bg-gray-100 hover:text-black transition-colors" title={LANGUAGES[language].loadOldVersionPDF}><FilePlus size={16} /></button>
                          <input type="file" className="hidden" ref={fileInputRef} accept="image/*,application/pdf,.dxf" onChange={handleFileUpload} />
                          <button onClick={() => fileInputRef.current?.click()} className="p-1.5 rounded-full text-gray-600 hover:bg-gray-100 hover:text-black transition-colors" title={LANGUAGES[language].loadBlueprint}><Upload size={16} /></button>
                          <button
                            onClick={() => {
                              if (!oldPdfDocument || !pdfDocument) return alert("請先載入新版與舊版 PDF，才能進入比對模式。");
                              setCompareMode(prev => !prev);
                            }}
                            className={`p-1.5 rounded-full transition-colors ${compareMode ? 'bg-brand-secondary text-white shadow-sm' : 'text-gray-600 hover:bg-gray-100 hover:text-black'}`}
                            title={LANGUAGES[language].togglePDFComparisonMode}
                          >
                            <Eye size={16} />
                          </button>
                          
                          <div className="w-px h-4 bg-gray-200" />
                          <ToolbarBtn mode="select" icon={MousePointerClick} title={LANGUAGES[language].selectTitle} onClick={() => setAddMode('none')} />
                          <ToolbarBtn mode="pin" icon={MapPin} title={LANGUAGES[language].pinTitle} />
                          <ToolbarBtn mode="cloud" icon={Cloud} title={LANGUAGES[language].cloudTitle} />
                          <ToolbarBtn mode="highlight" icon={Highlighter} title={LANGUAGES[language].highlightTitle} />
                          <ToolbarBtn mode="pen" icon={PenLine} title={LANGUAGES[language].penTitle} />
                          <ToolbarBtn mode="area" icon={Hexagon} title={LANGUAGES[language].areaTitle} />
                          <ToolbarBtn mode="measure" icon={Ruler} title={LANGUAGES[language].measureTitle} />
                          <ToolbarBtn mode="calibrate" icon={Maximize} title={LANGUAGES[language].calibrateTitle} />
                          <ToolbarBtn mode="stamp" icon={Stamp} title={LANGUAGES[language].applyStamp} onClick={() => stamps.length ? setAddMode(addMode === 'stamp' ? 'none' : 'stamp') : alert(LANGUAGES[language].pleaseSetStamp)} />

                          <div className="w-px h-4 bg-gray-200" />
                          <button 
                            onClick={() => {
                              if (activeTaskId) {
                                updateTasks(prev => prev.filter(t => t.id !== activeTaskId));
                                setActiveTaskId(null);
                              }
                            }}
                            disabled={!activeTaskId}
                            className={`p-1.5 rounded-full transition-colors flex items-center justify-center ${activeTaskId ? 'text-brand-danger hover:bg-brand-danger/10 hover:text-brand-danger shadow-sm' : 'text-gray-300'}`}
                            title={LANGUAGES[language].deleteSelected}
                          >
                            <Trash2 size={16} />
                          </button>
                        </>
                      )}
                    </div>
                    
                    {(addMode === 'highlight' || addMode === 'pen') && !isReadOnly && (
                      <div className="bg-white shadow-md border border-gray-200 rounded-xl px-4 py-2.5 flex flex-col gap-2.5 pointer-events-auto relative">
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-bold text-gray-500 w-8 text-right whitespace-nowrap">預設:</span>
                          {MARKER_COLORS.map(c => (
                            <button key={c.id} onClick={(e) => { e.stopPropagation(); setActiveColor(c); }} className={`w-5 h-5 rounded-full border-2 transition-all ${activeColor.id === c.id ? 'scale-125 shadow-sm border-black' : 'border-transparent hover:scale-110'}`} style={{ backgroundColor: c.stroke }} title={c.name} />
                          ))}
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-bold text-gray-500 w-8 text-right whitespace-nowrap">自訂:</span>
                          {customPalette.map((c, idx) => (
                            <button 
                              key={`${c.id}-${idx}`} 
                              onClick={(e) => { e.stopPropagation(); if(!c.isEmpty) setActiveColor(c); }} 
                              className={`w-5 h-5 rounded-full border-2 transition-all ${!c.isEmpty && activeColor.id === c.id ? 'scale-125 shadow-sm border-black' : 'border-transparent hover:scale-110'} ${c.isEmpty ? 'border-dashed border-gray-300 cursor-default opacity-50' : ''}`} 
                              style={{ backgroundColor: c.isEmpty ? '#f9fafb' : c.stroke }} 
                              title={c.isEmpty ? '尚未設定' : c.name} 
                            />
                          ))}
                          <div className="w-px h-4 bg-gray-200 ml-1" />
                          <label className="w-5 h-5 rounded-full border border-gray-300 overflow-hidden cursor-pointer relative hover:scale-110 transition-transform shadow-sm" title={LANGUAGES[language].addNewColor}>
                            <div className="absolute inset-0" style={{ background: 'conic-gradient(red, yellow, lime, cyan, blue, magenta, red)' }}></div>
                            <input type="color" className="opacity-0 absolute inset-0 w-full h-full cursor-pointer" onChange={handleColorPick} />
                          </label>
                        </div>
                      </div>
                    )}

                    {showLayerMenu && (
                      <div 
                        className="absolute top-full mt-3 left-1/2 -translate-x-1/2 bg-white rounded-xl shadow-2xl border border-gray-200 w-64 overflow-hidden pointer-events-auto cursor-default"
                        onPointerDown={e => e.stopPropagation()} 
                      >
                        <div className="px-4 py-3 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                          <span className="font-bold text-sm text-gray-800 flex items-center gap-2"><Layers size={16}/> {LANGUAGES[language].layerAndFilter}</span>
                          <button onClick={() => setShowLayerMenu(false)} className="text-gray-400 hover:text-black transition-colors bg-white rounded shadow-sm p-1 border border-gray-200"><X size={14}/></button>
                        </div>
                        <div className="p-3 flex flex-col gap-4 max-h-[60vh] overflow-y-auto">
                          <div>
                            <div className="text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-wider px-1">{LANGUAGES[language].byStatus}</div>
                            {Object.entries(STATUS_CONFIG).map(([k, c]) => (
                               <div key={k} className="flex items-center justify-between py-1.5 cursor-pointer hover:bg-gray-50 rounded px-1.5 transition-colors" onClick={() => toggleLayerStatus(k)}>
                                  <div className="flex items-center gap-2">
                                     <span className={`w-2.5 h-2.5 rounded-full ${c.color}`}></span>
                                     <span className="text-xs font-bold text-gray-700">{c.label}</span>
                                  </div>
                                  {layerVisibility.statuses[k] !== false ? <Eye size={16} className="text-gray-500" /> : <EyeOff size={16} className="text-gray-300" />}
                               </div>
                            ))}
                          </div>
                          <div className="w-full h-px bg-gray-100"></div>
                          <div>
                            <div className="text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-wider px-1 flex items-center justify-between">
                              <span>{LANGUAGES[language].byTag}</span>
                              <button onClick={() => { setShowLayerMenu(false); setAppView('settings'); }} className="text-brand-secondary hover:underline">{LANGUAGES[language].manage}</button>
                            </div>
                            <div className="flex items-center justify-between py-1.5 cursor-pointer hover:bg-gray-50 rounded px-1.5 transition-colors" onClick={() => toggleLayerTag('none')}>
                               <div className="flex items-center gap-2">
                                  <Tag size={12} className="text-gray-400" />
                                  <span className="text-xs font-bold text-gray-700">{LANGUAGES[language].noTag}</span>
                               </div>
                               {layerVisibility.tags['none'] !== false ? <Eye size={16} className="text-gray-500" /> : <EyeOff size={16} className="text-gray-300" />}
                            </div>
                            {tags.map(t => (
                               <div key={t.id} className="flex items-center justify-between py-1.5 cursor-pointer hover:bg-gray-50 rounded px-1.5 transition-colors" onClick={() => toggleLayerTag(t.id)}>
                                  <div className="flex items-center gap-2">
                                     <Tag size={12} className="text-brand-secondary" />
                                     <span className="text-xs font-bold text-gray-700">{t.name}</span>
                                  </div>
                                  {layerVisibility.tags[t.id] !== false ? <Eye size={16} className="text-gray-500" /> : <EyeOff size={16} className="text-gray-300" />}
                               </div>
                            ))}
                          </div>
                          <div className="w-full h-px bg-gray-100"></div>
                          <div>
                            <div className="text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-wider px-1 flex items-center justify-between">
                              <span>{LANGUAGES[language].byAssignee}</span>
                            </div>
                            <div className="flex items-center justify-between py-1.5 cursor-pointer hover:bg-gray-50 rounded px-1.5 transition-colors" onClick={() => toggleLayerAssignee('unassigned')}>
                               <div className="flex items-center gap-2">
                                  <div className="w-4 h-4 rounded-full bg-gray-200 flex items-center justify-center text-gray-500"><User size={10}/></div>
                                  <span className="text-xs font-bold text-gray-700">{LANGUAGES[language].unassigned}</span>
                               </div>
                               {layerVisibility.assignees['unassigned'] !== false ? <Eye size={16} className="text-gray-500" /> : <EyeOff size={16} className="text-gray-300" />}
                            </div>
                            {users.map(u => (
                               <div key={u.id} className="flex items-center justify-between py-1.5 cursor-pointer hover:bg-gray-50 rounded px-1.5 transition-colors" onClick={() => toggleLayerAssignee(u.id)}>
                                  <div className="flex items-center gap-2">
                                     <UserAvatar user={u} size="w-4 h-4" iconSize={10} />
                                     <span className="text-xs font-bold text-gray-700">{u.name}</span>
                                  </div>
                                  {layerVisibility.assignees[u.id] !== false ? <Eye size={16} className="text-gray-500" /> : <EyeOff size={16} className="text-gray-300" />}
                               </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="absolute bottom-6 left-6 z-20 flex gap-2 pointer-events-auto">
                    <button 
                      onClick={() => setShowMinimap(!showMinimap)}
                      className={`p-2 rounded-lg border shadow-sm transition-colors flex items-center gap-1.5 ${showMinimap ? 'bg-brand-primary/10 border-brand-primary/20 text-brand-primary' : 'bg-white border-gray-200 hover:bg-gray-50 text-gray-500'}`}
                      title={LANGUAGES[language].toggleMinimap}
                    >
                      <MapIcon size={18} />
                    </button>
                    
                    <div className="relative">
                      <button 
                        onClick={() => setShowDisplaySettings(!showDisplaySettings)}
                        className={`p-2 rounded-lg border shadow-sm transition-colors flex items-center gap-1.5 ${showDisplaySettings ? 'bg-brand-secondary/10 border-brand-secondary/20 text-brand-secondary' : 'bg-white border-gray-200 hover:bg-gray-50 text-gray-500'}`}
                        title={LANGUAGES[language].displaySettings}
                      >
                        <SlidersHorizontal size={18} />
                      </button>

                      {showDisplaySettings && (
                        <div className="absolute bottom-full left-0 mb-2 bg-white border border-gray-200 shadow-xl rounded-lg p-4 w-64 text-sm font-bold">
                          <div className="flex items-center gap-2 mb-4 text-black"><Sun size={16}/> 圖面顯示設定</div>
                          <div className="space-y-4">
                            <div>
                              <div className="flex justify-between text-xs text-gray-500 mb-1"><span>亮度</span><span>{imageFilters.brightness}%</span></div>
                              <input type="range" min="50" max="200" value={imageFilters.brightness} onChange={e => setImageFilters({...imageFilters, brightness: e.target.value})} className="w-full accent-brand-secondary" />
                            </div>
                            <div>
                              <div className="flex justify-between text-xs text-gray-500 mb-1"><span>對比度</span><span>{imageFilters.contrast}%</span></div>
                              <input type="range" min="50" max="200" value={imageFilters.contrast} onChange={e => setImageFilters({...imageFilters, contrast: e.target.value})} className="w-full accent-brand-secondary" />
                            </div>
                            <div className="flex gap-2 pt-2 border-t border-gray-100">
                              <button onClick={()=>setImageFilters({...imageFilters, invert: !imageFilters.invert})} className={`flex-1 py-1.5 rounded text-xs border ${imageFilters.invert ? 'bg-gray-800 text-white border-gray-800' : 'bg-gray-50 text-gray-700 hover:bg-gray-100'}`}>負片反轉</button>
                              <button onClick={()=>setImageFilters({...imageFilters, grayscale: !imageFilters.grayscale})} className={`flex-1 py-1.5 rounded text-xs border ${imageFilters.grayscale ? 'bg-gray-400 text-white border-gray-400' : 'bg-gray-50 text-gray-700 hover:bg-gray-100'}`}>灰階模式</button>
                            </div>
                            <button onClick={()=>setImageFilters({brightness: 100, contrast: 100, invert: false, grayscale: false})} className="w-full py-1.5 text-xs text-gray-400 hover:text-black">重設為預設值</button>
                          </div>
                        </div>
                      )}
                    </div>
                    
                    <div className="relative bg-white shadow-sm border border-gray-200 rounded-lg px-3 py-2 flex items-center gap-2 pointer-events-auto h-[38px]">
                      <Maximize size={14} className={scaleInfo.isCalibrated ? "text-brand-primary" : "text-gray-500"} />
                      <div className={`text-xs font-bold ${scaleInfo.isCalibrated ? "text-brand-primary" : "text-gray-700"}`}>
                        {scaleInfo.isCalibrated ? `${LANGUAGES[language].scaleLabel} 1 : ${Math.round(scaleInfo.ratio)}` : `${LANGUAGES[language].scaleLabel}: ${LANGUAGES[language].scaleNotCalibrated}`}
                      </div>
                      {scaleInfo.isCalibrated && !isReadOnly && (
                        <button onClick={() => setScaleInfo({ ratio: 1, unit: 'mm', isCalibrated: false })} className="ml-2 text-gray-400 hover:text-brand-danger bg-gray-100 hover:bg-brand-danger/10 rounded-full p-0.5 transition-colors" title={LANGUAGES[language].clearScale}>
                          <X size={12} />
                        </button>
                      )}
                      <button
                        type="button"
                        onClick={() => {
                          setShowSopGuide(prev => {
                            if (!prev) setShowHelpGuide(false);
                            return !prev;
                          });
                        }}
                        className={`inline-flex items-center gap-1 px-2 py-1 text-xs font-semibold rounded-full transition-colors ${showSopGuide ? 'bg-brand-secondary text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                        title={LANGUAGES[language].openSOPGuide}
                      >
                        <FileText size={14} />
                        {LANGUAGES[language].sop}
                      </button>

                      <button
                        type="button"
                        onClick={() => {
                          setShowHelpGuide(prev => {
                            if (!prev) setShowSopGuide(false);
                            return !prev;
                          });
                        }}
                        className={`inline-flex items-center gap-1 px-2 py-1 text-xs font-semibold rounded-full transition-colors ${showHelpGuide ? 'bg-brand-primary text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                        title={LANGUAGES[language].toggleOperationGuide}
                      >
                        <HelpCircle size={14} />
                        {LANGUAGES[language].guide}
                      </button>

                      {showSopGuide && (
                        <div className="absolute bottom-full right-0 mb-2 w-80 bg-white border border-gray-200 shadow-2xl rounded-xl p-4 text-sm text-gray-700 space-y-3 z-40">
                          <div className="flex items-center justify-between gap-2">
                            <span className="font-bold text-gray-900">{LANGUAGES[language].sopTitle}</span>
                            <button type="button" onClick={() => setShowSopGuide(false)} className="text-gray-400 hover:text-gray-800"><X size={16} /></button>
                          </div>
                          <div className="space-y-2 text-xs leading-relaxed">
                            <p className="font-semibold text-gray-800">快速上手</p>
                            <p>• 左側工具列：新增任務、篩選人員、管理標籤與章節。</p>
                            <p>• 中央工作區：拖曳任務條排程，拖曳右側邊緣調整結束日期。</p>
                            <p>• 上方比例尺與顯示設定：校正圖面比例、調整亮度/対比。</p>
                            <p>• 右下放大 / 縮小：快速檢視整體圖面。</p>
                            <p>• 支援離線儲存，重新開啟瀏覽器可繼續使用。</p>
                          </div>
                        </div>
                      )}

                      {showHelpGuide && (
                        <div className="absolute bottom-full right-0 mb-2 w-72 bg-white border border-gray-200 shadow-2xl rounded-xl p-4 text-sm text-gray-700 space-y-3 z-40">
                          <div className="flex items-center justify-between gap-2">
                            <span className="font-bold text-gray-900">{LANGUAGES[language].helpTitle}</span>
                            <button type="button" onClick={() => setShowHelpGuide(false)} className="text-gray-400 hover:text-gray-800"><X size={16} /></button>
                          </div>
                          {isTouchDevice ? (
                            <div className="space-y-2 text-xs leading-relaxed">
                              <p className="font-semibold text-gray-800">iPad / 觸控操作</p>
                              <p>• 點擊任務條：開啟任務編輯或選取。</p>
                              <p>• 拖曳任務條：移動任務日期。</p>
                              <p>• 拖曳任務條右側邊緣：調整結束日期。</p>
                              <p>• 先點前置任務，再點後續任務：建立 Finish-to-Start 依賴。</p>
                              <p>• 右上 X 或再次點擊「指南」：關閉說明。</p>
                            </div>
                          ) : (
                            <div className="space-y-2 text-xs leading-relaxed">
                              <p className="font-semibold text-gray-800">電腦版快捷鍵</p>
                              <p>• F1 或 ?：開啟 / 關閉說明。</p>
                              <p>• Esc：關閉說明。</p>
                              <p>• 點擊任務條：編輯或選取任務。</p>
                              <p>• 拖曳任務條：移動任務日期。</p>
                              <p>• 拖曳任務條右側邊緣：調整結束日期。</p>
                              <p>• 先點前置任務，再點後續任務：建立 Finish-to-Start 依賴。</p>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>

                  {showMinimap && (
                    <div 
                      ref={minimapRef}
                      className="absolute bottom-20 left-6 z-20 w-48 h-[134px] bg-white shadow-xl border border-gray-300 rounded-lg overflow-hidden cursor-crosshair touch-none print:hidden pointer-events-auto"
                      onPointerDown={handleMinimapPointerDown}
                      onPointerMove={handleMinimapPointerMove}
                      onPointerUp={handleMinimapPointerUp}
                      onPointerCancel={handleMinimapPointerUp}
                      onPointerLeave={handleMinimapPointerUp}
                    >
                      {viewMode === 'pdf' ? (
                        <div className="w-full h-full bg-white flex flex-col items-center justify-center text-gray-300 border border-gray-100">
                            <FileText size={24} className="mb-1" />
                            <span className="text-[10px] font-bold">PDF 圖紙</span>
                        </div>
                      ) : backgroundImage ? (
                        <img src={backgroundImage} alt="Minimap" className="w-full h-full object-cover opacity-60 grayscale blur-[0.5px]" draggable={false} />
                      ) : (
                        <div className="w-full h-full bg-[#f8fafc]" style={{ backgroundImage: 'linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px)', backgroundSize: '12px 12px' }} />
                      )}
                      
                      <div 
                        className="absolute border-[1.5px] border-brand-primary bg-brand-primary/20 shadow-sm pointer-events-none transition-transform duration-75"
                        style={{
                          left: `${(-pan.x / (1200 * scale)) * 100}%`,
                          top: `${(-pan.y / (840 * scale)) * 100}%`,
                          width: `${(viewportSize.w / (1200 * scale)) * 100}%`,
                          height: `${(viewportSize.h / (840 * scale)) * 100}%`,
                          boxShadow: '0 0 0 9999px rgba(0,0,0,0.1)' 
                        }}
                      />
                    </div>
                  )}
                  
                  {viewMode === 'pdf' && totalPages > 1 && (
                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 bg-white shadow-sm rounded-full px-1.5 py-1.5 flex items-center gap-4 border border-gray-200">
                      <button onClick={() => {
                        setCurrentPage(p => {
                          const next = Math.max(1, p - 1);
                          if (compareMode) setOldCurrentPage(next);
                          return next;
                        });
                      }} disabled={currentPage === 1} className="p-1.5 hover:bg-gray-100 disabled:opacity-30 rounded-full"><ChevronLeft size={16} /></button>
                      <span className="text-xs font-bold font-mono min-w-[80px] text-center">{currentPage} / {compareMode && oldPdfDocument ? Math.min(totalPages, oldTotalPages) : totalPages}</span>
                      <button onClick={() => {
                        setCurrentPage(p => {
                          const next = Math.min(totalPages, p + 1);
                          if (compareMode) setOldCurrentPage(next);
                          return next;
                        });
                      }} disabled={currentPage === totalPages} className="p-1.5 hover:bg-gray-100 disabled:opacity-30 rounded-full"><ChevronRight size={16} /></button>
                    </div>
                  )}

                  <div className="absolute bottom-6 right-6 z-20 flex flex-col gap-2 items-end pointer-events-auto">
                    <div className="bg-white shadow-sm border rounded-lg p-1.5 flex flex-col gap-1">
                      <button onClick={() => handleZoomStep(0.2)} className="p-1.5 hover:bg-gray-100 rounded text-gray-700"><Plus size={16} /></button>
                      <div className="w-full h-px bg-gray-100" />
                      <button onClick={resetView} className="p-1.5 hover:bg-gray-100 rounded text-[10px] font-bold">置中</button>
                      <div className="w-full h-px bg-gray-100" />
                      <button onClick={() => handleZoomStep(-0.2)} className="p-1.5 hover:bg-gray-100 rounded text-gray-700"><Minus size={16} /></button>
                    </div>
                  </div>

                  <div className="absolute origin-top-left pointer-events-none" style={{ transform: `translate3d(${pan.x}px, ${pan.y}px, 0) scale(${scale})`, width: '1200px' }}>
                    <div className={`relative inline-block w-full bg-white ${scale > 1.5 ? 'shadow-sm' : 'shadow-2xl'} ${!isSpacePressed && !isPanning && addMode !== 'none' ? 'cursor-crosshair' : ''}`} style={{ pointerEvents: isSpacePressed || isPanning ? 'none' : 'auto' }} onPointerDown={!isSpacePressed ? handleContentPointerDown : undefined} onPointerMove={!isSpacePressed ? handleContentPointerMove : undefined} onPointerUp={!isSpacePressed ? handleContentPointerUp : undefined} onPointerLeave={!isSpacePressed ? handleContentPointerUp : undefined} onPointerCancel={!isSpacePressed ? handleContentPointerUp : undefined}>
                      
                      <div style={filterStyle} className="w-full">
                        {isRendering && viewMode === 'pdf' && <div className="absolute inset-0 z-40 bg-white/80 backdrop-blur-sm flex items-center justify-center"><Loader2 className="w-6 h-6 animate-spin mb-3 text-black" /></div>}
                        {viewMode === 'dxf' ? (
                          <div ref={dxfContainerRef} className="relative w-full h-full bg-white overflow-hidden" style={{ minHeight: '840px' }} />
                        ) : compareMode && oldPdfDocument && pdfDocument ? (
                          <div className="relative w-full">
                            <canvas ref={oldCanvasRef} className="w-full block bg-white" style={{ opacity: 0.46, filter: 'grayscale(100%) sepia(1) hue-rotate(-20deg) saturate(8) brightness(0.85)' }} />
                            <canvas ref={canvasRef} className="absolute inset-0 w-full h-full block bg-white" style={{ opacity: 0.46, filter: 'grayscale(100%) sepia(1) hue-rotate(180deg) saturate(8) brightness(0.85)' }} />
                            <div className="absolute top-3 left-3 z-30 rounded-full bg-black/60 text-white text-[11px] px-2 py-1 flex items-center gap-2">
                              <span className="w-2 h-2 rounded-full bg-red-400" />舊版
                            </div>
                            <div className="absolute top-12 left-3 z-30 rounded-full bg-black/60 text-white text-[11px] px-2 py-1 flex items-center gap-2">
                              <span className="w-2 h-2 rounded-full bg-blue-400" />新版
                            </div>
                          </div>
                        ) : viewMode === 'pdf' ? (
                          <canvas ref={canvasRef} className="w-full block bg-white" />
                        ) : backgroundImage ? (
                          <img src={backgroundImage} alt="BP" className="w-full block opacity-95 sepia hue-rotate-[190deg] saturate-200 contrast-125 brightness-90" draggable={false} />
                        ) : (
                          <div className="w-full bg-[#f8fafc]" style={{ height: '840px', backgroundImage: 'linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px)', backgroundSize: '40px 40px' }} />
                        )}
                      </div>

                      {filteredTasks.filter(t => t.page === currentPage).map(task => {
                        const isDragging = draggingMarker && draggingMarker.id === task.id;
                        const displayTask = isDragging ? { ...task, x: draggingMarker.curX, y: draggingMarker.curY } : task;

                        const props = { 
                          key: task.id, 
                          task: displayTask, 
                          isActive: activeTaskId === task.id, 
                          onClick: () => { 
                            if (markerDragInfo.current.hasMoved) return; 
                            if (addMode === 'none') setActiveTaskId(task.id); 
                          }, 
                          onContextMenu: (e) => handleTaskContextMenu(e, task),
                          onPointerDown: (e) => handleMarkerDragStart(e, task),
                          onPointerMove: handleMarkerDragMove,
                          onPointerUp: handleMarkerDragEnd,
                          onPointerCancel: handleMarkerDragEnd,
                          showLockIcons: showLockIcons,
                          STATUS_CONFIG: STATUS_CONFIG
                        };
                        
                        if (task.type === 'cloud') return <CloudMark {...props} />;
                        if (task.type === 'area') return <AreaMark {...props} />;
                        if (task.type === 'highlight') return <HighlightMark {...props} />;
                        if (task.type === 'pen') return <PenMark {...props} />;
                        if (task.type === 'stamp') return <StampMark {...props} />;
                        return <PinMark {...props} />;
                      })}

                      {/* --- 暫存的筆跡 (尚未轉換成正式任務) --- */}
                      {pendingDrawing && pendingDrawing.page === currentPage && (pendingDrawing.mode === 'highlight' || pendingDrawing.mode === 'pen') && (
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full pointer-events-none z-30">
                          {pendingDrawing.paths.map((path, idx) => (
                            <polyline 
                              key={idx} 
                              points={path.map(p => `${p.x},${p.y}`).join(' ')} 
                              fill="none" 
                              stroke={pendingDrawing.colorId && pendingDrawing.colorId.startsWith('#') ? pendingDrawing.colorId : (MARKER_COLORS.find(c => c.id === pendingDrawing.colorId)?.stroke || '#000')} 
                              strokeWidth={pendingDrawing.mode === 'highlight' ? "12" : "3"} 
                              strokeLinecap="round" 
                              strokeLinejoin="round" 
                              opacity={pendingDrawing.mode === 'highlight' ? "0.4" : "1"} 
                              vectorEffect="non-scaling-stroke" 
                            />
                          ))}
                        </svg>
                      )}

                      {isDrawing && addMode === 'cloud' && drawStart && drawCurrent && <div className="absolute border-2 border-gray-800 border-dashed bg-black/5 z-40 pointer-events-none" style={{ left: `${Math.min(drawStart.x, drawCurrent.x)}%`, top: `${Math.min(drawStart.y, drawCurrent.y)}%`, width: `${Math.abs(drawCurrent.x - drawStart.x)}%`, height: `${Math.abs(drawCurrent.y - drawStart.y)}%` }} />}
                      
                      {isDrawing && (addMode === 'highlight' || addMode === 'pen') && drawPoints.length > 0 && (
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full pointer-events-none z-40">
                          <polyline points={drawPoints.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke={activeColor.stroke} strokeWidth={addMode === 'highlight' ? "12" : "3"} strokeLinecap="round" strokeLinejoin="round" opacity={addMode === 'highlight' ? "0.4" : "1"} vectorEffect="non-scaling-stroke" />
                          {drawPoints.length > 0 && (
                            <circle cx={drawPoints[drawPoints.length - 1].x} cy={drawPoints[drawPoints.length - 1].y} r={addMode === 'highlight' ? 1.2 : 0.8} fill={activeColor.stroke} opacity="0.9" vectorEffect="non-scaling-stroke" />
                          )}
                        </svg>
                      )}
                      
                      {isDrawing && addMode === 'area' && drawPoints.length > 0 && (
                        <div className="absolute inset-0 pointer-events-none z-40">
                          <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full" style={{ overflow: 'visible' }}>
                            <polygon 
                              points={[...drawPoints, drawCurrent].filter(Boolean).map(p => `${p.x},${p.y}`).join(' ')} 
                              fill="#0067a6" fillOpacity="0.2" stroke="#0067a6" strokeWidth="2" strokeDasharray="4,4" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" 
                            />
                            {drawPoints.length >= 3 && (
                               <circle cx={drawPoints[0].x} cy={drawPoints[0].y} r="0.8" fill="#f2572d" opacity="0.8" className="animate-pulse" vectorEffect="non-scaling-stroke" />
                            )}
                            {drawPoints.map((p, i) => (
                               <circle key={i} cx={p.x} cy={p.y} r="0.4" fill="#0067a6" vectorEffect="non-scaling-stroke" />
                            ))}
                          </svg>
                          
                          {drawPoints.length >= 2 && drawCurrent && (
                            <div 
                              className="absolute bg-brand-primary text-white text-[11px] font-bold px-2 py-1 rounded shadow-md transform -translate-x-1/2 -translate-y-full flex items-center gap-1 whitespace-nowrap"
                              style={{ left: `${drawCurrent.x}%`, top: `calc(${drawCurrent.y}% - 10px)` }}
                            >
                              {(() => {
                                const pts = [...drawPoints, drawCurrent];
                                let areaPx2 = 0;
                                for (let i = 0; i < pts.length; i++) {
                                    const j = (i + 1) % pts.length;
                                    areaPx2 += (pts[i].x * 12) * (pts[j].y * 12) - (pts[j].x * 12) * (pts[i].y * 12);
                                }
                                areaPx2 = Math.abs(areaPx2) / 2;
                                return formatArea(areaPx2, scaleInfo.ratio, scaleInfo.unit, scaleInfo.isCalibrated);
                              })()}
                            </div>
                          )}
                          
                          <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-black/70 text-white text-xs px-3 py-1.5 rounded-full whitespace-nowrap font-bold tracking-wider shadow-sm pointer-events-none">
                            點擊圖面新增頂點，點擊起點（紅點）即可完成測量
                          </div>
                        </div>
                      )}

                      {areaResult && !isDrawing && (
                        <div className="absolute inset-0 pointer-events-none z-40">
                          <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full" style={{ overflow: 'visible' }}>
                            <polygon points={areaResult.points.map(p => `${p.x},${p.y}`).join(' ')} fill="#0067a6" fillOpacity="0.2" stroke="#0067a6" strokeWidth="2" strokeDasharray="4,4" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />
                            {areaResult.points.map((p, i) => (
                               <circle key={i} cx={p.x} cy={p.y} r="0.4" fill="#0067a6" vectorEffect="non-scaling-stroke" />
                            ))}
                          </svg>
                          <div 
                            className="absolute bg-brand-primary text-white text-xs font-bold px-2 py-1 rounded shadow-md transform -translate-x-1/2 -translate-y-full flex items-center gap-1.5 whitespace-nowrap"
                            style={{ left: `${areaResult.points[areaResult.points.length-1].x}%`, top: `calc(${areaResult.points[areaResult.points.length-1].y}% - 10px)` }}
                          >
                            <Hexagon size={12} /> {areaResult.area}
                          </div>
                        </div>
                      )}

                      {isDrawing && (addMode === 'measure' || addMode === 'calibrate') && drawStart && drawCurrent && (
                        <div className="absolute inset-0 pointer-events-none z-40">
                          <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full" style={{ overflow: 'visible' }}>
                            <line x1={drawStart.x} y1={drawStart.y} x2={drawCurrent.x} y2={drawCurrent.y} stroke={addMode === 'calibrate' ? '#0067a6' : '#00abd8'} strokeWidth="2.5" strokeDasharray="6,6" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
                            <circle cx={drawStart.x} cy={drawStart.y} r="0.2" fill={addMode === 'calibrate' ? '#0067a6' : '#00abd8'} vectorEffect="non-scaling-stroke" />
                            <circle cx={drawCurrent.x} cy={drawCurrent.y} r="0.2" fill={addMode === 'calibrate' ? '#0067a6' : '#00abd8'} vectorEffect="non-scaling-stroke" />
                          </svg>
                          <div 
                            className={`absolute text-white text-[11px] font-bold px-2 py-1 rounded shadow-md transform -translate-x-1/2 -translate-y-full flex items-center gap-1 whitespace-nowrap ${addMode === 'calibrate' ? 'bg-brand-primary' : 'bg-brand-secondary'}`}
                            style={{ left: `${drawCurrent.x}%`, top: `calc(${drawCurrent.y}% - 10px)` }}
                          >
                            {(() => {
                              const logicalDist = Math.hypot((drawCurrent.x - drawStart.x) * 12, (drawCurrent.y - drawStart.y) * 12);
                              if (addMode === 'calibrate') return "拉出長度設定比例...";
                              const distance = scaleInfo.isCalibrated ? Math.round(logicalDist * scaleInfo.ratio) : Math.round(logicalDist);
                              return `${new Intl.NumberFormat('en-US').format(distance)} mm`;
                            })()}
                          </div>
                        </div>
                      )}

                      {measureResult && !isDrawing && (
                        <div className="absolute inset-0 pointer-events-none z-40">
                          <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full" style={{ overflow: 'visible' }}>
                            <line x1={measureResult.p1.x} y1={measureResult.p1.y} x2={measureResult.p2.x} y2={measureResult.p2.y} stroke="#00abd8" strokeWidth="2.5" strokeDasharray="6,6" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
                            <circle cx={measureResult.p1.x} cy={measureResult.p1.y} r="0.2" fill="#00abd8" vectorEffect="non-scaling-stroke" />
                            <circle cx={measureResult.p2.x} cy={measureResult.p2.y} r="0.2" fill="#00abd8" vectorEffect="non-scaling-stroke" />
                          </svg>
                          <div 
                            className="absolute bg-brand-secondary text-white text-xs font-bold px-2 py-1 rounded shadow-md transform -translate-x-1/2 -translate-y-full flex items-center gap-1.5 whitespace-nowrap"
                            style={{ left: `${measureResult.p2.x}%`, top: `calc(${measureResult.p2.y}% - 10px)` }}
                          >
                            <Ruler size={12} /> {new Intl.NumberFormat('en-US').format(measureResult.distance)} {measureResult.unit}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </>
            )}

          </div>

          {showCalibrateModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-md border border-gray-200 overflow-hidden">
                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white">
                  <h3 className="text-lg font-black flex items-center gap-2 text-black"><Maximize size={18} className="text-brand-primary"/>設定圖面比例尺</h3>
                  <button onClick={() => setShowCalibrateModal(false)} className="text-gray-400 hover:bg-gray-100 hover:text-black transition-colors rounded p-1"><X size={18} /></button>
                </div>
                
                <div className="p-6 space-y-5 bg-gray-50/50">
                  <div className="text-xs font-bold text-gray-500 mb-2">系統已記錄您繪製的參考線 ({calibrateData.logicalDist.toFixed(1)} 單位)。請選擇校正方式：</div>
                  
                  <div 
                    className={`p-4 border-2 rounded-lg cursor-pointer transition-all ${calibMode === 'auto' ? 'border-brand-primary bg-brand-primary/10 shadow-sm' : 'border-gray-200 bg-white hover:border-brand-primary/40'}`} 
                    onClick={() => setCalibMode('auto')}
                  >
                    <label className="flex items-center gap-2 font-bold text-sm mb-3 cursor-pointer text-gray-800">
                      <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center transition-colors ${calibMode === 'auto' ? 'border-brand-primary' : 'border-gray-300'}`}>
                        {calibMode === 'auto' && <div className="w-2 h-2 bg-brand-primary rounded-full" />}
                      </div>
                      依照線段真實長度反推
                    </label>
                    <div className="flex gap-2 pl-6">
                      <input type="number" value={calibInput.dist} onChange={e => setCalibInput({...calibInput, dist: e.target.value})} className={INPUT_CLASS} placeholder="實際長度" onClick={e => setCalibMode('auto')} />
                      <select value={calibInput.unit} onChange={e => setCalibInput({...calibInput, unit: e.target.value})} className={INPUT_CLASS} onClick={e => setCalibMode('auto')}>
                         <option value="mm">mm</option><option value="cm">cm</option><option value="m">m</option>
                      </select>
                    </div>
                    <div className="text-xs mt-3 pl-6 font-bold text-brand-primary">
                      {(()=>{
                         const val = parseFloat(calibInput.dist);
                         if(!val) return '換算比例: (請輸入長度)';
                         const mm = calibInput.unit === 'm' ? val * 1000 : calibInput.unit === 'cm' ? val * 10 : val;
                         return `換算比例約 1 : ${Math.round(mm / calibrateData.logicalDist)}`;
                      })()}
                    </div>
                  </div>

                  <div 
                    className={`p-4 border-2 rounded-lg cursor-pointer transition-all ${calibMode === 'manual' ? 'border-brand-primary bg-brand-primary/10 shadow-sm' : 'border-gray-200 bg-white hover:border-brand-primary/40'}`} 
                    onClick={() => setCalibMode('manual')}
                  >
                    <label className="flex items-center gap-2 font-bold text-sm mb-3 cursor-pointer text-gray-800">
                      <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center transition-colors ${calibMode === 'manual' ? 'border-brand-primary' : 'border-gray-300'}`}>
                        {calibMode === 'manual' && <div className="w-2 h-2 bg-brand-primary rounded-full" />}
                      </div>
                      直接設定標準比例尺 (1:N)
                    </label>
                    <div className="flex items-center gap-3 pl-6">
                      <span className="font-bold text-lg text-gray-700">1 : </span>
                      <input type="number" value={manualRatio} onChange={e => setManualRatio(e.target.value)} className={INPUT_CLASS} placeholder="如 100, 200..." onClick={e => setCalibMode('manual')} />
                    </div>
                    <div className="text-[11px] mt-2 pl-6 font-medium text-gray-500">
                      適用於已知圖面比例の狀況 (例如輸入 100 代表 1:100)
                    </div>
                  </div>
                </div>

                <div className="px-6 py-4 bg-white flex justify-end gap-3 border-t border-gray-200">
                  <button onClick={() => setShowCalibrateModal(false)} className="px-4 py-2 text-sm font-bold text-gray-700 border border-gray-300 rounded-md hover:bg-gray-100 transition-colors">取消</button>
                  <button 
                    onClick={() => {
                      let finalRatio = 1;
                      if (calibMode === 'auto') {
                        const val = parseFloat(calibInput.dist);
                        if (!val || val <= 0) return alert('請輸入有效的實際長度');
                        const mm = calibInput.unit === 'm' ? val * 1000 : calibInput.unit === 'cm' ? val * 10 : val;
                        finalRatio = mm / calibrateData.logicalDist;
                      } else {
                        const val = parseFloat(manualRatio);
                        if (!val || val <= 0) return alert('請輸入有效的比例数字');
                        finalRatio = val;
                      }
                      setScaleInfo({ ratio: finalRatio, unit: 'mm', isCalibrated: true });
                      setShowCalibrateModal(false);
                    }} 
                    className="px-5 py-2 text-sm font-bold text-white bg-brand-primary rounded-md hover:opacity-90 transition-colors shadow-sm"
                  >
                    儲存設定
                  </button>
                </div>
              </div>
            </div>
          )}

          {showTaskModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg border border-gray-200 flex flex-col" style={{ maxHeight: '90vh' }}>
                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white rounded-t-xl shrink-0">
                  <h3 className="text-lg font-black flex items-center gap-2 text-gray-900">
                    <TaskIcon type={formData.type || newTaskCoords?.type || (editingId && currentDisplayTasks.find(t=>t.id===editingId)?.type)} colorId={formData.colorId} size={18} />
                    {editingId ? (isReadOnly ? LANGUAGES[language].viewTaskDetails : LANGUAGES[language].editTask) : LANGUAGES[language].newTask}
                  </h3>
                  <button onClick={() => setShowTaskModal(false)} className="text-gray-400 hover:bg-gray-100 rounded p-1"><X size={18} /></button>
                </div>
                
                <div className="p-6 space-y-5 overflow-y-auto bg-gray-50/30 flex-1 relative">
                  <div className="text-xs font-bold bg-white shadow-sm border border-gray-200 px-3 py-1.5 rounded-md flex items-center gap-1.5 w-fit text-gray-700"><FileText size={14} /> 標記位於： 第 {newTaskCoords?.page || currentPage} 頁</div>
                  
                  {!isReadOnly && (formData.type === 'stamp' || newTaskCoords?.type === 'stamp' || (editingId && currentDisplayTasks.find(t=>t.id===editingId)?.type === 'stamp')) && (
                    <div className="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
                      <label className="block text-sm font-bold mb-2 flex items-center gap-1.5 text-gray-800"><Stamp size={14}/> 快速套用常用印章</label>
                      <select value={formData.stampCode} onChange={e => { const s = stamps.find(x => x.code === e.target.value); if(s) setFormData({...formData, stampCode: s.code, title: s.title, description: s.description}); }} className={INPUT_CLASS}>
                        {stamps.map(s => <option key={s.id} value={s.code}>[{s.code}] {s.title}</option>)}
                      </select>
                    </div>
                  )}

                  {!isReadOnly && (formData.type === 'highlight' || formData.type === 'pen') && (
                    <FormField label="標記顏色">
                      <div className="flex flex-col gap-3">
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-bold text-gray-400 w-8">預設:</span>
                          <div className="flex gap-2.5">
                            {MARKER_COLORS.map(c => (
                              <button
                                key={c.id}
                                type="button"
                                className={`w-8 h-8 rounded-full border-2 transition-transform shadow-sm ${formData.colorId === c.id ? 'scale-110 border-black' : 'border-transparent hover:scale-110'}`}
                                style={{ backgroundColor: c.stroke }}
                                onClick={() => setFormData({ ...formData, colorId: c.id })}
                                title={c.name}
                              />
                            ))}
                          </div>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-bold text-gray-400 w-8">自訂:</span>
                          <div className="flex gap-2.5">
                            {customPalette.map((c, idx) => (
                              <button
                                key={`custom-${idx}`}
                                type="button"
                                disabled={c.isEmpty}
                                className={`w-8 h-8 rounded-full border-2 transition-transform shadow-sm ${!c.isEmpty && formData.colorId === c.id ? 'scale-110 border-black' : 'border-transparent hover:scale-110'} ${c.isEmpty ? 'border-dashed border-gray-300 opacity-50 cursor-not-allowed' : ''}`}
                                style={{ backgroundColor: c.isEmpty ? '#f9fafb' : c.stroke }}
                                onClick={() => { if(!c.isEmpty) setFormData({ ...formData, colorId: c.id }) }}
                                title={c.isEmpty ? '尚未設定' : c.name}
                              />
                            ))}
                          </div>
                        </div>
                      </div>
                    </FormField>
                  )}

                  <FormField label={LANGUAGES[language].tradeTag}>
                    <select value={formData.tagId} onChange={e => setFormData({...formData, tagId: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly}>
                      <option value="none">{LANGUAGES[language].noTag}</option>
                      {tags.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                  </FormField>

                  <FormField label={LANGUAGES[language].taskName}><input type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly} /></FormField>
                  <FormField label={LANGUAGES[language].detailDesc}><textarea value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className={INPUT_CLASS} rows="3" disabled={isReadOnly} /></FormField>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <FormField label={LANGUAGES[language].startDate}><input type="date" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly} /></FormField>
                    <FormField label={LANGUAGES[language].endDate}><input type="date" value={formData.endDate} onChange={e => setFormData({...formData, endDate: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly} /></FormField>
                  </div>
                  <div className="grid grid-cols-2 gap-4 pt-2">
                    <FormField label={LANGUAGES[language].status}>
                      <select value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly}>{Object.entries(STATUS_CONFIG).map(([k, c]) => <option key={k} value={k}>{c.label}</option>)}</select>
                    </FormField>
                    <FormField label={LANGUAGES[language].assignee}>
                      <select value={formData.assigneeId} onChange={e => setFormData({...formData, assigneeId: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly}><option value="unassigned">{LANGUAGES[language].unassigned}</option>{users.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}</select>
                    </FormField>
                  </div>

                  <div className="pt-2 border-t border-gray-200">
                    <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider flex items-center gap-1.5"><Camera size={14} />{LANGUAGES[language].sitePhotos}</label>
                    <div className="flex flex-wrap gap-2">
                      {(formData.attachments || []).map((src, idx) => (
                        <div key={idx} className="relative w-16 h-16 rounded border border-gray-200 overflow-hidden group shadow-sm">
                          <img src={src} alt="attachment" className="w-full h-full object-cover" />
                          {!isReadOnly && (
                            <button 
                              onClick={() => setFormData(prev => ({...prev, attachments: prev.attachments.filter((_, i) => i !== idx)}))} 
                              className="absolute top-0 right-0 bg-brand-danger text-white p-0.5 opacity-0 group-hover:opacity-100 transition-opacity"
                            >
                              <X size={12}/>
                            </button>
                          )}
                        </div>
                      ))}
                      
                      {!isReadOnly && (
