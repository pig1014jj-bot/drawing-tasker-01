                            <circle cx={drawCurrent.x} cy={drawCurrent.y} r="0.2" fill={addMode === 'calibrate' ? '#0067a6' : '#00abd8'} vectorEffect="non-scaling-stroke" />
                          </svg>
                          <div 
                            className={`absolute text-white text-[11px] font-bold px-2 py-1 rounded shadow-md transform -translate-x-1/2 -translate-y-full flex items-center gap-1 whitespace-nowrap ${addMode === 'calibrate' ? 'bg-brand-primary' : 'bg-brand-secondary'}`}
                            style={{ left: `${drawCurrent.x}%`, top: `calc(${drawCurrent.y}% - 10px)` }}
                          >
                            {(() => {
                              const logicalDist = Math.hypot((drawCurrent.x - drawStart.x) * 12, (drawCurrent.y - drawStart.y) * 12);
                              if (addMode === 'calibrate') return "拉出長度設定比例...";
                              const distance = scaleInfo.isCalibrated ? Math.round(logicalDist * scaleInfo.ratio) : Math.round(logicalDist);
                              return `${new Intl.NumberFormat('en-US').format(distance)} mm`;
                            })()}
                          </div>
                        </div>
                      )}

                      {measureResult && !isDrawing && (
                        <div className="absolute inset-0 pointer-events-none z-40">
                          <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full" style={{ overflow: 'visible' }}>
                            <line x1={measureResult.p1.x} y1={measureResult.p1.y} x2={measureResult.p2.x} y2={measureResult.p2.y} stroke="#00abd8" strokeWidth="2.5" strokeDasharray="6,6" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
                            <circle cx={measureResult.p1.x} cy={measureResult.p1.y} r="0.2" fill="#00abd8" vectorEffect="non-scaling-stroke" />
                            <circle cx={measureResult.p2.x} cy={measureResult.p2.y} r="0.2" fill="#00abd8" vectorEffect="non-scaling-stroke" />
                          </svg>
                          <div 
                            className="absolute bg-brand-secondary text-white text-xs font-bold px-2 py-1 rounded shadow-md transform -translate-x-1/2 -translate-y-full flex items-center gap-1.5 whitespace-nowrap"
                            style={{ left: `${measureResult.p2.x}%`, top: `calc(${measureResult.p2.y}% - 10px)` }}
                          >
                            <Ruler size={12} /> {new Intl.NumberFormat('en-US').format(measureResult.distance)} {measureResult.unit}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </>
            )}

          </div>

          {/* --- 校正比例尺用モーダル (Calibrate Scale Modal) --- */}
          {showCalibrateModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-md border border-gray-200 overflow-hidden">
                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white">
                  <h3 className="text-lg font-black flex items-center gap-2 text-black"><Maximize size={18} className="text-brand-primary"/>設定圖面比例尺</h3>
                  <button onClick={() => setShowCalibrateModal(false)} className="text-gray-400 hover:bg-gray-100 hover:text-black transition-colors rounded p-1"><X size={18} /></button>
                </div>
                
                <div className="p-6 space-y-5 bg-gray-50/50">
                  <div className="text-xs font-bold text-gray-500 mb-2">系統已記錄您繪製的參考線 ({calibrateData.logicalDist.toFixed(1)} 單位)。請選擇校正方式：</div>
                  
                  <div 
                    className={`p-4 border-2 rounded-lg cursor-pointer transition-all ${calibMode === 'auto' ? 'border-brand-primary bg-brand-primary/10 shadow-sm' : 'border-gray-200 bg-white hover:border-brand-primary/40'}`} 
                    onClick={() => setCalibMode('auto')}
                  >
                    <label className="flex items-center gap-2 font-bold text-sm mb-3 cursor-pointer text-gray-800">
                      <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center transition-colors ${calibMode === 'auto' ? 'border-brand-primary' : 'border-gray-300'}`}>
                        {calibMode === 'auto' && <div className="w-2 h-2 bg-brand-primary rounded-full" />}
                      </div>
                      依照線段真實長度反推
                    </label>
                    <div className="flex gap-2 pl-6">
                      <input type="number" value={calibInput.dist} onChange={e => setCalibInput({...calibInput, dist: e.target.value})} className={INPUT_CLASS} placeholder="實際長度" onClick={e => setCalibMode('auto')} />
                      <select value={calibInput.unit} onChange={e => setCalibInput({...calibInput, unit: e.target.value})} className={INPUT_CLASS} onClick={e => setCalibMode('auto')}>
                         <option value="mm">mm</option><option value="cm">cm</option><option value="m">m</option>
                      </select>
                    </div>
                    <div className="text-xs mt-3 pl-6 font-bold text-brand-primary">
                      {(()=>{
                         const val = parseFloat(calibInput.dist);
                         if(!val) return '換算比例: (請輸入長度)';
                         const mm = calibInput.unit === 'm' ? val * 1000 : calibInput.unit === 'cm' ? val * 10 : val;
                         return `換算比例約 1 : ${Math.round(mm / calibrateData.logicalDist)}`;
                      })()}
                    </div>
                  </div>

                  <div 
                    className={`p-4 border-2 rounded-lg cursor-pointer transition-all ${calibMode === 'manual' ? 'border-brand-primary bg-brand-primary/10 shadow-sm' : 'border-gray-200 bg-white hover:border-brand-primary/40'}`} 
                    onClick={() => setCalibMode('manual')}
                  >
                    <label className="flex items-center gap-2 font-bold text-sm mb-3 cursor-pointer text-gray-800">
                      <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center transition-colors ${calibMode === 'manual' ? 'border-brand-primary' : 'border-gray-300'}`}>
                        {calibMode === 'manual' && <div className="w-2 h-2 bg-brand-primary rounded-full" />}
                      </div>
                      直接設定標準比例尺 (1:N)
                    </label>
                    <div className="flex items-center gap-3 pl-6">
                      <span className="font-bold text-lg text-gray-700">1 : </span>
                      <input type="number" value={manualRatio} onChange={e => setManualRatio(e.target.value)} className={INPUT_CLASS} placeholder="如 100, 200..." onClick={e => setCalibMode('manual')} />
                    </div>
                    <div className="text-[11px] mt-2 pl-6 font-medium text-gray-500">
                      適用於已知圖面比例的狀況 (例如輸入 100 代表 1:100)
                    </div>
                  </div>
                </div>

                <div className="px-6 py-4 bg-white flex justify-end gap-3 border-t border-gray-200">
                  <button onClick={() => setShowCalibrateModal(false)} className="px-4 py-2 text-sm font-bold text-gray-700 border border-gray-300 rounded-md hover:bg-gray-100 transition-colors">取消</button>
                  <button 
                    onClick={() => {
                      let finalRatio = 1;
                      if (calibMode === 'auto') {
                        const val = parseFloat(calibInput.dist);
                        if (!val || val <= 0) return alert('請輸入有效的實際長度');
                        const mm = calibInput.unit === 'm' ? val * 1000 : calibInput.unit === 'cm' ? val * 10 : val;
                        finalRatio = mm / calibrateData.logicalDist;
                      } else {
                        const val = parseFloat(manualRatio);
                        if (!val || val <= 0) return alert('請輸入有效的比例数字');
                        finalRatio = val;
                      }
                      setScaleInfo({ ratio: finalRatio, unit: 'mm', isCalibrated: true });
                      setShowCalibrateModal(false);
                    }} 
                    className="px-5 py-2 text-sm font-bold text-white bg-brand-primary rounded-md hover:opacity-90 transition-colors shadow-sm"
                  >
                    儲存設定
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Task Modal */}
          {showTaskModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg border border-gray-200 flex flex-col" style={{ maxHeight: '90vh' }}>
                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white rounded-t-xl shrink-0">
                  <h3 className="text-lg font-black flex items-center gap-2 text-gray-900">
                    <TaskIcon type={formData.type || newTaskCoords?.type || (editingId && currentDisplayTasks.find(t=>t.id===editingId)?.type)} colorId={formData.colorId} size={18} />
                    {editingId ? (isReadOnly ? '檢視任務詳情' : '編輯任務') : '新增任務'}
                  </h3>
                  <button onClick={() => setShowTaskModal(false)} className="text-gray-400 hover:bg-gray-100 rounded p-1"><X size={18} /></button>
                </div>
                
                <div className="p-6 space-y-5 overflow-y-auto bg-gray-50/30 flex-1 relative">
                  <div className="text-xs font-bold bg-white shadow-sm border border-gray-200 px-3 py-1.5 rounded-md flex items-center gap-1.5 w-fit text-gray-700"><FileText size={14} /> 標記位於： 第 {newTaskCoords?.page || currentPage} 頁</div>
                  
                  {!isReadOnly && (formData.type === 'stamp' || newTaskCoords?.type === 'stamp' || (editingId && currentDisplayTasks.find(t=>t.id===editingId)?.type === 'stamp')) && (
                    <div className="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
                      <label className="block text-sm font-bold mb-2 flex items-center gap-1.5 text-gray-800"><Stamp size={14}/> 快速套用常用印章</label>
                      <select value={formData.stampCode} onChange={e => { const s = stamps.find(x => x.code === e.target.value); if(s) setFormData({...formData, stampCode: s.code, title: s.title, description: s.description}); }} className={INPUT_CLASS}>
                        {stamps.map(s => <option key={s.id} value={s.code}>[{s.code}] {s.title}</option>)}
                      </select>
                    </div>
                  )}

                  {!isReadOnly && (formData.type === 'highlight' || formData.type === 'pen') && (
                    <FormField label="標記顏色">
                      <div className="flex gap-2.5">
                        {MARKER_COLORS.map(c => (
                          <button
                            key={c.id}
                            type="button"
                            className={`w-8 h-8 rounded-full border-2 transition-transform shadow-sm ${formData.colorId === c.id ? 'scale-110' : 'border-transparent hover:scale-110'}`}
                            style={{ backgroundColor: c.stroke, borderColor: formData.colorId === c.id ? '#000' : 'transparent' }}
                            onClick={() => setFormData({ ...formData, colorId: c.id })}
                            title={c.name}
                          />
                        ))}
                      </div>
                    </FormField>
                  )}

                  <FormField label="工種 / 標籤">
                    <select value={formData.tagId} onChange={e => setFormData({...formData, tagId: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly}>
                      <option value="none">無標籤</option>
                      {tags.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                  </FormField>

                  <FormField label="任務名稱"><input type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly} /></FormField>
                  <FormField label="詳細說明"><textarea value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className={INPUT_CLASS} rows="3" disabled={isReadOnly} /></FormField>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <FormField label="開始日期"><input type="date" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly} /></FormField>
                    <FormField label="結束日期"><input type="date" value={formData.endDate} onChange={e => setFormData({...formData, endDate: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly} /></FormField>
                  </div>
                  <div className="grid grid-cols-2 gap-4 pt-2">
                    <FormField label="狀態">
                      <select value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly}>{Object.entries(STATUS_CONFIG).map(([k, c]) => <option key={k} value={k}>{c.label}</option>)}</select>
                    </FormField>
                    <FormField label="經手人員">
                      <select value={formData.assigneeId} onChange={e => setFormData({...formData, assigneeId: e.target.value})} className={INPUT_CLASS} disabled={isReadOnly}><option value="unassigned">未指派</option>{users.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}</select>
                    </FormField>
                  </div>

                  {/* 現場照片與附件上傳區 */}
                  <div className="pt-2 border-t border-gray-200">
                    <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider flex items-center gap-1.5"><Camera size={14} />現場照片 / 附件</label>
                    <div className="flex flex-wrap gap-2">
                      {(formData.attachments || []).map((src, idx) => (
                        <div key={idx} className="relative w-16 h-16 rounded border border-gray-200 overflow-hidden group shadow-sm">
                          <img src={src} alt="attachment" className="w-full h-full object-cover" />
                          {!isReadOnly && (
                            <button 
                              onClick={() => setFormData(prev => ({...prev, attachments: prev.attachments.filter((_, i) => i !== idx)}))} 
                              className="absolute top-0 right-0 bg-brand-danger text-white p-0.5 opacity-0 group-hover:opacity-100 transition-opacity"
                            >
                              <X size={12}/>
                            </button>
                          )}
                        </div>
                      ))}
                      
                      {!isReadOnly && (
                        <label className="w-16 h-16 flex flex-col items-center justify-center bg-gray-50 border border-dashed border-gray-300 rounded cursor-pointer hover:bg-gray-100 transition-colors text-gray-400 hover:text-gray-600 shadow-sm">
                          <Camera size={16} className="mb-1" />
                          <span className="text-[9px] font-bold">上傳照片</span>
                          <input type="file" accept="image/*" capture="environment" multiple className="hidden" onChange={handlePhotoUpload} />
                        </label>
                      )}
                    </div>
                  </div>

                  {/* === 留言板 (聊天氣泡設計) === */}
                  <div className="pt-4 border-t border-gray-200">
                    <label className="block text-xs font-bold text-gray-500 mb-3 uppercase tracking-wider flex items-center gap-1.5"><MessageSquare size={14} /> 討論區</label>
                    
                    {/* コメント一覧 */}
                    <div className="space-y-4 mb-4 max-h-64 overflow-y-auto pr-2 bg-white/50 p-3 rounded-lg border border-gray-100 shadow-inner">
                      {(formData.comments || []).map(c => {
                        const user = users.find(u => u.id === c.userId);
                        const isMe = c.userId === currentUserId;
                        return (
                          <div key={c.id} className={`flex gap-2.5 ${isMe ? 'flex-row-reverse' : ''}`}>
                            <UserAvatar user={user} size="w-8 h-8" iconSize={14} />
                            <div className={`max-w-[80%] flex flex-col ${isMe ? 'items-end' : 'items-start'}`}>
                              <div className={`flex items-baseline gap-1.5 mb-1 ${isMe ? 'flex-row-reverse' : ''}`}>
                                <span className="text-[11px] font-bold text-gray-600">{user?.name || '未知'}</span>
                                <span className="text-[9px] text-gray-400 font-mono">{c.date.split(' ')[1] || c.date}</span>
                              </div>
                              <div className={`px-3.5 py-2 text-sm shadow-sm break-words whitespace-pre-wrap leading-relaxed ${isMe ? 'bg-brand-primary text-white rounded-2xl rounded-tr-sm' : 'bg-white border border-gray-200 text-gray-800 rounded-2xl rounded-tl-sm'}`}>
                                {renderCommentText(c.text, isMe)}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                      {!(formData.comments || []).length && <div className="text-xs text-gray-400 text-center py-6 border border-dashed border-gray-200 rounded-lg">目前沒有留言，輸入 @ 可標記相關人員。</div>}
                    </div>

                    {/* コメント入力部 */}
                    {!isReadOnly && (
                      <div className="relative flex items-end gap-2 bg-gray-100 p-2.5 rounded-xl border border-gray-200 shadow-sm">
                        <div className="relative flex-1">
                          <textarea 
                            ref={commentInputRef}
                            value={commentText}
                            onChange={handleCommentChange}
                            placeholder="輸入留言... 輸入 @ 標記人員"
                            className="w-full border-none bg-transparent px-2 py-1.5 text-sm focus:ring-0 outline-none resize-none min-h-[40px] max-h-24 leading-snug transition-colors placeholder-gray-400"
                            rows="1"
                          />
                          {/* Mention Popup */}
                          {showMentionPopup && (
                            <div className="absolute bottom-full left-0 mb-2 w-48 bg-white border border-gray-200 shadow-2xl rounded-lg overflow-hidden z-50">
                              <div className="px-2 py-1.5 bg-gray-50 border-b border-gray-100 text-[10px] font-bold text-gray-500 uppercase tracking-wider">標記人員</div>
                              <div className="max-h-32 overflow-y-auto p-1">
                                {users.filter(u => u.name.toLowerCase().includes(mentionFilter.toLowerCase())).map(u => (
                                  <button
                                    key={u.id}
                                    onClick={() => insertMention(u.name)}
                                    className="w-full text-left px-2 py-1.5 hover:bg-brand-primary/10 hover:text-brand-primary rounded flex items-center gap-2 transition-colors"
                                  >
                                    <UserAvatar user={u} size="w-5 h-5" />
                                    <span className="text-xs font-bold">{u.name}</span>
                                  </button>
                                ))}
                                {users.filter(u => u.name.toLowerCase().includes(mentionFilter.toLowerCase())).length === 0 && (
                                  <div className="text-xs text-gray-400 p-2 text-center">找不到相符的人員</div>
                                )}
                              </div>
                            </div>
                          )}
                        </div>
                        <button 
                          onClick={handleAddComment}
                          disabled={!commentText.trim()}
                          className="bg-black text-white p-2 rounded-full hover:bg-gray-800 disabled:opacity-30 transition-colors flex-shrink-0 shadow-md transform active:scale-95 disabled:active:scale-100"
                          title="送出留言"
                        >
                          <Send size={16} className="relative -left-0.5" />
                        </button>
                      </div>
                    )}
                  </div>

                  {/* === 活動紀錄區 (Activity History) === */}
                  <div className="pt-3 border-t border-gray-200">
                    <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider flex items-center gap-1.5"><History size={14} />系統活動紀錄</label>
                    <div className="space-y-2 max-h-24 overflow-y-auto bg-white rounded border border-gray-200 p-2 shadow-sm">
                      {(formData.history || []).slice().reverse().map((h, i) => (
                        <div key={i} className="text-[11px] flex items-start gap-2 border-b border-gray-50 pb-1 mb-1 last:border-0 last:pb-0 last:mb-0">
                          <span className="text-gray-400 font-mono whitespace-nowrap">{h.date}</span>
                          <span className="text-gray-700 font-medium">{h.message}</span>
                        </div>
                      ))}
                      {!(formData.history || []).length && <div className="text-xs text-gray-400 text-center py-2">無紀錄</div>}
                    </div>
                  </div>

                </div>
                <div className="px-6 py-4 bg-white flex justify-between gap-3 border-t border-gray-200 rounded-b-xl shrink-0">
                  <div className="flex items-center">
                    {editingId && !isReadOnly && (
                      <a href={getGoogleCalendarUrl(formData)} target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 px-3 py-2 text-sm font-bold text-blue-600 bg-blue-50 rounded-md hover:bg-blue-100 transition-colors">
                        <CalendarPlus size={16} /> 加到 Google 行事曆
                      </a>
                    )}
                  </div>
                  <div className="flex gap-3">
                      <button onClick={() => setShowTaskModal(false)} className="px-4 py-2 text-sm font-bold border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 transition-colors">
                        {isReadOnly ? '關閉' : '取消'}
                      </button>
                      {!isReadOnly && (
                        <button onClick={handleSaveTask} disabled={!formData.title.trim()} className="px-5 py-2 text-sm font-bold text-white bg-brand-primary rounded-md hover:opacity-90 disabled:opacity-50 shadow-sm transition-colors">
                          儲存任務
                        </button>
                      )}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
