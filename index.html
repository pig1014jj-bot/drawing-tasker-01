                               <div className="absolute -top-3 -left-3 bg-brand-danger text-white rounded-full w-6 h-6 flex items-center justify-center text-[11px] font-black border-2 border-white shadow-sm z-10 print:border-none">
                                  {num}
                               </div>
                            </div>
                          );
                        }

                        return (
                          <div key={task.id} className="absolute transform -translate-x-1/2 -translate-y-1/2 pointer-events-none" style={{ left: `${task.x}%`, top: `${task.y}%` }}>
                             <div className="bg-brand-danger text-white rounded-full w-6 h-6 flex items-center justify-center text-[11px] font-black border-2 border-white shadow-sm print:border-none">
                                {num}
                             </div>
                          </div>
                        );
                     })}
                  </div>

                  <div className="break-before-page print:mt-10"></div>

                  <h2 className="text-xl font-black text-black mb-4 border-l-4 border-brand-danger pl-3">圖面詳細清單</h2>
                  
                  <div className="overflow-hidden border border-gray-300 rounded-t-lg">
                    <table className="w-full text-left border-collapse">
                       <thead>
                          <tr className="bg-gray-100 text-gray-800 text-sm border-b-2 border-gray-300">
                             <th className="p-3 w-16 text-center font-black">編號</th>
                             <th className="p-3 font-black">標記名稱 / 說明</th>
                             <th className="p-3 w-28 font-black">狀態</th>
                             <th className="p-3 w-28 font-black">工種</th>
                             <th className="p-3 w-28 font-black">負責人</th>
                          </tr>
                       </thead>
                       <tbody className="text-sm">
                          {filteredTasks.filter(t => t.page === currentPage).length === 0 ? (
                            <tr>
                              <td colSpan="5" className="p-8 text-center text-gray-400 font-bold">此頁面目前沒有紀錄</td>
                            </tr>
                          ) : (
                            filteredTasks.filter(t => t.page === currentPage).map((task, index) => (
                               <tr key={task.id} className="border-b border-gray-200 bg-white">
                                  <td className="p-3 text-center font-black text-lg text-brand-danger">{index + 1}</td>
                                  <td className="p-3">
                                     <div className="font-bold text-gray-900 text-base mb-1">
                                       {task.title}
                                       {task.attachments && task.attachments.length > 0 && <span className="ml-2 inline-flex items-center text-brand-secondary text-[10px] bg-brand-secondary/10 px-1 py-0.5 rounded border border-brand-secondary/20"><ImageIcon size={10} className="mr-1"/> 附照片</span>}
                                     </div>
                                     <div className="text-gray-600 text-xs leading-relaxed mt-1">{task.description || '-'}</div>
                                     {task.type === 'area' && task.area && <div className="text-xs font-bold text-brand-primary mt-1 bg-brand-primary/10 w-fit px-1 rounded">面積: {task.area}</div>}
                                     {(task.type === 'highlight' || task.type === 'pen') && (
                                       <div className="text-[10px] font-bold text-gray-500 mt-1 flex items-center gap-1">
                                          <span className="w-2 h-2 rounded-full inline-block" style={{ backgroundColor: MARKER_COLORS.find(c => c.id === task.colorId)?.stroke || '#efc028' }}></span>
                                          {task.type === 'highlight' ? '螢光筆' : '色筆'} ({MARKER_COLORS.find(c => c.id === task.colorId)?.name || '預設'})
                                       </div>
                                     )}
                                     {task.type === 'stamp' && <div className="text-[10px] font-bold text-gray-500 mt-1 font-mono">印章代碼: [{task.stampCode}]</div>}
                                  </td>
                                  <td className="p-3"><StatusBadge status={task.status} /></td>
                                  <td className="p-3">
                                     {task.tagId && task.tagId !== 'none' ? (
                                       <span className="text-[11px] font-bold text-brand-secondary bg-brand-secondary/10 px-1.5 py-0.5 rounded border border-brand-secondary/20 flex items-center gap-1 w-fit">
                                          <Tag size={10} /> {tags.find(t => t.id === task.tagId)?.name || '未分類'}
                                       </span>
                                     ) : <span className="text-gray-400 text-xs">-</span>}
                                  </td>
                                  <td className="p-3 font-bold text-gray-700 text-sm">{users.find(u => u.id === task.assigneeId)?.name || '未指派'}</td>
                               </tr>
                            ))
                          )}
                       </tbody>
                    </table>
                  </div>

                  {filteredTasks.filter(t => t.page === currentPage && t.attachments && t.attachments.length > 0).length > 0 && (
                    <div className="mt-10 break-inside-auto">
                      <h2 className="text-xl font-black text-black mb-4 border-l-4 border-brand-secondary pl-3">現場照片與附件紀錄</h2>
                      <div className="grid grid-cols-2 gap-6">
                        {filteredTasks.filter(t => t.page === currentPage && t.attachments && t.attachments.length > 0).map((task) => {
                          const taskIndex = filteredTasks.filter(t => t.page === currentPage).findIndex(x => x.id === task.id) + 1;
                          return (
                            <div key={`photo_${task.id}`} className="border border-gray-300 rounded-lg p-4 bg-white break-inside-avoid shadow-sm">
                              <div className="font-bold text-sm text-gray-800 mb-3 border-b border-gray-100 pb-2 flex items-center">
                                 <span className="bg-brand-danger text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-black mr-2 shrink-0">{taskIndex}</span>
                                 <span className="truncate">{task.title}</span>
                              </div>
                              <div className="grid grid-cols-2 gap-2">
                                {task.attachments.map((src, i) => (
                                  <div key={i} className="aspect-square rounded border border-gray-200 overflow-hidden bg-gray-50 flex items-center justify-center">
                                    <img src={src} alt={`照片附件 ${i+1}`} className="w-full h-full object-cover" />
                                  </div>
                                ))}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                </div>
              </div>
            )}

            {/* ================= カンバンビュー (Board View) ================= */}
            {appView === 'board' && (
              <div className="flex-1 flex gap-6 p-8 overflow-x-auto bg-gray-100">
                {Object.entries(STATUS_CONFIG).map(([statusKey, config]) => (
                  <div key={statusKey} className="w-80 flex-shrink-0 flex flex-col max-h-full" onDragOver={e => !isReadOnly && e.preventDefault()} onDrop={e => { 
                    if(isReadOnly) return; 
                    e.preventDefault(); 
                    const tId = e.dataTransfer.getData('taskId'); 
                    if (tId) {
                      const task = tasks.find(t => t.id === tId);
                      if (task && task.status !== statusKey) {
                        const newHistory = [...(task.history || []), { date: getNow(), message: `狀態由「${STATUS_CONFIG[task.status]?.label}」變更為「${STATUS_CONFIG[statusKey]?.label}」` }];
                        updateTasks(tasks.map(t => t.id === tId ? { ...t, status: statusKey, history: newHistory } : t)); 
                      }
                    }
                  }}>
                    <div className="py-3 flex justify-between items-center mb-2">
                      <h3 className="font-bold flex items-center gap-2 text-sm"><span className={`w-2 h-2 rounded-full ${config.color}`} />{config.label}</h3>
                      <span className="text-gray-400 text-xs font-bold bg-gray-200 px-2 py-0.5 rounded-full">{filteredTasks.filter(t => t.status === statusKey).length}</span>
                    </div>
                    <div className="flex-1 overflow-y-auto space-y-3 pb-4 pr-2">
                      {filteredTasks.filter(t => t.status === statusKey).map(task => (
                        <div key={task.id} draggable={!isReadOnly} onDragStart={e => e.dataTransfer.setData('taskId', task.id)} className={`bg-white rounded-lg p-4 shadow-sm border border-gray-200 group ${!isReadOnly && 'cursor-grab hover:shadow-md'}`}>
                          <div className="flex justify-between items-start mb-3">
                            <div className="flex items-center gap-1 text-gray-400">
                              {!isReadOnly && <GripVertical size={14} className="opacity-50" />}
                              <span className="text-[10px] bg-gray-50 px-1.5 border rounded font-mono">P.{task.page}</span>
                            </div>
                            <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                              <button onClick={() => openEditModal(task)} className="p-1 text-gray-400 hover:text-black bg-gray-50 rounded"><Eye size={14} /></button>
                              {!isReadOnly && <button onClick={() => updateTasks(tasks.filter(t=>t.id!==task.id))} className="p-1 text-brand-danger/80 hover:text-brand-danger bg-brand-danger/10 rounded"><Trash2 size={14} /></button>}
                            </div>
                          </div>
                          <h4 className="font-bold text-sm mb-1.5 flex items-start gap-1.5 leading-snug"><TaskIcon type={task.type} colorId={task.colorId} className="mt-0.5" /><span>{task.type === 'stamp' && <span className="bg-gray-100 border px-1 text-[10px] mr-1 rounded-sm">[{task.stampCode}]</span>}{task.title}</span></h4>
                          <p className="text-gray-500 text-xs mb-3 line-clamp-2">{task.description || '無詳細說明'}</p>
                          
                          <div className="flex flex-wrap gap-2 mb-3">
                             {task.tagId && task.tagId !== 'none' && (
                               <span className="text-[10px] font-bold text-brand-secondary bg-brand-secondary/10 px-1.5 py-0.5 rounded border border-brand-secondary/20 flex items-center gap-1 w-fit">
                                 <Tag size={10} /> {tags.find(t => t.id === task.tagId)?.name}
                               </span>
                             )}
                             {task.attachments && task.attachments.length > 0 && (
                               <span className="text-[10px] font-bold text-gray-600 bg-gray-100 px-1.5 py-0.5 rounded border border-gray-200 flex items-center gap-1 w-fit">
                                 <ImageIcon size={10} /> {task.attachments.length} 照片
                               </span>
                             )}
                             {task.comments && task.comments.length > 0 && (
                               <span className="text-[10px] font-bold text-brand-primary bg-brand-primary/10 px-1.5 py-0.5 rounded border border-brand-primary/20 flex items-center gap-1 w-fit">
                                 <MessageSquare size={10} /> {task.comments.length} 留言
                               </span>
                             )}
                          </div>

                          <div className="flex items-center gap-1.5 mb-3"><UserAvatar user={users.find(u => u.id === task.assigneeId)} /><span className="text-[11px] font-medium">{users.find(u => u.id === task.assigneeId)?.name || '未指派'}</span></div>
                          <div className="pt-3 border-t border-gray-100 flex justify-between items-center">
                            <span className="text-[10px] text-gray-400 font-mono">{task.startDate}</span>
                            <button onClick={() => jumpToBlueprintTask(task)} className="text-[11px] font-bold border px-2 py-1 rounded hover:bg-gray-50 flex items-center gap-1"><ExternalLink size={12}/>看圖面</button>
                          </div>
                        </div>
                      ))}
                      {!isReadOnly && <button onClick={() => { setAppView('blueprint'); setAddMode('pin'); }} className="w-full py-2.5 flex items-center justify-center gap-2 text-sm text-gray-500 bg-white hover:bg-gray-50 border border-dashed border-gray-300 rounded-lg font-bold transition-colors"><Plus size={16} /> 新增任務</button>}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* ================= 行事曆ビュー (Calendar View) ================= */}
            {appView === 'calendar' && (
              <div className="flex-1 bg-gray-50 p-6 overflow-hidden flex flex-col">
                {/* Calendar Header */}
                <div className="flex justify-between items-center bg-white p-4 rounded-t-lg border border-gray-200 shadow-sm shrink-0">
                   <div className="flex items-center gap-4">
                     <h2 className="text-xl font-black text-gray-800 w-32">
                       {calendarMonth.getFullYear()}年 {calendarMonth.getMonth() + 1}月
                     </h2>
                     <div className="flex items-center gap-1 bg-gray-100 rounded-lg p-1">
                       <button onClick={() => { const d = new Date(calendarMonth); d.setMonth(d.getMonth() - 1); setCalendarMonth(d); }} className="p-1.5 hover:bg-white rounded shadow-sm transition-all"><ChevronLeft size={16}/></button>
                       <button onClick={() => { const d = new Date(); d.setDate(1); setCalendarMonth(d); }} className="px-3 py-1.5 text-sm font-bold hover:bg-white rounded shadow-sm transition-all text-gray-700">今天</button>
                       <button onClick={() => { const d = new Date(calendarMonth); d.setMonth(d.getMonth() + 1); setCalendarMonth(d); }} className="p-1.5 hover:bg-white rounded shadow-sm transition-all"><ChevronRight size={16}/></button>
                     </div>
                   </div>
                   <div className="flex gap-4 items-center">
                     <div className="flex gap-3 text-xs font-bold text-gray-500 hidden md:flex">
                       {Object.entries(STATUS_CONFIG).map(([k, c]) => (
                         <span key={k} className="flex items-center gap-1.5"><span className={`w-2.5 h-2.5 rounded-full ${c.color}`}></span>{c.label}</span>
                       ))}
                     </div>
                     <button onClick={exportToICal} className="flex items-center gap-1.5 px-3 py-1.5 bg-brand-primary text-white text-sm font-bold rounded-md hover:opacity-90 transition-colors shadow-sm">
                        <CalendarPlus size={16} /> 匯出為 iCal
                     </button>
                   </div>
                </div>

                {/* Calendar Grid */}
                <div className="flex-1 flex flex-col border-x border-b border-gray-200 rounded-b-lg overflow-auto bg-gray-200 gap-px">
                  {/* Days of week */}
                  <div className="grid grid-cols-7 gap-px shrink-0 bg-gray-200">
                    {['日', '一', '二', '三', '四', '五', '六'].map((day, i) => (
                      <div key={day} className={`bg-gray-100 text-center py-2 text-xs font-bold ${i === 0 || i === 6 ? 'text-gray-400' : 'text-gray-600'}`}>{day}</div>
                    ))}
                  </div>
                  {/* Days cells */}
                  <div className="flex-1 grid grid-cols-7 auto-rows-fr gap-px bg-gray-200">
                    {(() => {
                       const year = calendarMonth.getFullYear();
                       const month = calendarMonth.getMonth();
                       const firstDay = new Date(year, month, 1);
                       const startDate = new Date(firstDay);
                       startDate.setDate(startDate.getDate() - startDate.getDay());
                       const days = [];
                       
                       for(let i=0; i<42; i++) {
                         const current = new Date(startDate);
                         current.setDate(startDate.getDate() + i);
                         const pad = n => n.toString().padStart(2,'0');
                         const dateStr = `${current.getFullYear()}-${pad(current.getMonth()+1)}-${pad(current.getDate())}`;
                         const isCurrentMonth = current.getMonth() === month;
                         const isToday = dateStr === getToday();
                         const dayTasks = filteredTasks.filter(t => t.startDate <= dateStr && t.endDate >= dateStr);
                         
                         days.push(
                           <div 
                             key={dateStr} 
                             className={`bg-white min-h-[100px] flex flex-col transition-colors hover:bg-gray-50 ${!isCurrentMonth ? 'bg-gray-50/50 opacity-60' : ''} ${isToday ? 'bg-brand-secondary/5 border-[1.5px] border-brand-secondary' : ''}`}
                             onDragOver={(e) => {
                               if (isReadOnly) return;
                               e.preventDefault();
                               e.currentTarget.classList.add('bg-brand-secondary/10');
                             }}
                             onDragLeave={(e) => {
                               e.currentTarget.classList.remove('bg-brand-secondary/10');
                             }}
                             onDrop={(e) => {
                               if (isReadOnly) return;
                               e.preventDefault();
                               e.currentTarget.classList.remove('bg-brand-secondary/10');
                               const taskId = e.dataTransfer.getData('calendarTaskId');
                               if (taskId) {
                                  const task = tasks.find(t => t.id === taskId);
                                  if (task && task.startDate !== dateStr) {
                                    const oldStart = new Date(task.startDate + 'T00:00:00');
                                    const oldEnd = new Date(task.endDate + 'T00:00:00');
                                    const durationDays = Math.round((oldEnd - oldStart) / 86400000);
                                    
                                    const newStart = new Date(dateStr + 'T00:00:00');
                                    const newEnd = new Date(newStart.getTime() + durationDays * 86400000);
                                    
                                    const formatD = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
                                    
                                    const newHistory = [...(task.history || []), { date: getNow(), message: `透過日曆將開始日期由 ${task.startDate} 改為 ${formatD(newStart)}` }];
                                    updateTasks(tasks.map(t => t.id === taskId ? { ...t, startDate: formatD(newStart), endDate: formatD(newEnd), history: newHistory } : t));
                                  }
                               }
                             }}
                           >
                             <div className="text-right p-1.5 pointer-events-none">
                               <span className={`inline-block w-6 h-6 text-center leading-6 text-xs font-bold rounded-full ${isToday ? 'bg-brand-primary text-white shadow-sm' : 'text-gray-600'}`}>{current.getDate()}</span>
                             </div>
                             <div className="flex-1 px-1 pb-1 space-y-1 overflow-y-auto">
                               {dayTasks.map(task => (
                                 <div 
                                   key={task.id} 
                                   draggable={!isReadOnly}
                                   onDragStart={(e) => {
                                     if (isReadOnly) return;
                                     e.dataTransfer.setData('calendarTaskId', task.id);
                                     e.dataTransfer.effectAllowed = 'move';
                                     setTimeout(() => e.target.classList.add('opacity-50'), 0);
                                   }}
                                   onDragEnd={(e) => {
                                     e.target.classList.remove('opacity-50');
                                   }}
                                   onClick={(e) => { e.stopPropagation(); openEditModal(task); }}
                                   className={`text-[10px] px-1.5 py-0.5 rounded cursor-grab active:cursor-grabbing truncate transition-all hover:brightness-95 text-white shadow-sm ${STATUS_CONFIG[task.status].color}`}
                                   title={task.title}
                                 >
                                   {task.startDate !== dateStr && <span className="opacity-50 mr-1">►</span>}
                                   {task.title}
                                 </div>
                               ))}
                             </div>
                           </div>
                         );
                       }
                       return days;
                    })()}
                  </div>
                </div>
              </div>
            )}

            {/* ================= ガントチャート (Gantt View) ================= */}
            {appView === 'gantt' && (
              <div 
                ref={ganttScrollRef} 
                className="flex-1 bg-gray-50 p-8 overflow-auto flex flex-col gap-4"
                onPointerMove={(e) => {
                  if (ganttInteraction.active) {
                    setGanttInteraction(prev => ({ ...prev, currentX: e.clientX }));
                  }
                }}
                onPointerUp={(e) => {
                  if (ganttInteraction.active) {
                    const dx = e.clientX - ganttInteraction.startX;
                    const deltaDays = Math.round(dx / 40);
                    const task = tasks.find(t => t.id === ganttInteraction.taskId);
                    if (task) {
                      if (deltaDays !== 0) {
                        const oldStart = new Date(ganttInteraction.originalStart + 'T00:00:00');
                        const oldEnd = new Date(ganttInteraction.originalEnd + 'T00:00:00');
                        const pad = n => n.toString().padStart(2, '0');
                        const formatD = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

                        if (ganttInteraction.type === 'move') {
                          const newStart = new Date(oldStart.getTime() + deltaDays * 86400000);
                          const newEnd = new Date(oldEnd.getTime() + deltaDays * 86400000);
                          const newHistory = [...(task.history || []), { date: getNow(), message: `透過進度表拖曳，日期改為 ${formatD(newStart)} ~ ${formatD(newEnd)}` }];
                          updateTasks(tasks.map(t => t.id === task.id ? { ...t, startDate: formatD(newStart), endDate: formatD(newEnd), history: newHistory } : t));
                        } else if (ganttInteraction.type === 'resize') {
                          const newEnd = new Date(oldEnd.getTime() + deltaDays * 86400000);
                          if (newEnd >= oldStart) {
                            const newHistory = [...(task.history || []), { date: getNow(), message: `透過進度表拉伸，結束日期改為 ${formatD(newEnd)}` }];
                            updateTasks(tasks.map(t => t.id === task.id ? { ...t, endDate: formatD(newEnd), history: newHistory } : t));
                          }
                        }
                      } else {
                        // 如果沒有移動，視為點擊，開啟編輯模式
                        openEditModal(task);
                      }
                    }
                    setGanttInteraction({ active: false, type: null, taskId: null, startX: 0, currentX: 0, originalStart: null, originalEnd: null });
                  }
                }}
                onPointerLeave={(e) => {
                  if (ganttInteraction.active) {
                     setGanttInteraction({ active: false, type: null, taskId: null, startX: 0, currentX: 0, originalStart: null, originalEnd: null });
                  }
                }}
              >
                <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex items-center justify-between shrink-0 sticky left-0 z-40 w-max min-w-full">
                   <div className="flex items-center gap-6">
                     <div className="flex items-center gap-2">
                        <span className="font-bold text-sm text-gray-700 flex items-center gap-1.5"><Clock size={16} className="text-brand-secondary"/> 專案總期程：</span>
                        <input type="date" value={projectStartDate} onChange={e => setProjectStartDate(e.target.value)} className="px-3 py-1.5 border border-gray-300 rounded focus:border-brand-primary focus:ring-1 focus:ring-brand-primary outline-none text-sm font-medium transition-all" />
                        <span className="text-gray-500 font-bold">~</span>
                        <input type="date" value={projectEndDate} onChange={e => setProjectEndDate(e.target.value)} className="px-3 py-1.5 border border-gray-300 rounded focus:border-brand-primary focus:ring-1 focus:ring-brand-primary outline-none text-sm font-medium transition-all" />
                     </div>
                     <div className="text-xs text-gray-500 flex items-center gap-1.5">
                        <AlertTriangle size={14} className="text-brand-warning" />
                        若任務時間超出此設定範圍，圖表將自動向外延伸以確保所有任務可見。
                     </div>
                   </div>
                   
                   <button 
                     onClick={handleExportGanttExcel} 
                     className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-md text-sm font-bold shadow-sm hover:bg-green-700 transition-colors ml-4"
                   >
                     <FileSpreadsheet size={16} /> 匯出為 Excel
                   </button>
                </div>

                <div className="border border-gray-200 rounded-lg shadow-sm min-w-max flex-1 bg-white relative">
                  <div className="flex border-b border-gray-200 sticky top-0 bg-gray-50 z-30">
                    <div className="w-72 flex-shrink-0 border-r border-gray-200 p-4 font-bold text-sm sticky left-0 bg-gray-50 z-40">任務列表</div>
                    <div className="flex">
                      {ganttData.days.map((d, i) => {
                        const isToday = d.toISOString().split('T')[0] === getToday();
                        return (
                          <div key={i} className={`w-10 border-r border-gray-200 p-2 flex flex-col items-center ${isToday ? 'bg-brand-warning/20' : [0,6].includes(d.getDay()) ? 'bg-gray-100/50' : ''}`}>
                            <span className={`text-[10px] ${isToday ? 'text-brand-warningDark font-bold' : 'text-gray-400'}`}>{d.getMonth() + 1}月</span>
                            <span className={`text-xs font-bold ${isToday ? 'bg-brand-warning text-white rounded-full w-5 h-5 flex items-center justify-center mt-0.5' : ''}`}>{d.getDate()}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                  <div className="flex flex-col relative z-10">
                    {filteredTasks.length === 0 && <div className="p-8 text-center text-sm font-bold text-gray-400 sticky left-0">沒有符合圖層篩選條件的任務</div>}
                    
                    {ganttTasksByAssignee.map(group => (
                      <React.Fragment key={group.name}>
                        <div 
                          className="flex bg-gray-100/80 border-b border-gray-200 transition-all"
                          onDragOver={(e) => {
                            if (isReadOnly) return;
                            e.preventDefault();
                            e.currentTarget.classList.add('brightness-95', 'border-l-4', 'border-l-brand-primary');
                          }}
                          onDragLeave={(e) => {
                            e.currentTarget.classList.remove('brightness-95', 'border-l-4', 'border-l-brand-primary');
                          }}
                          onDrop={(e) => {
                            if (isReadOnly) return;
                            e.preventDefault();
                            e.currentTarget.classList.remove('brightness-95', 'border-l-4', 'border-l-brand-primary');
                            const draggedId = e.dataTransfer.getData('taskId');
                            if (draggedId) {
                              const targetAssigneeId = group.user ? group.user.id : 'unassigned';
                              const draggedTask = tasks.find(t => t.id === draggedId);
                              if (draggedTask && draggedTask.assigneeId !== targetAssigneeId) {
                                const oldAssigneeName = users.find(u => u.id === draggedTask.assigneeId)?.name || '未指派';
                                const newAssigneeName = users.find(u => u.id === targetAssigneeId)?.name || '未指派';
                                const newHistory = [...(draggedTask.history || []), { date: getNow(), message: `透過進度表拖曳，將經手人由「${oldAssigneeName}」變更為「${newAssigneeName}」` }];
                                
                                const newTasks = tasks.map(t => t.id === draggedId ? { ...t, assigneeId: targetAssigneeId, history: newHistory } : t);
                                updateTasks(newTasks);
                              }
                            }
                          }}
                        >
                           <div className="w-72 flex-shrink-0 border-r border-gray-200 p-2 pl-4 sticky left-0 bg-gray-100 z-20 flex items-center gap-2 pointer-events-none">
                             {group.user ? <UserAvatar user={group.user} size="w-6 h-6" /> : <div className="w-6 h-6 rounded-full bg-gray-200 border border-gray-300 flex items-center justify-center text-gray-500"><User size={12}/></div>}
                             <span className="font-black text-sm text-brand-primary">{group.name} 的行事曆</span>
                             <span className="text-[10px] text-brand-primary font-bold bg-white px-1.5 py-0.5 rounded-full border border-brand-primary/20 ml-auto">{group.tasks.length} 任務</span>
                           </div>
                           <div className="flex relative pointer-events-none">
                             {ganttData.days.map((d, i) => {
                               const isToday = d.toISOString().split('T')[0] === getToday();
                               return <div key={i} className={`w-10 border-r border-gray-200/50 h-10 ${isToday ? 'bg-brand-warning/20' : [0,6].includes(d.getDay()) ? 'bg-gray-200/30' : ''}`} />
                             })}
                           </div>
                        </div>

                        {group.tasks.map(task => {
                          const isInteracting = ganttInteraction.active && ganttInteraction.taskId === task.id;
                          let displayStart = task.startDate;
                          let displayEnd = task.endDate;

                          if (isInteracting) {
                            const deltaDays = Math.round((ganttInteraction.currentX - ganttInteraction.startX) / 40);
                            const oS = new Date(ganttInteraction.originalStart + 'T00:00:00');
                            const oE = new Date(ganttInteraction.originalEnd + 'T00:00:00');
                            const pad = n => n.toString().padStart(2, '0');
                            const formatD = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

                            if (ganttInteraction.type === 'move') {
                              displayStart = formatD(new Date(oS.getTime() + deltaDays * 86400000));
                              displayEnd = formatD(new Date(oE.getTime() + deltaDays * 86400000));
                            } else if (ganttInteraction.type === 'resize') {
                              const newEnd = new Date(oE.getTime() + deltaDays * 86400000);
                              displayEnd = formatD(newEnd >= oS ? newEnd : oS);
                            }
                          }

                          const sD = new Date(displayStart + 'T00:00:00');
                          const eD = new Date(displayEnd + 'T00:00:00');
                          const duration = Math.max(1, (eD - sD) / 86400000 + 1);
                          const left = ((sD - ganttData.minD) / 86400000) * 40;

                          const markerColorInfo = MARKER_COLORS.find(c => c.id === task.colorId);
                          const bgColor = task.colorId ? markerColorInfo.stroke : (task.status === 'done' ? '#e5e7eb' : '#1f2937');
                          const textColor = task.colorId && ['warning', 'white'].includes(task.colorId) ? '#000' : (task.colorId ? '#fff' : (task.status === 'done' ? '#6b7280' : '#fff'));
                          const borderColor = task.colorId ? markerColorInfo.stroke : (task.status === 'done' ? '#d1d5db' : '#111827');

                          return (
                            <div 
                              key={task.id} 
                              className="flex border-b border-gray-100 group hover:bg-gray-50 transition-colors"
                            >
                              <div 
                                className="w-72 flex-shrink-0 border-r border-gray-200 p-3 sticky left-0 bg-white group-hover:bg-gray-50 z-20 shadow-[1px_0_0_0_#e5e7eb] flex flex-col justify-center relative cursor-move"
                                draggable={!isReadOnly}
                                onDragStart={(e) => {
                                  if (isReadOnly) return;
                                  e.dataTransfer.setData('taskId', task.id);
                                  e.dataTransfer.effectAllowed = 'move';
                                  setTimeout(() => e.target.classList.add('opacity-40', 'bg-gray-100'), 0);
                                }}
                                onDragEnd={(e) => {
                                  e.target.classList.remove('opacity-40', 'bg-gray-100');
                                }}
                                onDragOver={(e) => {
                                  if (isReadOnly) return;
                                  e.preventDefault();
                                  e.currentTarget.classList.add('border-t-2', 'border-t-brand-primary');
                                }}
                                onDragLeave={(e) => {
                                  e.currentTarget.classList.remove('border-t-2', 'border-t-brand-primary');
                                }}
                                onDrop={(e) => {
                                  if (isReadOnly) return;
                                  e.preventDefault();
                                  e.currentTarget.classList.remove('border-t-2', 'border-t-brand-primary');
                                  const draggedId = e.dataTransfer.getData('taskId');
                                  if (draggedId && draggedId !== task.id) {
                                     const newTasks = [...tasks];
                                     const dragIndex = newTasks.findIndex(t => t.id === draggedId);
                                     const dropIndex = newTasks.findIndex(t => t.id === task.id);
                                     if (dragIndex > -1 && dropIndex > -1) {
                                        const draggedTask = { ...newTasks[dragIndex] };
                                        const targetTask = newTasks[dropIndex];
                                        
                                        if (draggedTask.assigneeId !== targetTask.assigneeId) {
                                           const oldAssigneeName = users.find(u => u.id === draggedTask.assigneeId)?.name || '未指派';
                                           const newAssigneeName = users.find(u => u.id === targetTask.assigneeId)?.name || '未指派';
                                           draggedTask.history = [...(draggedTask.history || []), { date: getNow(), message: `透過進度表拖曳，將經手人由「${oldAssigneeName}」變更為「${newAssigneeName}」` }];
                                           draggedTask.assigneeId = targetTask.assigneeId;
                                        }

                                        newTasks.splice(dragIndex, 1);
                                        const adjustedDropIndex = dragIndex < dropIndex ? dropIndex - 1 : dropIndex;
                                        newTasks.splice(adjustedDropIndex, 0, draggedTask);
                                        updateTasks(newTasks);
                                     }
                                  }
                                }}
                              >
                                {!isReadOnly && (
                                  <button 
                                    onPointerDown={(e) => e.stopPropagation()}
                                    onClick={(e) => { e.stopPropagation(); updateTasks(tasks.filter(t => t.id !== task.id)); if (activeTaskId === task.id) setActiveTaskId(null); }} 
                                    className="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-white hover:bg-brand-danger rounded opacity-0 group-hover:opacity-100 transition-all shadow-sm bg-white border border-gray-200 z-30 cursor-pointer"
                                    title="刪除任務"
                                  >
                                    <Trash2 size={14} />
                                  </button>
                                )}

                                <div className="flex items-center gap-1.5 pr-8">
                                  {!isReadOnly && <GripVertical size={14} className="text-gray-300 flex-shrink-0" title="拖曳排序或變更負責人" />}
                                  <span className="text-sm font-bold cursor-pointer hover:underline flex items-center gap-1.5 truncate" onClick={() => jumpToBlueprintTask(task)}>
                                    <TaskIcon type={task.type} colorId={task.colorId} />
                                    <span className="truncate">{task.title}</span>
                                    {task.attachments && task.attachments.length > 0 && <ImageIcon size={12} className="text-gray-400 flex-shrink-0" />}
                                  </span>
                                </div>
                                <div className="flex items-center gap-2 mt-2 pl-7">
                                   <StatusBadge status={task.status} />
                                   {task.tagId && task.tagId !== 'none' && (
                                      <span className="text-[10px] font-bold text-brand-secondary bg-brand-secondary/10 px-1.5 py-0.5 rounded border border-brand-secondary/20 flex items-center gap-1">
                                         {tags.find(t => t.id === task.tagId)?.name}
                                      </span>
                                   )}
                                </div>
                              </div>
                              <div className="flex relative w-full overflow-hidden">
                                {ganttData.days.map((d, i) => {
                                  const isToday = d.toISOString().split('T')[0] === getToday();
                                  return <div key={i} className={`w-10 border-r border-gray-100 h-14 shrink-0 ${isToday ? 'bg-brand-warning/10' : [0,6].includes(d.getDay()) ? 'bg-gray-50/50' : ''}`} />
                                })}
                                
                                {/* 任務條本體 */}
                                <div 
                                   className={`absolute top-3 h-8 rounded shadow-sm flex items-center text-xs font-bold z-10 group/bar ${task.status === 'done' && !task.colorId ? 'opacity-60' : ''}`} 
                                   style={{ 
                                     left: left, 
                                     width: duration * 40,
                                     backgroundColor: bgColor,
                                     color: textColor,
                                     border: `1px solid ${borderColor}`,
                                     cursor: isReadOnly ? 'default' : (ganttInteraction.type === 'resize' && isInteracting ? 'ew-resize' : 'grab'),
                                     transition: isInteracting ? 'none' : 'all 0.2s ease-out'
                                   }}
                                   onPointerDown={(e) => {
                                     if (isReadOnly || e.button !== 0) return;
                                     e.preventDefault(); 
                                     e.stopPropagation();
                                     e.currentTarget.setPointerCapture(e.pointerId);
                                     
                                     const rect = e.currentTarget.getBoundingClientRect();
                                     const isRightEdge = e.clientX > rect.right - 15;
                                     
                                     setGanttInteraction({
                                       active: true,
                                       type: isRightEdge ? 'resize' : 'move',
                                       taskId: task.id,
                                       startX: e.clientX,
                                       currentX: e.clientX,
                                       originalStart: task.startDate,
                                       originalEnd: task.endDate
                                     });
                                   }}
                                   onPointerCancel={(e) => {
                                      if (ganttInteraction.active && ganttInteraction.taskId === task.id) {
                                         e.currentTarget.releasePointerCapture(e.pointerId);
                                         setGanttInteraction({ active: false, type: null, taskId: null, startX: 0, currentX: 0, originalStart: null, originalEnd: null });
                                      }
                                   }}
                                   onContextMenu={(e) => handleTaskContextMenu(e, task)}
                                >
                                   <span className="px-2 truncate pointer-events-none w-full select-none text-left">
                                     {duration >= 1 && task.title}
                                   </span>
                                   
                                   {!isReadOnly && (
                                     <div 
                                       className="absolute right-0 top-0 bottom-0 w-3.5 cursor-ew-resize opacity-0 group-hover/bar:opacity-100 flex items-center justify-center rounded-r transition-opacity hover:bg-black/20 z-20"
                                       title="拖曳拉伸結束日期"
                                     >
                                       <div className="w-[2px] h-3 border-l border-r border-white/50" />
                                     </div>
                                   )}
                                </div>
                              </div>
                            </div>
                          )
                        })}
                      </React.Fragment>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ================= ブループリントビュー (Blueprint View) ================= */}
            {appView === 'blueprint' && (
              <>
                {isSidebarVisible && (
                  <div className="w-80 lg:w-96 bg-gray-50 border-r border-gray-200 flex flex-col z-10 shrink-0 shadow-xl">
                    <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-white">
                      <span className="font-bold text-sm">圖面標記列表</span><span className="text-xs bg-gray-100 px-2 py-0.5 rounded-md font-bold border">可見 {filteredTasks.length} 件</span>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                      {filteredTasks.map(task => (
                        <div 
                          key={task.id} 
                          onClick={() => jumpToBlueprintTask(task)} 
                          draggable={!isReadOnly}
                          onDragStart={(e) => {
                            if (isReadOnly) return;
                            e.dataTransfer.setData('blueprintTaskId', task.id);
                            e.dataTransfer.effectAllowed = 'move';
                            setTimeout(() => e.target.classList.add('opacity-40', 'bg-gray-100'), 0);
                          }}
                          onDragEnd={(e) => {
                            e.target.classList.remove('opacity-40', 'bg-gray-100');
                          }}
                          onDragOver={(e) => {
                            if (isReadOnly) return;
                            e.preventDefault();
                            e.currentTarget.classList.add('border-t-4', 'border-t-brand-primary');
                          }}
                          onDragLeave={(e) => {
                            e.currentTarget.classList.remove('border-t-4', 'border-t-brand-primary');
                          }}
                          onDrop={(e) => {
                            if (isReadOnly) return;
                            e.preventDefault();
                            e.currentTarget.classList.remove('border-t-4', 'border-t-brand-primary');
                            const draggedId = e.dataTransfer.getData('blueprintTaskId');
                            if (draggedId && draggedId !== task.id) {
                               const newTasks = [...tasks];
                               const dragIndex = newTasks.findIndex(t => t.id === draggedId);
                               const dropIndex = newTasks.findIndex(t => t.id === task.id);
                               if (dragIndex > -1 && dropIndex > -1) {
                                  const [draggedItem] = newTasks.splice(dragIndex, 1);
                                  newTasks.splice(dropIndex, 0, draggedItem);
                                  updateTasks(newTasks);
                               }
                            }
                          }}
                          className={`bg-white p-4 rounded-lg border transition-all cursor-pointer group ${activeTaskId === task.id ? 'border-black shadow-md ring-1' : 'border-gray-200 shadow-sm'} ${task.page !== currentPage ? 'opacity-50' : ''}`}
                        >
                          <div className="flex justify-between items-start mb-2.5">
                            <div className="flex gap-2 items-center">
                              {!isReadOnly && <GripVertical size={14} className="text-gray-300 opacity-50 hover:opacity-100 cursor-grab" title="拖曳排序" />}
                              <StatusBadge status={task.status} />
                              <span className="text-[11px] font-bold text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded-sm border flex items-center gap-1"><FileText size={10} /> P.{task.page}</span>
                            </div>
                            <button onClick={(e) => { e.stopPropagation(); openEditModal(task); }} className="p-1 text-gray-400 hover:text-black opacity-0 group-hover:opacity-100 bg-gray-50 rounded transition-opacity"><Eye size={14} /></button>
                          </div>
                          <h3 className={`font-bold text-sm mb-1.5 flex items-center gap-2 ${activeTaskId === task.id ? 'text-black' : 'text-gray-800'}`}>
                            <TaskIcon type={task.type} colorId={task.colorId} /><span className="leading-snug">{task.type === 'stamp' && <span className="bg-gray-100 border px-1 rounded-sm text-[10px] mr-1">[{task.stampCode}]</span>}{task.title}</span>
                          </h3>
                          <p className="text-gray-500 text-xs line-clamp-2 mb-3">{task.description}</p>
                          <div className="flex items-center justify-between pt-3 border-t border-gray-100">
                            <div className="flex items-center gap-1.5">
                               <UserAvatar user={users.find(u => u.id === task.assigneeId)} />
                               <span className="text-[11px] text-gray-600 font-medium">{users.find(u => u.id === task.assigneeId)?.name || '未指派'}</span>
                            </div>
                            <div className="flex items-center gap-1.5">
                               {task.attachments && task.attachments.length > 0 && <ImageIcon size={12} className="text-gray-400" title="包含照片附件" />}
                               {task.tagId && task.tagId !== 'none' && (
                                  <span className="text-[10px] font-bold text-brand-secondary bg-brand-secondary/10 px-1.5 py-0.5 rounded border border-brand-secondary/20 flex items-center gap-1">
                                     <Tag size={10} /> {tags.find(t => t.id === task.tagId)?.name}
                                  </span>
                               )}
                            </div>
                          </div>
                        </div>
                      ))}
                      {filteredTasks.length === 0 && <div className="text-center text-gray-400 py-10 text-sm font-medium">目前的圖層/條件下沒有任何標記</div>}
                    </div>
                  </div>
                )}

                {/* iPad ホワイトアウト対策: touch-action: none を明示し、ネイティブジェスチャーをブロック */}
                <div 
                  ref={viewportRef} 
                  className={`flex-1 overflow-hidden relative bg-[#e5e7eb] touch-none ${isSpacePressed || isPanning ? 'cursor-grab active:cursor-grabbing' : ''}`} 
                  style={{ touchAction: 'none' }}
                  onPointerDown={(e)=>{ if(e.button!==2) handleViewportPointerDown(e); }} 
                  onPointerMove={handleViewportPointerMove} 
                  onPointerUp={handleViewportPointerUp} 
                  onPointerLeave={handleViewportPointerUp} 
                  onPointerCancel={handleViewportPointerUp} 
                  onContextMenu={e => e.preventDefault()}
                >
                  
                  {/* Toolbar */}
                  <div className="absolute z-20 flex flex-col items-center gap-2" style={{ top: '20px', left: '50%', transform: `translate(calc(-50% + ${toolbarPos.x}px), ${toolbarPos.y}px)` }}>
                    <div className="bg-white shadow-sm border border-gray-200 rounded-full px-2 py-1.5 flex items-center gap-1.5 pointer-events-auto">
                      <div className="cursor-grab text-gray-400 hover:text-black p-1 flex items-center" title="拖曳移動工具列" onPointerDown={(e) => { e.stopPropagation(); e.target.setPointerCapture(e.pointerId); setIsDraggingToolbar(true); setToolbarDragStart({ x: e.clientX - toolbarPos.x, y: e.clientY - toolbarPos.y }); }} onPointerMove={(e) => isDraggingToolbar && setToolbarPos({ x: e.clientX - toolbarDragStart.x, y: e.clientY - toolbarDragStart.y })} onPointerUp={() => setIsDraggingToolbar(false)}><GripVertical size={16} /></div>
                      <div className="w-px h-4 bg-gray-200" />
                      <button onClick={() => setIsSidebarVisible(!isSidebarVisible)} className="p-1.5 rounded-full text-gray-500 hover:bg-gray-100 hover:text-black" title={isSidebarVisible ? "隱藏側邊欄" : "顯示側邊欄"}>{isSidebarVisible ? <PanelLeftClose size={16} /> : <PanelLeft size={16} />}</button>
                      
                      {!isReadOnly && (
                        <>
                          <div className="w-px h-4 bg-gray-200" />
                          <button onClick={handleUndoAction} disabled={!pastTasks.length} className="p-1.5 rounded-full text-gray-500 hover:bg-gray-100 hover:text-black disabled:opacity-30 disabled:hover:bg-transparent" title="復原 (Ctrl+Z)"><Undo size={16} /></button>
                          <button onClick={handleRedoAction} disabled={!futureTasks.length} className="p-1.5 rounded-full text-gray-500 hover:bg-gray-100 hover:text-black disabled:opacity-30 disabled:hover:bg-transparent" title="重做 (Ctrl+Y)"><Redo size={16} /></button>
                        </>
                      )}

                      <div className="w-px h-4 bg-gray-200" />
                      <button onClick={(e) => { e.stopPropagation(); setShowLayerMenu(!showLayerMenu); setAddMode('none'); }} className={`p-1.5 rounded-full transition-colors flex items-center justify-center ${showLayerMenu ? 'bg-black text-white shadow-md' : 'text-gray-600 hover:bg-gray-100 hover:text-black'}`} title="圖層選單 (一鍵隱藏狀態/工種)"><Layers size={16} /></button>

                      {!isReadOnly && (
                        <>
                          <div className="w-px h-4 bg-gray-200" />
                          <input type="file" className="hidden" ref={fileInputRef} accept="image/*,application/pdf,.dxf" onChange={handleFileUpload} />
                          <button onClick={() => fileInputRef.current?.click()} className="p-1.5 rounded-full text-gray-600 hover:bg-gray-100 hover:text-black transition-colors" title="載入圖紙 (支援 DXF/PDF/圖片)"><Upload size={16} /></button>
                          
                          <div className="w-px h-4 bg-gray-200" />
                          <ToolbarBtn mode="pin" icon={MapPin} title="放置圖釘 (快捷鍵 1)" />
                          <ToolbarBtn mode="cloud" icon={Cloud} title="拖曳產生雲形 (快捷鍵 2)" />
                          <ToolbarBtn mode="highlight" icon={Highlighter} title="繪製螢光筆 (可選色) (快捷鍵 3)" />
                          <ToolbarBtn mode="pen" icon={PenLine} title="色筆一線標記 (可選色) (快捷鍵 4)" />
                          <ToolbarBtn mode="area" icon={Hexagon} title="多邊形面積測量 (點擊繪製頂點) (快捷鍵 5)" />
                          <ToolbarBtn mode="measure" icon={Ruler} title="兩點測量 (按住 Shift 正交鎖點) (快捷鍵 6)" />
                          <ToolbarBtn mode="calibrate" icon={Maximize} title="校正比例尺" />
                          <ToolbarBtn mode="stamp" icon={Stamp} title="套用印章" onClick={() => stamps.length ? setAddMode(addMode === 'stamp' ? 'none' : 'stamp') : alert("請先設定印章！")} />

                          <div className="w-px h-4 bg-gray-200" />
                          <button 
                            onClick={() => {
                              if (activeTaskId) {
                                updateTasks(prev => prev.filter(t => t.id !== activeTaskId));
                                setActiveTaskId(null);
                              }
                            }}
                            disabled={!activeTaskId}
                            className={`p-1.5 rounded-full transition-colors flex items-center justify-center ${activeTaskId ? 'text-brand-danger hover:bg-brand-danger/10 hover:text-brand-danger shadow-sm' : 'text-gray-300'}`}
                            title="刪除選取的標記 (Delete鍵)"
                          >
                            <Trash2 size={16} />
                          </button>
                        </>
                      )}
                    </div>
                    
                    {(addMode === 'highlight' || addMode === 'pen') && !isReadOnly && (
                      <div className="bg-white shadow-md border border-gray-200 rounded-full px-3 py-1.5 flex items-center gap-2 pointer-events-auto">
                        {MARKER_COLORS.map(c => (
                          <button key={c.id} onClick={(e) => { e.stopPropagation(); setActiveColor(c); }} className={`w-5 h-5 rounded-full border-2 transition-all ${activeColor.id === c.id ? 'scale-125 shadow-sm' : 'hover:scale-110'}`} style={{ backgroundColor: c.stroke, borderColor: activeColor.id === c.id ? '#000' : 'transparent' }} title={c.name} />
                        ))}
                      </div>
                    )}

                    {showLayerMenu && (
                      <div 
                        className="absolute top-full mt-3 left-1/2 -translate-x-1/2 bg-white rounded-xl shadow-2xl border border-gray-200 w-64 overflow-hidden pointer-events-auto cursor-default"
                        onPointerDown={e => e.stopPropagation()} 
                      >
                        <div className="px-4 py-3 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                          <span className="font-bold text-sm text-gray-800 flex items-center gap-2"><Layers size={16}/> 圖層與篩選</span>
                          <button onClick={() => setShowLayerMenu(false)} className="text-gray-400 hover:text-black transition-colors bg-white rounded shadow-sm p-1 border border-gray-200"><X size={14}/></button>
                        </div>
                        <div className="p-3 flex flex-col gap-4 max-h-[60vh] overflow-y-auto">
                          <div>
                            <div className="text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-wider px-1">依狀態顯示</div>
                            {Object.entries(STATUS_CONFIG).map(([k, c]) => (
                               <div key={k} className="flex items-center justify-between py-1.5 cursor-pointer hover:bg-gray-50 rounded px-1.5 transition-colors" onClick={() => toggleLayerStatus(k)}>
                                  <div className="flex items-center gap-2">
                                     <span className={`w-2.5 h-2.5 rounded-full ${c.color}`}></span>
                                     <span className="text-xs font-bold text-gray-700">{c.label}</span>
                                  </div>
                                  {layerVisibility.statuses[k] !== false ? <Eye size={16} className="text-gray-500" /> : <EyeOff size={16} className="text-gray-300" />}
                               </div>
                            ))}
                          </div>
                          <div className="w-full h-px bg-gray-100"></div>
                          <div>
                            <div className="text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-wider px-1 flex items-center justify-between">
                              <span>依工種 / 標籤顯示</span>
                              <button onClick={() => { setShowLayerMenu(false); setAppView('settings'); }} className="text-brand-secondary hover:underline">管理</button>
                            </div>
                            <div className="flex items-center justify-between py-1.5 cursor-pointer hover:bg-gray-50 rounded px-1.5 transition-colors" onClick={() => toggleLayerTag('none')}>
                               <div className="flex items-center gap-2">
                                  <Tag size={12} className="text-gray-400" />
                                  <span className="text-xs font-bold text-gray-700">無標籤</span>
                               </div>
                               {layerVisibility.tags['none'] !== false ? <Eye size={16} className="text-gray-500" /> : <EyeOff size={16} className="text-gray-300" />}
                            </div>
                            {tags.map(t => (
                               <div key={t.id} className="flex items-center justify-between py-1.5 cursor-pointer hover:bg-gray-50 rounded px-1.5 transition-colors" onClick={() => toggleLayerTag(t.id)}>
                                  <div className="flex items-center gap-2">
                                     <Tag size={12} className="text-brand-secondary" />
                                     <span className="text-xs font-bold text-gray-700">{t.name}</span>
                                  </div>
                                  {layerVisibility.tags[t.id] !== false ? <Eye size={16} className="text-gray-500" /> : <EyeOff size={16} className="text-gray-300" />}
                               </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* 視覺設定選單 (Image Filters) */}
                  <div className="absolute bottom-6 left-6 z-20 flex gap-2 pointer-events-auto">
                    <button 
                      onClick={() => setShowMinimap(!showMinimap)}
                      className={`p-2 rounded-lg border shadow-sm transition-colors flex items-center gap-1.5 ${showMinimap ? 'bg-brand-primary/10 border-brand-primary/20 text-brand-primary' : 'bg-white border-gray-200 hover:bg-gray-50 text-gray-500'}`}
                      title="切換鷹眼小地圖"
                    >
                      <MapIcon size={18} />
                    </button>
                    
                    <div className="relative">
                      <button 
                        onClick={() => setShowDisplaySettings(!showDisplaySettings)}
                        className={`p-2 rounded-lg border shadow-sm transition-colors flex items-center gap-1.5 ${showDisplaySettings ? 'bg-brand-secondary/10 border-brand-secondary/20 text-brand-secondary' : 'bg-white border-gray-200 hover:bg-gray-50 text-gray-500'}`}
                        title="調整圖面亮度/對比"
                      >
                        <SlidersHorizontal size={18} />
                      </button>

                      {showDisplaySettings && (
                        <div className="absolute bottom-full left-0 mb-2 bg-white border border-gray-200 shadow-xl rounded-lg p-4 w-64 text-sm font-bold">
                          <div className="flex items-center gap-2 mb-4 text-black"><Sun size={16}/> 圖面顯示設定</div>
                          <div className="space-y-4">
                            <div>
                              <div className="flex justify-between text-xs text-gray-500 mb-1"><span>亮度</span><span>{imageFilters.brightness}%</span></div>
                              <input type="range" min="50" max="200" value={imageFilters.brightness} onChange={e => setImageFilters({...imageFilters, brightness: e.target.value})} className="w-full accent-brand-secondary" />
                            </div>
                            <div>
                              <div className="flex justify-between text-xs text-gray-500 mb-1"><span>對比度</span><span>{imageFilters.contrast}%</span></div>
                              <input type="range" min="50" max="200" value={imageFilters.contrast} onChange={e => setImageFilters({...imageFilters, contrast: e.target.value})} className="w-full accent-brand-secondary" />
                            </div>
                            <div className="flex gap-2 pt-2 border-t border-gray-100">
                              <button onClick={()=>setImageFilters({...imageFilters, invert: !imageFilters.invert})} className={`flex-1 py-1.5 rounded text-xs border ${imageFilters.invert ? 'bg-gray-800 text-white border-gray-800' : 'bg-gray-50 text-gray-700 hover:bg-gray-100'}`}>負片反轉</button>
                              <button onClick={()=>setImageFilters({...imageFilters, grayscale: !imageFilters.grayscale})} className={`flex-1 py-1.5 rounded text-xs border ${imageFilters.grayscale ? 'bg-gray-400 text-white border-gray-400' : 'bg-gray-50 text-gray-700 hover:bg-gray-100'}`}>灰階模式</button>
                            </div>
                            <button onClick={()=>setImageFilters({brightness: 100, contrast: 100, invert: false, grayscale: false})} className="w-full py-1.5 text-xs text-gray-400 hover:text-black">重設為預設值</button>
                          </div>
                        </div>
                      )}
                    </div>
                    
                    <div className="bg-white shadow-sm border border-gray-200 rounded-lg px-3 py-2 flex items-center gap-2 pointer-events-auto h-[38px]">
                      <Maximize size={14} className={scaleInfo.isCalibrated ? "text-brand-primary" : "text-gray-500"} />
                      <div className={`text-xs font-bold ${scaleInfo.isCalibrated ? "text-brand-primary" : "text-gray-700"}`}>
                        {scaleInfo.isCalibrated ? `比例尺 1 : ${Math.round(scaleInfo.ratio)}` : "比例尺: 尚未校正 (1:1)"}
                      </div>
                      {scaleInfo.isCalibrated && !isReadOnly && (
                        <button onClick={() => setScaleInfo({ ratio: 1, unit: 'mm', isCalibrated: false })} className="ml-2 text-gray-400 hover:text-brand-danger bg-gray-100 hover:bg-brand-danger/10 rounded-full p-0.5 transition-colors" title="清除比例尺">
                          <X size={12} />
                        </button>
                      )}
                    </div>
                  </div>

                  {/* ミニマップ */}
                  {showMinimap && (
                    <div 
                      ref={minimapRef}
                      className="absolute bottom-20 left-6 z-20 w-48 h-[134px] bg-white shadow-xl border border-gray-300 rounded-lg overflow-hidden cursor-crosshair touch-none print:hidden pointer-events-auto"
                      onPointerDown={handleMinimapPointerDown}
                      onPointerMove={handleMinimapPointerMove}
                      onPointerUp={handleMinimapPointerUp}
                      onPointerCancel={handleMinimapPointerUp}
                      onPointerLeave={handleMinimapPointerUp}
                    >
                      {viewMode === 'pdf' ? (
                        <div className="w-full h-full bg-white flex flex-col items-center justify-center text-gray-300 border border-gray-100">
                            <FileText size={24} className="mb-1" />
                            <span className="text-[10px] font-bold">PDF 圖紙</span>
                        </div>
                      ) : backgroundImage ? (
                        <img src={backgroundImage} alt="Minimap" className="w-full h-full object-cover opacity-60 grayscale blur-[0.5px]" draggable={false} />
                      ) : (
                        <div className="w-full h-full bg-[#f8fafc]" style={{ backgroundImage: 'linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px)', backgroundSize: '12px 12px' }} />
                      )}
                      
                      <div 
                        className="absolute border-[1.5px] border-brand-primary bg-brand-primary/20 shadow-sm pointer-events-none transition-transform duration-75"
                        style={{
                          left: `${(-pan.x / (1200 * scale)) * 100}%`,
                          top: `${(-pan.y / (840 * scale)) * 100}%`,
                          width: `${(viewportSize.w / (1200 * scale)) * 100}%`,
                          height: `${(viewportSize.h / (840 * scale)) * 100}%`,
                          boxShadow: '0 0 0 9999px rgba(0,0,0,0.1)' 
                        }}
                      />
                    </div>
                  )}
                  
                  {viewMode === 'pdf' && totalPages > 1 && (
                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 bg-white shadow-sm rounded-full px-1.5 py-1.5 flex items-center gap-4 border border-gray-200">
                      <button onClick={() => setCurrentPage(p => Math.max(1, p - 1))} disabled={currentPage === 1} className="p-1.5 hover:bg-gray-100 disabled:opacity-30 rounded-full"><ChevronLeft size={16} /></button>
                      <span className="text-xs font-bold font-mono min-w-[80px] text-center">{currentPage} / {totalPages}</span>
                      <button onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages} className="p-1.5 hover:bg-gray-100 disabled:opacity-30 rounded-full"><ChevronRight size={16} /></button>
                    </div>
                  )}

                  <div className="absolute bottom-6 right-6 z-20 flex flex-col gap-1 bg-white shadow-sm border rounded-lg p-1.5 pointer-events-auto">
                    <button onClick={() => handleZoomStep(0.2)} className="p-1.5 hover:bg-gray-100 rounded text-gray-700"><Plus size={16} /></button>
                    <div className="w-full h-px bg-gray-100" />
                    <button onClick={resetView} className="p-1.5 hover:bg-gray-100 rounded text-[10px] font-bold">置中</button>
                    <div className="w-full h-px bg-gray-100" />
                    <button onClick={() => handleZoomStep(-0.2)} className="p-1.5 hover:bg-gray-100 rounded text-gray-700"><Minus size={16} /></button>
                  </div>

                  {/* iPad ホワイトアウト対策: 2D transform -> 3D transform に変更し、GPUアクセラレーションを有効化 */}
                  <div className="absolute origin-top-left pointer-events-none" style={{ transform: `translate3d(${pan.x}px, ${pan.y}px, 0) scale(${scale})`, width: '1200px' }}>
                    <div className={`relative inline-block w-full bg-white ${scale > 1.5 ? 'shadow-sm' : 'shadow-2xl'} ${!isSpacePressed && !isPanning && addMode !== 'none' ? 'cursor-crosshair' : ''}`} style={{ pointerEvents: isSpacePressed || isPanning ? 'none' : 'auto' }} onPointerDown={!isSpacePressed ? handleContentPointerDown : undefined} onPointerMove={!isSpacePressed ? handleContentPointerMove : undefined} onPointerUp={!isSpacePressed ? handleContentPointerUp : undefined} onPointerLeave={!isSpacePressed ? handleContentPointerUp : undefined} onPointerCancel={!isSpacePressed ? handleContentPointerUp : undefined}>
                      
                      {/* 圖面渲染，套用 Filters (ホワイトアウト対策: transition-all duration-200 を削除してズーム中の重い再計算を防止) */}
                      <div style={filterStyle} className="w-full">
                        {isRendering && viewMode === 'pdf' && <div className="absolute inset-0 z-40 bg-white/80 backdrop-blur-sm flex items-center justify-center"><Loader2 className="w-6 h-6 animate-spin mb-3 text-black" /></div>}
                        {viewMode === 'pdf' ? <canvas ref={canvasRef} className="w-full block bg-white" /> : backgroundImage ? <img src={backgroundImage} alt="BP" className="w-full block opacity-95 sepia hue-rotate-[190deg] saturate-200 contrast-125 brightness-90" draggable={false} /> : <div className="w-full bg-[#f8fafc]" style={{ height: '840px', backgroundImage: 'linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px)', backgroundSize: '40px 40px' }} />}
                      </div>

                      {/* 任務標記渲染 */}
                      {filteredTasks.filter(t => t.page === currentPage).map(task => {
                        const props = { key: task.id, task, isActive: activeTaskId === task.id, onClick: () => { if (addMode === 'none') setActiveTaskId(task.id); }, onContextMenu: (e) => handleTaskContextMenu(e, task) };
                        if (task.type === 'cloud') return <CloudMark {...props} />;
                        if (task.type === 'area') return <AreaMark {...props} />;
                        if (task.type === 'highlight') return <HighlightMark {...props} />;
                        if (task.type === 'pen') return <PenMark {...props} />;
                        if (task.type === 'stamp') return <StampMark {...props} />;
                        return <PinMark {...props} />;
                      })}

                      {/* 繪製中預覽 */}
                      {isDrawing && addMode === 'cloud' && drawStart && drawCurrent && <div className="absolute border-2 border-gray-800 border-dashed bg-black/5 z-40 pointer-events-none" style={{ left: `${Math.min(drawStart.x, drawCurrent.x)}%`, top: `${Math.min(drawStart.y, drawCurrent.y)}%`, width: `${Math.abs(drawCurrent.x - drawStart.x)}%`, height: `${Math.abs(drawCurrent.y - drawStart.y)}%` }} />}
                      
                      {isDrawing && (addMode === 'highlight' || addMode === 'pen') && drawPoints.length > 0 && (
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full pointer-events-none z-40">
                          <polyline points={drawPoints.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke={activeColor.stroke} strokeWidth={addMode === 'highlight' ? "12" : "4"} strokeLinecap="round" strokeLinejoin="round" opacity={addMode === 'highlight' ? "0.6" : "1"} vectorEffect="non-scaling-stroke" />
                        </svg>
                      )}
                      
                      {/* 面積測量「點選成形」的預覽視覺 */}
                      {isDrawing && addMode === 'area' && drawPoints.length > 0 && (
                        <div className="absolute inset-0 pointer-events-none z-40">
                          <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full" style={{ overflow: 'visible' }}>
                            <polygon 
                              points={[...drawPoints, drawCurrent].filter(Boolean).map(p => `${p.x},${p.y}`).join(' ')} 
                              fill="#0067a6" fillOpacity="0.2" stroke="#0067a6" strokeWidth="2" strokeDasharray="4,4" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" 
                            />
                            {/* 起點特別標示以提示如何閉合 */}
                            {drawPoints.length >= 3 && (
                               <circle cx={drawPoints[0].x} cy={drawPoints[0].y} r="0.8" fill="#f2572d" opacity="0.8" className="animate-pulse" vectorEffect="non-scaling-stroke" />
                            )}
                            {/* 其他端點圓點 */}
                            {drawPoints.map((p, i) => (
                               <circle key={i} cx={p.x} cy={p.y} r="0.4" fill="#0067a6" vectorEffect="non-scaling-stroke" />
                            ))}
                          </svg>
                          
                          {/* 動態顯示目前面積 */}
                          {drawPoints.length >= 2 && drawCurrent && (
                            <div 
                              className="absolute bg-brand-primary text-white text-[11px] font-bold px-2 py-1 rounded shadow-md transform -translate-x-1/2 -translate-y-full flex items-center gap-1 whitespace-nowrap"
                              style={{ left: `${drawCurrent.x}%`, top: `calc(${drawCurrent.y}% - 10px)` }}
                            >
                              {(() => {
                                const pts = [...drawPoints, drawCurrent];
                                let areaPx2 = 0;
                                for (let i = 0; i < pts.length; i++) {
                                    const j = (i + 1) % pts.length;
                                    areaPx2 += (pts[i].x * 12) * (pts[j].y * 12) - (pts[j].x * 12) * (pts[i].y * 12);
                                }
                                areaPx2 = Math.abs(areaPx2) / 2;
                                return formatArea(areaPx2, scaleInfo.ratio, scaleInfo.unit, scaleInfo.isCalibrated);
                              })()}
                            </div>
                          )}
                          
                          <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-black/70 text-white text-xs px-3 py-1.5 rounded-full whitespace-nowrap font-bold tracking-wider shadow-sm pointer-events-none">
                            點擊圖面新增頂點，點擊起點（紅點）即可完成測量
                          </div>
                        </div>
                      )}

                      {/* 面積測量結果顯示 (不新增任務) */}
                      {areaResult && !isDrawing && (
                        <div className="absolute inset-0 pointer-events-none z-40">
                          <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full" style={{ overflow: 'visible' }}>
                            <polygon points={areaResult.points.map(p => `${p.x},${p.y}`).join(' ')} fill="#0067a6" fillOpacity="0.2" stroke="#0067a6" strokeWidth="2" strokeDasharray="4,4" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />
                            {areaResult.points.map((p, i) => (
                               <circle key={i} cx={p.x} cy={p.y} r="0.4" fill="#0067a6" vectorEffect="non-scaling-stroke" />
                            ))}
                          </svg>
                          <div 
                            className="absolute bg-brand-primary text-white text-xs font-bold px-2 py-1 rounded shadow-md transform -translate-x-1/2 -translate-y-full flex items-center gap-1.5 whitespace-nowrap"
                            style={{ left: `${areaResult.points[areaResult.points.length-1].x}%`, top: `calc(${areaResult.points[areaResult.points.length-1].y}% - 10px)` }}
                          >
                            <Hexagon size={12} /> {areaResult.area}
                          </div>
                        </div>
                      )}

                      {isDrawing && (addMode === 'measure' || addMode === 'calibrate') && drawStart && drawCurrent && (
                        <div className="absolute inset-0 pointer-events-none z-40">
                          <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full" style={{ overflow: 'visible' }}>
                            <line x1={drawStart.x} y1={drawStart.y} x2={drawCurrent.x} y2={drawCurrent.y} stroke={addMode === 'calibrate' ? '#0067a6' : '#00abd8'} strokeWidth="2.5" strokeDasharray="6,6" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
                            <circle cx={drawStart.x} cy={drawStart.y} r="0.2" fill={addMode === 'calibrate' ? '#0067a6' : '#00abd8'} vectorEffect="non-scaling-stroke" />
