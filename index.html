      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    };

    const getNow = () => {
      const d = new Date();
      const pad = (n) => n.toString().padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    const formatArea = (areaPx2, ratio, unit, isCalibrated) => {
      let actualRatio = isCalibrated ? ratio : 1;
      let actualUnit = isCalibrated ? unit : 'mm';
      let area = areaPx2 * (actualRatio ** 2);
      
      if (actualUnit === 'mm') {
        if (area >= 1000000) return `${(area / 1000000).toFixed(2)} ㎡`;
        if (area >= 100) return `${(area / 100).toFixed(2)} c㎡`;
        return `${area.toFixed(1)} m㎡`;
      } else if (actualUnit === 'cm') {
        if (area >= 10000) return `${(area / 10000).toFixed(2)} ㎡`;
        return `${area.toFixed(1)} c㎡`;
      } else if (actualUnit === 'm') {
        return `${area.toFixed(2)} ㎡`;
      }
      return `${Math.round(area)} px²`;
    };

    const DB_NAME = 'drawing-tasker-pro';
    const DB_VERSION = 1;
    const DB_STORE = 'persist';

    const openDatabase = () => new Promise((resolve, reject) => {
      const request = window.indexedDB.open(DB_NAME, DB_VERSION);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(DB_STORE)) {
          db.createObjectStore(DB_STORE, { keyPath: 'key' });
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });

    const getPersistedData = async (key) => {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, 'readonly');
        const store = tx.objectStore(DB_STORE);
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result ? req.result.value : undefined);
        req.onerror = () => reject(req.error);
      });
    };

    const setPersistedData = async (key, value) => {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, 'readwrite');
        const store = tx.objectStore(DB_STORE);
        const req = store.put({ key, value });
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    };

        useEffect(() => {
          if (!ref.current) return;
          const observer = new ResizeObserver(entries => setSize({ w: entries[0].contentRect.width, h: entries[0].contentRect.height }));
          observer.observe(ref.current);
          return () => observer.disconnect();
        }, []);
        const getCloudPath = (w, h, inverted) => {
          if (w <= 0 || h <= 0) return "";
          const r = 10, step = r * 1.5;
          const sweep = inverted ? 1 : 0;
          let path = `M ${Math.min(r, w)} 0`;
          for (let x = Math.min(r, w); x < w; x += step) path += ` A ${r} ${r} 0 0 ${sweep} ${Math.min(x + step, w)} 0`;
          for (let y = 0; y < h; y += step) path += ` A ${r} ${r} 0 0 ${sweep} ${w} ${Math.min(y + step, h)}`;
          for (let x = w; x > 0; x -= step) path += ` A ${r} ${r} 0 0 ${sweep} ${Math.max(x - step, 0)} ${h}`;
          for (let y = h; y > 0; y -= step) {
             let ny = Math.max(y - step, 0);
             path += ny === 0 ? ` A ${r} ${r} 0 0 ${sweep} 0 0 A ${r} ${r} 0 0 ${sweep} ${Math.min(r, w)} 0` : ` A ${r} ${r} 0 0 ${sweep} 0 ${ny}`;

          return path;
        };

            const page = await pdf.getPage(pageNumber);
            let renderScale = 2.0;
            const unscaledViewport = page.getViewport({ scale: 1.0 });
            const maxArea = 16777000;
            const currentArea = unscaledViewport.width * unscaledViewport.height * renderScale * renderScale;
            if (currentArea > maxArea) {
               renderScale = Math.floor(Math.sqrt(maxArea / (unscaledViewport.width * unscaledViewport.height)) * 10) / 10;
            }
            const viewport = page.getViewport({ scale: renderScale });
            const ctx = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport }).promise;
          } catch (err) {

        dxfModel.entities.forEach(entity => {
          if (!entity || !entity.type) return;
          if (entity.type === 'LINE') {
            const pts = entity.vertices && entity.vertices.length === 2 ? entity.vertices : [entity.start, entity.end];
            if (pts && pts[0] && pts[1]) {
              pushLine(pts[0].x, pts[0].y, pts[1].x, pts[1].y);
            }
          } else if (entity.type === 'LWPOLYLINE' || entity.type === 'POLYLINE') {
            const vertices = entity.vertices || entity.vertices || [];
            for (let i = 1; i < vertices.length; i++) {
              const prev = vertices[i - 1];
              const curr = vertices[i];
              pushLine(prev.x, prev.y, curr.x, curr.y);
            }
            if (entity.shape || entity.closed) {
              const first = vertices[0];
              const last = vertices[vertices.length - 1];
              if (first && last) pushLine(last.x, last.y, first.x, first.y);
            }
          } else if (entity.type === 'POLYLINE' && entity.vertices) {
            const vertices = entity.vertices;
            for (let i = 1; i < vertices.length; i++) {
              const prev = vertices[i - 1];
              const curr = vertices[i];
              pushLine(prev.x, prev.y, curr.x, curr.y);
            }
            if (entity.closed) {
              const first = vertices[0];
              const last = vertices[vertices.length - 1];
              if (first && last) pushLine(last.x, last.y, first.x, first.y);

        const bbox = new Box3().setFromObject(lines);
        const size = bbox.getSize(new Vector3());

        const margin = 1.25;
        const aspect = rect.width / rect.height || 1;
        const maxDim = Math.max(size.x, size.y) || 1;
        const halfHeight = (maxDim * margin) / 2;
        const halfWidth = halfHeight * aspect;

        const camera = new OrthographicCamera(-halfWidth, halfWidth, halfHeight, -halfHeight, 0.1, 1000);
        camera.position.set(center.x, center.y, 100);
        camera.lookAt(center);
        camera.updateProjectionMatrix();

        const renderScene = () => renderer.render(scene, camera);

        const handleResize = () => {
          const bounds = container.getBoundingClientRect();

          // 如果只有一個點（點擊一下），自動補一個極微小偏移的點，讓 SVG polyline 能夠渲染出一個點
          const finalPoints = drawPoints.length === 1 
            ? [drawPoints[0], { x: drawPoints[0].x + 0.01, y: drawPoints[0].y }] 
            : drawPoints;

          if (pendingDrawing && pendingDrawing.mode === addMode && pendingDrawing.colorId === activeColor.id && pendingDrawing.page === currentPage) {
            setPendingDrawing(prev => ({ 
              ...prev, 
              paths: [...prev.paths, finalPoints] 
            }));
          } else {
            if (pendingDrawing) {
              createTaskFromPending();
            }
            setPendingDrawing({ 
              mode: addMode, 
              paths: [finalPoints], 
              colorId: activeColor.id, 
              page: currentPage, 
              baseData 
            });
          }
          try { e.currentTarget.releasePointerCapture(e.pointerId); } catch (err) {}
          setDrawPoints([]);
        }
      };

      // Custom Color Picker Handler
      const handleColorPick = (e) => {
        const hex = e.target.value;
        const newColorObj = { id: hex, stroke: hex, name: '自訂顏色', isEmpty: false };
        const newPalette = [...customPalette];
        newPalette[paletteReplaceIndex] = newColorObj;
        setCustomPalette(newPalette);
        setActiveColor(newColorObj);
        setPaletteReplaceIndex((paletteReplaceIndex + 1) % 7);
      };

      const handlePhotoUpload = (e) => {
        if (isReadOnly) return;
        const files = Array.from(e.target.files);
        if (!files.length) return;
        
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            setFormData(prev => ({
              ...prev,
              attachments: [...(prev.attachments || []), ev.target.result]
            }));
          };
          reader.readAsDataURL(file);
        });
      };

      const handleCommentChange = (e) => {
        const val = e.target.value;
        setCommentText(val);
        
        const cursorP = e.target.selectionStart;
        const textBeforeCursor = val.slice(0, cursorP);
        const match = textBeforeCursor.match(/@(\S*)$/);
        
        if (match) {
          setShowMentionPopup(true);
          setMentionFilter(match[1]);
        } else {
          setShowMentionPopup(false);
        }
      };

      const insertMention = (userName) => {
        const cursorP = commentInputRef.current.selectionStart;
        const textBeforeCursor = commentText.slice(0, cursorP);
        const textAfterCursor = commentText.slice(cursorP);
        
        const newTextBefore = textBeforeCursor.replace(/@\S*$/, `@${userName} `);
        setCommentText(newTextBefore + textAfterCursor);
        setShowMentionPopup(false);
        setTimeout(() => commentInputRef.current?.focus(), 0);
      };

      const handleAddComment = () => {
        if (!commentText.trim() || isReadOnly) return;
        const newComment = {
          id: `c_${Date.now()}`,
          userId: currentUserId,
          text: commentText.trim(),
          date: getNow()
        };
        setFormData(prev => ({
          ...prev,
          comments: [...(prev.comments || []), newComment]
        }));
        setCommentText('');
        setShowMentionPopup(false);
      };

      const renderCommentText = (text, isMe) => {
        const parts = text.split(/(@\S+)/g);
        return parts.map((part, i) => {
          if (part.startsWith('@')) {
            const name = part.slice(1);
            const isUser = users.some(u => u.name === name);
            if (isUser) {
              return (
                <span 
                  key={i} 
                  className={`font-bold px-1 rounded mx-0.5 ${isMe ? 'bg-white/25 text-white shadow-sm' : 'text-brand-secondary bg-brand-secondary/10 border border-brand-secondary/20'}`}
                >
                  {part}
                </span>
              );
            }
          }
          return <span key={i}>{part}</span>;
        });
      };

      const handleSaveTask = () => {
        if (isReadOnly || !formData.title.trim()) return;
        const safeData = { ...formData, endDate: new Date(formData.startDate) > new Date(formData.endDate) ? formData.startDate : formData.endDate };
        
        if (editingId) {
          const oldTask = tasks.find(t => t.id === editingId);
          let newHistory = [...(oldTask.history || [])];
          if (oldTask.status !== safeData.status) {
            newHistory.push({ date: getNow(), message: `狀態由「${STATUS_CONFIG[oldTask.status]?.label}」變更為「${STATUS_CONFIG[safeData.status]?.label}」` });
          }
          if (oldTask.assigneeId !== safeData.assigneeId) {
            const oldUser = users.find(u => u.id === oldTask.assigneeId)?.name || '未指派';
            const newUser = users.find(u => u.id === safeData.assigneeId)?.name || '未指派';
            newHistory.push({ date: getNow(), message: `經手人由「${oldUser}」變更為「${newUser}」` });
          }
          updateTasks(tasks.map(t => t.id === editingId ? { ...t, ...safeData, history: newHistory } : t));
        } else {
          const newTask = { id: Date.now().toString(), ...newTaskCoords, ...safeData, history: [{ date: getNow(), message: '任務建立' }] };
          updateTasks([...tasks, newTask]); setActiveTaskId(newTask.id);
        }
        setShowTaskModal(false);
        setCommentText('');
      };

      const openEditModal = (task) => {
        setFormData({ 
          type: task.type, colorId: task.colorId || 'warning', title: task.title, description: task.description, status: task.status, 
          startDate: task.startDate || getToday(), endDate: task.endDate || getToday(1), assigneeId: task.assigneeId || 'unassigned', 
          stampCode: task.stampCode || '', tagId: task.tagId || 'none', attachments: task.attachments || [], history: task.history || [], comments: task.comments || [], isLocked: task.isLocked !== undefined ? task.isLocked : true
        });
        setEditingId(task.id); setShowTaskModal(true);
        setCommentText('');
      };

      const jumpToBlueprintTask = (task) => {
        setAppView('blueprint'); if (task.page !== currentPage) setCurrentPage(task.page); setActiveTaskId(task.id);
        if (viewportRef.current) setPan({ x: (viewportRef.current.clientWidth / 2) - ((task.x / 100) * 1200 * scale), y: (viewportRef.current.clientHeight / 2) - ((task.y / 100) * 1200 * scale) });
      };

      const handleExportCSV = () => {
        if (filteredTasks.length === 0) return alert("目前沒有可匯出的任務資料！");
        const headers = ['任務名稱', '任務類型', '印章編號', '狀態', '工種/標籤', '經手人', '所在頁數', '開始日期', '結束日期', '照片數量', '詳細說明'];
        const rows = filteredTasks.map(task => [
          `"${task.title}"`, `"${task.type === 'stamp' ? '印章' : task.type === 'cloud' ? '雲形' : task.type === 'area' ? '面積' : task.type === 'highlight' ? '螢光筆' : task.type === 'pen' ? '色筆' : '圖釘'}"`, `"${task.stampCode || ''}"`,
          `"${STATUS_CONFIG[task.status].label}"`, `"${tags.find(t => t.id === task.tagId)?.name || '無標籤'}"`, `"${users.find(u => u.id === task.assigneeId)?.name || '未指派'}"`, `"${`P.${task.page}`}"`, `"${task.startDate}"`, `"${task.endDate}"`, `"${(task.attachments || []).length}"`, `"${String(task.description).replace(/"/g, '""')}"`
        ].join(','));
        const link = document.createElement('a');
        link.href = URL.createObjectURL(new Blob(['\uFEFF' + [headers.join(','), ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' }));
        link.download = `巡檢缺失報表_${getToday()}.csv`; link.click();
      };

      const handleExportBCF = async () => {
        if (!window.JSZip) {
          alert("BCF 引擎載入中，請稍後再試。");
          return;
        }
        if (filteredTasks.length === 0) {
          alert("目前沒有任務可匯出 BCF！");
          return;
        }

        const zip = new window.JSZip();
        
        // BCF version file
        zip.file('bcf.version', '2.1');

        // Process each task as a BCF issue
        filteredTasks.forEach(task => {
          const issueId = task.id;
          const issueFolder = zip.folder(issueId);
          
          // markup.bcf - Main issue data
          const markupXml = `<?xml version="1.0" encoding="UTF-8"?>
<Markup xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
  <Topic Guid="${issueId}" TopicType="Issue" TopicStatus="${task.status === 'done' ? 'Closed' : task.status === 'in-progress' ? 'Active' : 'Open'}">
    <Title>${task.title}</Title>
    <Description>${task.description || ''}</Description>
    <CreationDate>${new Date().toISOString()}</CreationDate>
    <ModifiedDate>${new Date().toISOString()}</ModifiedDate>
    <AssignedTo>${users.find(u => u.id === task.assigneeId)?.name || ''}</AssignedTo>
  </Topic>
</Markup>`;
          
          issueFolder.file('markup.bcf', markupXml);
          
          // viewpoint.bcf - Viewpoint data
          const viewpointXml = `<?xml version="1.0" encoding="UTF-8"?>
<ViewPoint xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
  <ViewPoint>
    <FieldOfView>45.0</FieldOfView>
  </ViewPoint>
  <Components>
    <Component>
      <OriginatingSystem>Blueprint Manager</OriginatingSystem>
    </Component>
  </Components>
</ViewPoint>`;
          
          issueFolder.file('viewpoint.bcf', viewpointXml);
        });

        // Generate and download ZIP file
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `project_issues_${getToday()}.bcfzip`;
        link.click();
      };

      const handleImportBCF = async (event) => {
        const file = event.target.files[0];
        if (!file || !file.name.toLowerCase().endsWith('.bcfzip')) {
          alert("請選擇有效的 BCF 檔案 (.bcfzip)！");
          return;
        }

        if (!window.JSZip) {
          alert("BCF 引擎載入中，請稍後再試。");
          return;
        }

        try {
          const zip = await window.JSZip.loadAsync(file);
          const importedTasks = [];

          // Process each issue folder
          for (const [path, zipEntry] of Object.entries(zip.files)) {
            if (zipEntry.dir && !path.includes('/')) {
              const issueId = path.replace('/', '');
              const issueFolder = zip.folder(path);
              
              // Read markup.bcf
              const markupFile = issueFolder.file('markup.bcf');
              if (markupFile) {
                const markupXml = await markupFile.async('text');
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(markupXml, 'text/xml');
                
                const topic = xmlDoc.querySelector('Topic');
                if (topic) {
                  const title = topic.querySelector('Title')?.textContent || 'Imported Issue';
                  const description = topic.querySelector('Description')?.textContent || '';
                  const status = topic.querySelector('TopicStatus')?.textContent;
                  
                  let taskStatus = 'todo';
                  if (status === 'Closed') taskStatus = 'done';
                  else if (status === 'Active') taskStatus = 'in-progress';
                  
                  const newTask = {
                    id: issueId,
                    type: 'pin',
                    title: title,
                    description: description,
                    status: taskStatus,
                    x: Math.random() * 50 + 25,
                    y: Math.random() * 50 + 25,
                    page: currentPage,
                    startDate: getToday(),
                    endDate: getToday(1),
                    assigneeId: 'unassigned',
                    tagId: 'none',
                    attachments: [],
                    history: [{ date: getNow(), message: '從 BCF 匯入' }],
                    comments: [],
                    isLocked: true
                  };
                  
                  importedTasks.push(newTask);
                }
              }
            }
          }

          if (importedTasks.length > 0) {
            updateTasks([...tasks, ...importedTasks]);
            alert(`成功匯入 ${importedTasks.length} 個任務！`);
          } else {
            alert("未找到有效的任務資料！");
          }
        } catch (error) {
          console.error('BCF import error:', error);
          alert("BCF 檔案匯入失敗：" + error.message);
        }
        
        // Reset file input
        event.target.value = '';
      };

      const handleExportGanttExcel = async () => {
        if (!window.ExcelJS) {
          alert("Excel 引擎載入中，請稍後再試。");
          return;
        }
        if (filteredTasks.length === 0) {
          alert("目前沒有任務可匯出！");
          return;
        }

        const workbook = new window.ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('專案進度表', {
          views: [{ state: 'frozen', xSplit: 3, ySplit: 3 }] 
        });

        const columns = [
          { width: 3 },  
          { width: 18 }, 
          { width: 35 }, 
        ];
        ganttData.days.forEach(() => columns.push({ width: 4.5 }));
        sheet.columns = columns;

        sheet.getCell('A1').value = `圖面任務進度表 (${getToday()})`;
        sheet.getCell('A1').font = { size: 14, bold: true };
        
        let currentMonth = -1;
        let monthStartCol = 4;
        ganttData.days.forEach((d, index) => {
          const colIdx = index + 4;
          if (d.getMonth() !== currentMonth) {
            if (currentMonth !== -1) {
               sheet.mergeCells(2, monthStartCol, 2, colIdx - 1);
               const cell = sheet.getCell(2, monthStartCol);
               cell.value = `${ganttData.days[monthStartCol-4].getFullYear()}年 ${currentMonth + 1}月`;
               cell.alignment = { horizontal: 'center', vertical: 'middle' };
            }
            currentMonth = d.getMonth();
            monthStartCol = colIdx;
          }
        });
        sheet.mergeCells(2, monthStartCol, 2, ganttData.days.length + 3);
        const lastMonthCell = sheet.getCell(2, monthStartCol);
        lastMonthCell.value = `${ganttData.days[monthStartCol-4].getFullYear()}年 ${currentMonth + 1}月`;
        lastMonthCell.alignment = { horizontal: 'center', vertical: 'middle' };

        sheet.getCell('B3').value = '分類 / 負責人';
        sheet.getCell('C3').value = '任務名稱';
        ganttData.days.forEach((d, index) => {
          const cell = sheet.getCell(3, index + 4);
          cell.value = d.getDate();
          cell.alignment = { horizontal: 'center' };
          if ([0, 6].includes(d.getDay())) {
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF3F4F6' } };
          }
        });

        sheet.getRow(2).font = { bold: true };
        sheet.getRow(3).font = { bold: true };
        sheet.getRow(3).border = { bottom: { style: 'thin', color: { argb: 'FF000000' } } };

        let currentRow = 4;
        ganttTasksByAssignee.forEach(group => {
          const groupRow = sheet.getRow(currentRow);
          groupRow.getCell(2).value = group.name;
          groupRow.font = { bold: true };
          groupRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF3F4F6' } };
          sheet.mergeCells(currentRow, 2, currentRow, 3);
          
          ganttData.days.forEach((d, index) => {
            if ([0, 6].includes(d.getDay())) {
               groupRow.getCell(index + 4).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF3F4F6' } };
            }
          });
          currentRow++;

          group.tasks.forEach(task => {
            const row = sheet.getRow(currentRow);
            row.getCell(3).value = task.title;

            const colorMap = {
              'todo': 'FFFAD1D1',
              'in-progress': 'FFFDF6B2',
              'done': 'FFDEF7EC'
            };
            const fillColor = colorMap[task.status] || 'FFEEEEEE';

            const sD = new Date(task.startDate + 'T00:00:00');
            const eD = new Date(task.endDate + 'T00:00:00');
            const durationDays = Math.round((eD - sD) / 86400000) + 1;
            
            let isFirstCell = true;
            ganttData.days.forEach((d, index) => {
              const colIdx = index + 4;
              const cell = row.getCell(colIdx);
              const dTime = d.getTime();

              if (dTime >= sD.getTime() && dTime <= eD.getTime()) {
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: fillColor } };
                if (isFirstCell) {
                  cell.value = ` ${STATUS_CONFIG[task.status]?.label} (${durationDays}天)`;
                  cell.font = { size: 9, color: { argb: 'FF555555' } };
                  isFirstCell = false;
                }
              } else if ([0, 6].includes(d.getDay())) {
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF9FAFB' } };
              }
            });

            currentRow++;
          });
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `專案進度表_${getToday()}.xlsx`;
        link.click();
      };

      const filteredTasks = useMemo(() => currentDisplayTasks.filter(task => {
        const matchSearch = [task.title, task.description, task.stampCode].some(val => val && val.toLowerCase().includes(filterQuery.toLowerCase()));
        const matchAssignee = filterAssignees.length === 0 || filterAssignees.includes(task.assigneeId);
        const matchPage = filterPage === 'all' || task.page.toString() === filterPage;
        const matchStatus = layerVisibility.statuses[task.status] !== false;
        const matchTag = task.tagId ? layerVisibility.tags[task.tagId] !== false : layerVisibility.tags['none'] !== false;
        const matchLayerAssignee = layerVisibility.assignees[task.assigneeId] !== false; 
        return matchSearch && matchAssignee && matchPage && matchStatus && matchTag && matchLayerAssignee;
      }), [currentDisplayTasks, filterQuery, filterAssignees, filterPage, layerVisibility]);

      const ganttTasksByAssignee = useMemo(() => {
        const groups = {
          unassigned: { name: '未指派', tasks: [], user: null }
        };
        users.forEach(u => { groups[u.id] = { name: u.name, user: u, tasks: [] }; });
        
        filteredTasks.forEach(t => {
          if (groups[t.assigneeId]) {
            groups[t.assigneeId].tasks.push(t);
          } else {
            groups['unassigned'].tasks.push(t);
          }
        });

        Object.values(groups).forEach(g => {
          g.tasks.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
        });

        return Object.values(groups).filter(g => g.tasks.length > 0);
      }, [filteredTasks, users]);

      const ganttData = useMemo(() => {
        let minD = new Date(projectStartDate + 'T00:00:00');
        let maxD = new Date(projectEndDate + 'T00:00:00');
        
        if (isNaN(minD.getTime())) minD = new Date();
        if (isNaN(maxD.getTime())) maxD = new Date(minD.getTime() + 86400000 * 30);

        filteredTasks.forEach(t => { 
          const s = new Date(t.startDate + 'T00:00:00'); 
          const e = new Date(t.endDate + 'T00:00:00'); 
          if (s < minD) minD = s; 
          if (e > maxD) maxD = e; 
        });

        if (maxD < minD) maxD = new Date(minD.getTime() + 86400000);

        const totalDays = Math.ceil((maxD - minD) / 86400000) + 1;
        const days = Array.from({length: totalDays}, (_, i) => new Date(minD.getTime() + i * 86400000));
        
        return { minD, maxD, totalDays, days };
      }, [filteredTasks, projectStartDate, projectEndDate]);

      const filterStyle = {
        filter: `brightness(${imageFilters.brightness}%) contrast(${imageFilters.contrast}%) ${imageFilters.invert ? 'invert(100%) hue-rotate(180deg)' : ''} ${imageFilters.grayscale ? 'grayscale(100%)' : ''}`
      };

      const handleTaskContextMenu = (e, task) => {
        if (isReadOnly) return;
        e.preventDefault();
        e.stopPropagation();
        setContextMenu({ x: e.clientX, y: e.clientY, task });
        setActiveTaskId(task.id);
      };

      const changeTaskStatus = (taskId, newStatus) => {
        const task = tasks.find(t => t.id === taskId);
        if (task && task.status !== newStatus) {
           const newHistory = [...(task.history || []), { date: getNow(), message: `透過快速選單將狀態變更為「${STATUS_CONFIG[newStatus]?.label}」` }];
           updateTasks(tasks.map(t => t.id === taskId ? { ...t, status: newStatus, history: newHistory } : t)); 
        }
        setContextMenu(null);
      };

      const NavButton = ({ view, icon: Icon, label }) => (
        <button 
          onClick={() => setAppView(view)} 
          title={label} 
          className={`p-2 rounded-lg transition-all flex items-center justify-center ${appView === view ? 'bg-white text-brand-primary shadow-sm border border-gray-200' : 'text-gray-500 hover:text-gray-900 hover:bg-gray-200/50 border border-transparent'}`}
        >
          <Icon size={20} />
        </button>
      );

      const ToolbarBtn = ({ mode, icon: Icon, title, onClick }) => (
        <button onClick={onClick || (() => { if (isDrawing) return; setAddMode(addMode === mode ? 'none' : mode); })} className={`flex items-center justify-center p-2 rounded-full transition-colors ${(mode === 'select' ? addMode === 'none' : addMode === mode) ? 'bg-black text-white shadow-md' : 'text-gray-600 hover:bg-gray-100 hover:text-black'}`} title={title}><Icon size={16} /></button>
      );

      useEffect(() => {
        if (appView === 'gantt' && ganttScrollRef.current && ganttData.days.length > 0) {
          const timer = setTimeout(() => {
            if (!ganttScrollRef.current) return;
            const todayStr = getToday();
            const todayDate = new Date(todayStr + 'T00:00:00');
            const minD = ganttData.minD;
            
            const daysDiff = Math.floor((todayDate - minD) / 86400000);
            
            if (daysDiff >= 0 && daysDiff < ganttData.totalDays) {
               const scrollContainer = ganttScrollRef.current;
               const leftSidebarWidth = 288;
               const dayWidth = 40; 
               
               const targetX = leftSidebarWidth + (daysDiff * dayWidth) + (dayWidth / 2);
               const scrollLeft = targetX - (scrollContainer.clientWidth / 2);
               
               scrollContainer.scrollTo({
                 left: Math.max(0, scrollLeft),
                 behavior: 'smooth'
               });
            }
          }, 100);
          return () => clearTimeout(timer);
        }
      }, [appView, ganttData]);

      return (
        <div className="flex flex-col h-screen w-full bg-white font-sans overflow-hidden text-gray-900 selection:bg-gray-200 relative">
          
          {isShiftPressedUI && appView === 'blueprint' && addMode !== 'none' && !isReadOnly && (
            <div className="absolute top-24 left-1/2 -translate-x-1/2 z-50 pointer-events-none mt-4">
              <div className="bg-brand-primary text-white text-xs px-3 py-1.5 rounded-full shadow-lg font-bold tracking-wider animate-pulse flex items-center gap-1.5">
                🔒 鎖點模式啟動 (正交 / 網格)
              </div>
            </div>
          )}

          {showConfirmNew && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/40 backdrop-blur-sm">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 overflow-hidden">
                <div className="p-6">
                  <h3 className="text-lg font-black flex items-center gap-2 text-brand-danger mb-3">
                    <AlertTriangle size={20} /> {LANGUAGES[language].confirmNewTitle}
                  </h3>
                  <p className="text-sm text-gray-600 mb-6 leading-relaxed">
                    {LANGUAGES[language].confirmNewMessage}
                  </p>
                  <div className="flex justify-end gap-3">
                    <button onClick={() => setShowConfirmNew(false)} className="px-4 py-2 text-sm font-bold text-gray-700 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                      {LANGUAGES[language].cancel}
                    </button>
                    <button 
                      onClick={() => {
                        setTasks([]);
                        setSnapshots([]);
                        setPastTasks([]);
                        setFutureTasks([]);
                        setActiveTaskId(null);
                        setMeasureResult(null);
                        setScaleInfo({ ratio: 1, unit: 'mm', isCalibrated: false });
                        setActiveSnapshotId(null);
                        setImageFilters({ brightness: 100, contrast: 100, invert: false, grayscale: false });
                        setBackgroundImage(null);

                    <select value={currentUserId} onChange={e => setCurrentUserId(e.target.value)} className="bg-transparent border-none text-xs font-bold outline-none cursor-pointer text-gray-800">

                  </div>

                <div className="flex items-center gap-4 ml-auto">
                  <div className="relative">
                    <button

                      <span>
                        {language === 'zh' ? '中文' : language === 'ja' ? '日本語' : 'EN'}
                      </span>
                      <ChevronDown size={14} className={`transition-transform ${showLanguageMenu ? 'rotate-180' : ''}`} />
                    </button>

                    {showLanguageMenu && (
                      <div className="absolute top-full right-0 mt-1 w-24 bg-white border border-gray-200 shadow-lg rounded-lg py-1 z-50">
                        <button
                          onClick={(e) => { e.stopPropagation(); setLanguage('zh'); setShowLanguageMenu(false); }}
                          className={`w-full text-left px-3 py-2 text-sm hover:bg-gray-100 transition-colors ${language === 'zh' ? 'bg-brand-primary/10 text-brand-primary font-bold' : 'text-gray-700'}`}
                        >
                          中文
                        </button>
                        <button
                          onClick={(e) => { e.stopPropagation(); setLanguage('ja'); setShowLanguageMenu(false); }}
                          className={`w-full text-left px-3 py-2 text-sm hover:bg-gray-100 transition-colors ${language === 'ja' ? 'bg-brand-primary/10 text-brand-primary font-bold' : 'text-gray-700'}`}
                        >
                          日本語
                        </button>
                        <button
                          onClick={(e) => { e.stopPropagation(); setLanguage('en'); setShowLanguageMenu(false); }}
                          className={`w-full text-left px-3 py-2 text-sm hover:bg-gray-100 transition-colors ${language === 'en' ? 'bg-brand-primary/10 text-brand-primary font-bold' : 'text-gray-700'}`}

                        </button>
                      </div>

                      <div className="relative w-40">

                      </div>
                      
                      <div className="relative">
                        <button

                          <span className="truncate pr-2 select-none">
                            {filterAssignees.length === 0 ? '所有人員' : `已篩選 ${filterAssignees.length} 人`}
                          </span>
                          <ChevronDown className="h-3 w-3 text-gray-400 flex-shrink-0" />
                        </button>
                        
                        {showAssigneeFilter && (
                          <div 
                            className="absolute top-full right-0 mt-1.5 w-56 bg-white border border-gray-200 shadow-xl rounded-lg p-2 z-50 max-h-64 overflow-y-auto"

                              <input type="checkbox" checked={filterAssignees.length === 0} readOnly className="rounded text-brand-primary focus:ring-brand-primary w-4 h-4 cursor-pointer" />

                            </div>
                            <div className="w-full h-px bg-gray-100 my-1"></div>
                            <div 
                              className="flex items-center gap-2 px-2 py-1.5 hover:bg-gray-50 rounded cursor-pointer transition-colors"
                              onClick={() => {
                                if (filterAssignees.includes('unassigned')) setFilterAssignees(filterAssignees.filter(id => id !== 'unassigned'));
                                else setFilterAssignees([...filterAssignees, 'unassigned']);
                              }}
                            >
                              <input type="checkbox" checked={filterAssignees.includes('unassigned')} readOnly className="rounded text-brand-primary focus:ring-brand-primary w-4 h-4 cursor-pointer" />
                              <span className="text-sm font-medium text-gray-600">{LANGUAGES[language].unassignedTasks}</span>
                            </div>
                            {users.map(u => (
                              <div 
                                key={u.id}
                                className="flex items-center gap-2 px-2 py-1.5 hover:bg-gray-50 rounded cursor-pointer transition-colors"
                                onClick={() => {
                                  if (filterAssignees.includes(u.id)) setFilterAssignees(filterAssignees.filter(id => id !== u.id));
                                  else setFilterAssignees([...filterAssignees, u.id]);
                                }}
                              >
                                <input type="checkbox" checked={filterAssignees.includes(u.id)} readOnly className="rounded text-brand-primary focus:ring-brand-primary w-4 h-4 cursor-pointer" />
                                <div className="flex items-center gap-2 truncate">
                                  <UserAvatar user={u} size="w-5 h-5" />
                                  <span className="text-sm font-medium text-gray-700 truncate">{u.name}</span>
                                </div>
                              </div>
                            ))}
                          </div>

                        <select value={filterPage} onChange={e => setFilterPage(e.target.value)} className="pl-8 pr-6 py-1.5 bg-gray-50 border border-gray-200 rounded-md text-sm focus:border-black outline-none text-gray-700 font-medium appearance-none cursor-pointer transition-all">
                          <option value="all">所有頁面</option>{Array.from({length: totalPages}, (_, i) => i + 1).map(p => <option key={p} value={p}>第 {p} 頁</option>)}

                        <FileText className="absolute left-2.5 top-2 h-4 w-4 text-gray-400 pointer-events-none" /><ChevronDown className="absolute right-2 top-2.5 h-3 w-3 text-gray-400 pointer-events-none" />
                      </div>
                    </div>
                  )}
                </div>
              </div>

              <div className="px-6 py-2 bg-gray-50 border-b border-gray-200 flex items-center justify-start gap-2 overflow-x-auto min-h-[48px]">

                <NavButton view="gantt" icon={BarChartHorizontal} label={LANGUAGES[language].navGantt} />
                <NavButton view="snapshots" icon={Camera} label={LANGUAGES[language].navSnapshots} />

                  title={LANGUAGES[language].exportPDF}

                </button>
                <button 
                  onClick={handleExportCSV} 
                  className="p-2 rounded-lg transition-all flex items-center justify-center text-gray-600 hover:text-black hover:bg-gray-200/50 border border-transparent" 
                  title={LANGUAGES[language].exportCSV}
                >
                  <Download size={20} />
                </button>
                <button 
                  onClick={handleExportBCF} 
                  className="p-2 rounded-lg transition-all flex items-center justify-center text-gray-600 hover:text-black hover:bg-gray-200/50 border border-transparent"

                >
                  <FileText size={20} />
                </button>

                  <input type="file" accept=".bcfzip" onChange={handleImportBCF} className="hidden" />
                </label>

                  <RefreshCw size={20} />
                </button>
                
                <button 
                  onClick={handleExportProject} 
                  className="p-2 rounded-lg transition-all flex items-center justify-center text-brand-secondary bg-brand-secondary/10 hover:bg-brand-secondary/20 border border-brand-secondary/20 shadow-sm ml-1"

                >
                  <FolderDown size={20} />
                </button>
                
                <input type="file" className="hidden" ref={projectInputRef} accept=".json" onChange={handleImportProject} />

                  onClick={() => projectInputRef.current?.click()} 
                  className="p-2 rounded-lg transition-all flex items-center justify-center text-gray-600 hover:text-black hover:bg-gray-200/50 border border-transparent" 
                  title={LANGUAGES[language].importProject}
                >
                  <FolderUp size={20} />
                </button>
              </div>
            </header>
          )}

          {isReadOnly && (
            <div className="bg-brand-warning text-[#4a3904] px-6 py-2 flex justify-between items-center z-40 shadow-sm font-bold text-sm shrink-0 border-b border-brand-warningDark">
              <div className="flex items-center gap-2">
                <AlertTriangle size={16} />
                {LANGUAGES[language].readOnlyNotice.replace('{name}', snapshots.find(s => s.id === activeSnapshotId)?.name)}
              </div>
              <button onClick={() => setActiveSnapshotId(null)} className="bg-white/80 hover:bg-white px-4 py-1 rounded shadow-sm transition-colors text-black text-xs uppercase tracking-wider">

              </button>
            </div>

          {contextMenu && !isReadOnly && (
            <div 
              className="fixed z-50 bg-white border border-gray-200 shadow-xl rounded-lg py-1.5 w-44 text-sm overflow-hidden"

              onContextMenu={e => e.preventDefault()}

              <div className="px-3 py-1.5 text-xs font-bold text-gray-400 border-b border-gray-100 mb-1 truncate">{contextMenu.task.title}</div>
              
              <div className="px-3 py-1 flex flex-wrap gap-1.5 border-b border-gray-100 pb-2 mb-1">
                <button 
                  onClick={() => { updateTasks(tasks.map(t => t.id === contextMenu.task.id ? { ...t, colorId: null } : t)); setContextMenu(null); }}
                  className={`w-6 h-6 rounded-full border-2 text-[10px] flex items-center justify-center font-bold transition-all bg-gray-100 text-gray-500 hover:bg-gray-200 ${!contextMenu.task.colorId ? 'border-gray-500 shadow-sm scale-110' : 'border-transparent hover:scale-110'}`}
                  title={LANGUAGES[language].defaultColorByStatus}
                >
                  <RefreshCw size={12} />
                </button>
                {MARKER_COLORS.map(c => (
                  <button 
                    key={c.id} 
                    onClick={() => { updateTasks(tasks.map(t => t.id === contextMenu.task.id ? { ...t, colorId: c.id } : t)); setContextMenu(null); }}
                    className={`w-6 h-6 rounded-full border-2 transition-transform ${contextMenu.task.colorId === c.id ? 'scale-110 shadow-sm border-black' : 'border-transparent hover:scale-110'}`}
                    style={{ backgroundColor: c.stroke }}
                    title={c.name}
                  />
                ))}
                {customPalette.filter(c => !c.isEmpty).map((c, idx) => (
                  <button 
                    key={`${c.id}-${idx}`} 
                    onClick={() => { updateTasks(tasks.map(t => t.id === contextMenu.task.id ? { ...t, colorId: c.id } : t)); setContextMenu(null); }}
                    className={`w-6 h-6 rounded-full border-2 transition-transform ${contextMenu.task.colorId === c.id ? 'scale-110 shadow-sm border-black' : 'border-transparent hover:scale-110'}`}

                    title={c.name}
                  />

              <button onClick={() => { 
                  updateTasks(tasks.map(t => t.id === contextMenu.task.id ? { ...t, isLocked: !t.isLocked } : t));

                  {contextMenu.task.isLocked ? <><Unlock size={14} className="text-gray-500" /> {LANGUAGES[language].unlockPosition}</> : <><Lock size={14} className="text-brand-danger" /> {LANGUAGES[language].lockPosition}</>}
              </button>

              <button onClick={() => { changeTaskStatus(contextMenu.task.id, 'in-progress'); }} className="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-brand-warning"></div> {LANGUAGES[language].setInProgress}</button>
              <button onClick={() => { changeTaskStatus(contextMenu.task.id, 'done'); }} className="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center gap-2 border-b border-gray-100"><div className="w-2 h-2 rounded-full bg-brand-success"></div> {LANGUAGES[language].setDone}</button>
              <button onClick={() => { setContextMenu(null); openEditModal(contextMenu.task); }} className="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center gap-2 text-brand-secondary"><Edit3 size={14} /> {LANGUAGES[language].editDetails}</button>

            </div>
          )}

          <div className="flex-1 flex overflow-hidden relative bg-white">
            
            {appView === 'snapshots' && (
              <div className="flex-1 p-8 overflow-auto bg-gray-50">

                  <div className="bg-white rounded-lg border border-gray-200 p-8 shadow-sm">

                     <p className="text-sm text-gray-500 mb-8 pb-6 border-b border-gray-100">{LANGUAGES[language].snapshotsDesc}</p>
                     
                     <div className="bg-brand-secondary/10 p-5 rounded-lg border border-brand-secondary/20 mb-8 flex gap-3 items-end shadow-sm">
                       <div className="flex-1">
                         <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">{LANGUAGES[language].newSnapshotLabel}</label>
                         <input type="text" placeholder={`例如：${getToday()} 複驗版`} className={INPUT_CLASS} value={newSnapshotName} onChange={e => setNewSnapshotName(e.target.value)} />
                       </div>
                       <button 
                         onClick={() => { 
                           const newSnap = { id: `snap_${Date.now()}`, name: newSnapshotName || `${getToday()} 版本`, date: getToday(), tasks: JSON.parse(JSON.stringify(tasks)) };
                           setSnapshots([newSnap, ...snapshots]); 
                           setNewSnapshotName(''); 
                         }} 
                         className="bg-brand-primary text-white px-5 py-2 rounded-md text-sm font-bold hover:opacity-90 transition-colors h-[38px] flex items-center gap-2 shadow-sm"
                       >
                         <Save size={16} /> {LANGUAGES[language].saveSnapshot}
                       </button>
                     </div>

                     <div className="space-y-3">
                       <h3 className="text-sm font-bold text-gray-800 mb-3">{LANGUAGES[language].savedSnapshots}</h3>

                           <div className="flex flex-col">
                             <div className="flex items-center gap-2 mb-1">
                                <Camera size={14} className={activeSnapshotId === snap.id ? 'text-brand-primary' : 'text-gray-400'} />
                                <span className={`font-bold text-base ${activeSnapshotId === snap.id ? 'text-brand-primary' : 'text-black'}`}>{snap.name}</span>
                                <span className="text-xs text-gray-400 font-mono ml-2">{snap.date}</span>
                                {activeSnapshotId === snap.id && <span className="text-[10px] bg-brand-primary text-white px-1.5 py-0.5 rounded ml-2 font-bold tracking-wider">{LANGUAGES[language].viewing}</span>}
                             </div>
                             <div className="flex gap-3 text-xs font-bold mt-2">
                                <span className="text-brand-danger bg-brand-danger/10 px-2 py-0.5 rounded">待辦: {snap.tasks.filter(t=>t.status==='todo').length}</span>
                                <span className="text-brand-warningDark bg-brand-warning/20 px-2 py-0.5 rounded">進行中: {snap.tasks.filter(t=>t.status==='in-progress').length}</span>
                                <span className="text-brand-success bg-brand-success/10 px-2 py-0.5 rounded">已完成: {snap.tasks.filter(t=>t.status==='done').length}</span>
                             </div>
                           </div>
                           <div className="flex items-center gap-2">
                             <button 
                               onClick={() => { setActiveSnapshotId(snap.id); setAppView('blueprint'); }}

                             >
                               <Eye size={14} /> {LANGUAGES[language].previewBlueprint}
                             </button>
                             <button onClick={() => setSnapshots(snapshots.filter(s => s.id !== snap.id))} className="p-1.5 text-gray-400 hover:text-brand-danger hover:bg-brand-danger/10 rounded transition-colors" title={LANGUAGES[language].deleteSnapshot}>
                               <Trash2 size={16} />
                             </button>
                           </div>
                         </div>
                       ))}
                       {snapshots.length === 0 && <div className="text-center text-gray-400 py-8 text-sm border border-dashed border-gray-300 rounded-lg">{LANGUAGES[language].noSnapshots}</div>}

                </div>
              </div>

              <div className="flex-1 p-8 overflow-auto">

                     <h2 className="text-xl font-bold mb-2 flex items-center gap-2 text-black"><Tag size={20} className="text-brand-secondary" /> {LANGUAGES[language].tagManagementTitle}</h2>
                     <p className="text-sm text-gray-500 mb-8 pb-6 border-b border-gray-100">{LANGUAGES[language].tagManagementDesc}</p>
                     <div className="bg-gray-50 p-5 rounded-lg border border-gray-200 mb-8 shadow-sm flex gap-3">

                       <button onClick={() => { setTags([...tags, { id: `tg_${Date.now()}`, name: newTagForm.name }]); setNewTagForm({name:''}); }} disabled={isReadOnly || !newTagForm.name.trim()} className="bg-black text-white px-5 rounded-md text-sm font-bold hover:bg-gray-800 disabled:opacity-50">{LANGUAGES[language].addTag}</button>

                     <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                       {tags.map(tag => (
                         <div key={tag.id} className="flex items-center justify-between p-3 border border-gray-200 rounded-lg hover:bg-gray-50 group">

                       ))}
                       {tags.length === 0 && <div className="col-span-full text-center text-gray-400 py-4 text-sm bg-gray-50 border border-dashed rounded-lg">{LANGUAGES[language].noTags}</div>}

                  </div>

                       <input type="text" placeholder={LANGUAGES[language].avatarPlaceholder} className={`${INPUT_CLASS} flex-1`} value={newUserForm.avatar} onChange={e => setNewUserForm({...newUserForm, avatar: e.target.value})} disabled={isReadOnly}/>

                         </div>
                       ))}
                     </div>
                  </div>
                  
                  <div className="bg-white rounded-lg border border-gray-200 p-8 shadow-sm">

                       <p>進階版新增了以下功能以提升效率：</p>
                       <ul className="list-disc pl-5 space-y-2 mt-4 font-medium">
                         <li><strong>全新配色：</strong> 已套用您指定的客製化品牌色調（深藍、淺藍、碧綠、銘黃、橘紅）。</li>
                         <li><strong>快捷鍵：</strong> 在圖面檢視時，按下 <code>1</code>~<code>6</code> 可以快速切換不同的繪圖工具。</li>
                         <li><strong>右鍵選單：</strong> 在圖面的標記上點擊右鍵，可以直接更改任務狀態或刪除。</li>
                         <li><strong>本地備份：</strong> 點擊下方選單「備份專案」，可以將目前所有設定與標記打包存入您的電腦。</li>
                         <li><strong>顯示濾鏡：</strong> 點擊右下角設定圖示，可調整底圖亮度與對比。</li>
                       </ul>
                     </div>
                  </div>
                </div>
              </div>

                               {(task.type === 'highlight' || task.type === 'pen') && (task.paths || task.points) && (

                            </div>

                              const markerName = task.colorId && task.colorId.startsWith('#') ? '自訂' : (MARKER_COLORS.find(c => c.id === task.colorId)?.name || '預設');
                              const markerStroke = task.colorId && task.colorId.startsWith('#') ? task.colorId : (MARKER_COLORS.find(c => c.id === task.colorId)?.stroke || '#efc028');

                                     <div className="text-gray-600 text-xs leading-relaxed mt-1">{task.description || '-'}</div>
                                     {task.type === 'area' && task.area && <div className="text-xs font-bold text-brand-primary mt-1 bg-brand-primary/10 w-fit px-1 rounded">面積: {task.area}</div>}
                                     {(task.type === 'highlight' || task.type === 'pen') && (
                                       <div className="text-[10px] font-bold text-gray-500 mt-1 flex items-center gap-1">
                                          <span className="w-2 h-2 rounded-full inline-block" style={{ backgroundColor: markerStroke }}></span>
                                          {task.type === 'highlight' ? '螢光筆' : '色筆'} ({markerName})
                                       </div>
                                     )}
                                     {task.type === 'stamp' && <div className="text-[10px] font-bold text-gray-500 mt-1 font-mono">印章代碼: [{task.stampCode}]</div>}
                                  </td>
                                  <td className="p-3"><StatusBadge status={task.status} /></td>
                                  <td className="p-3">
                                     {task.tagId && task.tagId !== 'none' ? (
                                       <span className="text-[11px] font-bold text-brand-secondary bg-brand-secondary/10 px-1.5 py-0.5 rounded border border-brand-secondary/20 flex items-center gap-1 w-fit">
                                          <Tag size={10} /> {tags.find(t => t.id === task.tagId)?.name || '未分類'}
                                       </span>
                                     ) : <span className="text-gray-400 text-xs">-</span>}
                                  </td>
                                  <td className="p-3 font-bold text-gray-700 text-sm">{users.find(u => u.id === task.assigneeId)?.name || '未指派'}</td>
                               </tr>
                            )})
                          )}
                       </tbody>
                    </table>
                  </div>

                      <div className="grid grid-cols-2 gap-6">
                        {filteredTasks.filter(t => t.page === currentPage && t.attachments && t.attachments.length > 0).map((task) => {
                          const taskIndex = filteredTasks.filter(t => t.page === currentPage).findIndex(x => x.id === task.id) + 1;
                          return (
                            <div key={`photo_${task.id}`} className="border border-gray-300 rounded-lg p-4 bg-white break-inside-avoid shadow-sm">
                              <div className="font-bold text-sm text-gray-800 mb-3 border-b border-gray-100 pb-2 flex items-center">
                                 <span className="bg-brand-danger text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-black mr-2 shrink-0">{taskIndex}</span>

                              </div>
                              <div className="grid grid-cols-2 gap-2">

                                  <div key={i} className="aspect-square rounded border border-gray-200 overflow-hidden bg-gray-50 flex items-center justify-center">
                                    <img src={src} alt={`照片附件 ${i+1}`} className="w-full h-full object-cover" />
                                  </div>
                                ))}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                </div>
              </div>
            )}

              <div className="flex-1 flex gap-6 p-8 overflow-x-auto bg-gray-100">

                    e.preventDefault(); 
                    const tId = e.dataTransfer.getData('taskId'); 
                    if (tId) {
                      const task = tasks.find(t => t.id === tId);
                      if (task && task.status !== statusKey) {
                        const newHistory = [...(task.history || []), { date: getNow(), message: `狀態由「${STATUS_CONFIG[task.status]?.label}」變更為「${STATUS_CONFIG[statusKey]?.label}」` }];
                        updateTasks(tasks.map(t => t.id === tId ? { ...t, status: statusKey, history: newHistory } : t)); 
                      }
                    }
                  }}>

                          </div>
                          <h4 className="font-bold text-sm mb-1.5 flex items-start gap-1.5 leading-snug"><TaskIcon type={task.type} colorId={task.colorId} className="mt-0.5" /><span>{task.type === 'stamp' && <span className="bg-gray-100 border px-1 text-[10px] mr-1 rounded-sm">[{task.stampCode}]</span>}{task.title}</span></h4>

                            <button onClick={() => jumpToBlueprintTask(task)} className="text-[11px] font-bold border px-2 py-1 rounded hover:bg-gray-50 flex items-center gap-1"><ExternalLink size={12}/>{LANGUAGES[language].viewBlueprint}</button>
                          </div>
                        </div>
                      ))}
                      {!isReadOnly && <button onClick={() => { setAppView('blueprint'); setAddMode('pin'); }} className="w-full py-2.5 flex items-center justify-center gap-2 text-sm text-gray-500 bg-white hover:bg-gray-50 border border-dashed border-gray-300 rounded-lg font-bold transition-colors"><Plus size={16} /> {LANGUAGES[language].addTask}</button>}
                    </div>
                  </div>
                ))}
              </div>
            )}

                     <div className="flex items-center gap-1 bg-gray-100 rounded-lg p-1">

                       <button onClick={() => { const d = new Date(calendarMonth); d.setMonth(d.getMonth() + 1); setCalendarMonth(d); }} className="p-1.5 hover:bg-white rounded shadow-sm transition-all"><ChevronRight size={16}/></button>
                     </div>

                       const year = calendarMonth.getFullYear();
                       const month = calendarMonth.getMonth();
                       const firstDay = new Date(year, month, 1);
                       const startDate = new Date(firstDay);
                       startDate.setDate(startDate.getDate() - startDate.getDay());
                       const days = [];
                       
                       for(let i=0; i<42; i++) {
                         const current = new Date(startDate);
                         current.setDate(startDate.getDate() + i);
                         const pad = n => n.toString().padStart(2,'0');
                         const dateStr = `${current.getFullYear()}-${pad(current.getMonth()+1)}-${pad(current.getDate())}`;
                         const isCurrentMonth = current.getMonth() === month;
                         const isToday = dateStr === getToday();
                         const dayTasks = filteredTasks.filter(t => t.startDate <= dateStr && t.endDate >= dateStr);
                         
                         days.push(
                           <div 
                             key={dateStr} 
                             className={`bg-white min-h-[100px] flex flex-col transition-colors hover:bg-gray-50 ${!isCurrentMonth ? 'bg-gray-50/50 opacity-60' : ''} ${isToday ? 'bg-brand-secondary/5 border-[1.5px] border-brand-secondary' : ''}`}
                             onDragOver={(e) => {
                               if (isReadOnly) return;
                               e.preventDefault();
                               e.currentTarget.classList.add('bg-brand-secondary/10');
                             }}
                             onDragLeave={(e) => {
                               e.currentTarget.classList.remove('bg-brand-secondary/10');
                             }}
                             onDrop={(e) => {
                               if (isReadOnly) return;
                               e.preventDefault();
                               e.currentTarget.classList.remove('bg-brand-secondary/10');
                               const taskId = e.dataTransfer.getData('calendarTaskId');
                               if (taskId) {
                                  const task = tasks.find(t => t.id === taskId);
                                  if (task && task.startDate !== dateStr) {
                                    const oldStart = new Date(task.startDate + 'T00:00:00');
                                    const oldEnd = new Date(task.endDate + 'T00:00:00');
                                    const durationDays = Math.round((oldEnd - oldStart) / 86400000);
                                    
                                    const newStart = new Date(dateStr + 'T00:00:00');
                                    const newEnd = new Date(newStart.getTime() + durationDays * 86400000);
                                    
                                    const formatD = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
                                    
                                    const newHistory = [...(task.history || []), { date: getNow(), message: `透過日曆將開始日期由 ${task.startDate} 改為 ${formatD(newStart)}` }];
                                    updateTasks(tasks.map(t => t.id === taskId ? { ...t, startDate: formatD(newStart), endDate: formatD(newEnd), history: newHistory } : t));
                                  }
                               }
                             }}
                           >
                             <div className="text-right p-1.5 pointer-events-none">
                               <span className={`inline-block w-6 h-6 text-center leading-6 text-xs font-bold rounded-full ${isToday ? 'bg-brand-primary text-white shadow-sm' : 'text-gray-600'}`}>{current.getDate()}</span>
                             </div>
                             <div className="flex-1 px-1 pb-1 space-y-1 overflow-y-auto">
                               {dayTasks.map(task => (
                                 <div 
                                   key={task.id} 
                                   draggable={!isReadOnly}
                                   onDragStart={(e) => {
                                     if (isReadOnly) return;
                                     e.dataTransfer.setData('calendarTaskId', task.id);
                                     e.dataTransfer.effectAllowed = 'move';
                                     setTimeout(() => e.target.classList.add('opacity-50'), 0);
                                   }}
                                   onDragEnd={(e) => {
                                     e.target.classList.remove('opacity-50');
                                   }}
                                   onClick={(e) => { e.stopPropagation(); openEditModal(task); }}
                                   className={`text-[10px] px-1.5 py-0.5 rounded cursor-grab active:cursor-grabbing truncate transition-all hover:brightness-95 text-white shadow-sm ${STATUS_CONFIG[task.status].color}`}
                                   title={task.title}
                                 >
                                   {task.startDate !== dateStr && <span className="opacity-50 mr-1">►</span>}
                                   {task.title}
                                 </div>
                               ))}
                             </div>
                           </div>
                         );
                       }
                       return days;
                    })()}
                  </div>
                </div>
              </div>
            )}

            {appView === 'gantt' && (
              <div 
                ref={ganttScrollRef} 
                className="flex-1 bg-gray-50 p-8 overflow-auto flex flex-col gap-4"
                onPointerMove={(e) => {
                  if (ganttInteraction.active) {
                    setGanttInteraction(prev => ({ ...prev, currentX: e.clientX }));
                  }
                }}
                onPointerUp={(e) => {
                  if (ganttInteraction.active) {
                    const dx = e.clientX - ganttInteraction.startX;
                    const deltaDays = Math.round(dx / 40);
                    const task = tasks.find(t => t.id === ganttInteraction.taskId);
                    if (task) {
                      if (deltaDays !== 0) {
                        const oldStart = new Date(ganttInteraction.originalStart + 'T00:00:00');
                        const oldEnd = new Date(ganttInteraction.originalEnd + 'T00:00:00');
                        const pad = n => n.toString().padStart(2, '0');
                        const formatD = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

                        if (ganttInteraction.type === 'move') {
                          const newStart = new Date(oldStart.getTime() + deltaDays * 86400000);
                          const newEnd = new Date(oldEnd.getTime() + deltaDays * 86400000);
                          const newHistory = [...(task.history || []), { date: getNow(), message: `透過進度表拖曳，日期改為 ${formatD(newStart)} ~ ${formatD(newEnd)}` }];
                          updateTasks(tasks.map(t => t.id === task.id ? { ...t, startDate: formatD(newStart), endDate: formatD(newEnd), history: newHistory } : t));
                        } else if (ganttInteraction.type === 'resize') {
                          const newEnd = new Date(oldEnd.getTime() + deltaDays * 86400000);
                          if (newEnd >= oldStart) {
                            const newHistory = [...(task.history || []), { date: getNow(), message: `透過進度表拉伸，結束日期改為 ${formatD(newEnd)}` }];
                            updateTasks(tasks.map(t => t.id === task.id ? { ...t, endDate: formatD(newEnd), history: newHistory } : t));
                          }
                        }
                      } else {
                        openEditModal(task);
                      }
                    }
                    setGanttInteraction({ active: false, type: null, taskId: null, startX: 0, currentX: 0, originalStart: null, originalEnd: null });
                  }
                }}
                onPointerLeave={(e) => {
                  if (ganttInteraction.active) {
                     setGanttInteraction({ active: false, type: null, taskId: null, startX: 0, currentX: 0, originalStart: null, originalEnd: null });
                  }
                }}
              >
                <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex items-center justify-between shrink-0 sticky left-0 z-40 w-max min-w-full">
                   <div className="flex items-center gap-6">
                     <div className="flex items-center gap-2">
                        <span className="font-bold text-sm text-gray-700 flex items-center gap-1.5"><Clock size={16} className="text-brand-secondary"/> {LANGUAGES[language].projectDuration}</span>
                        <input type="date" value={projectStartDate} onChange={e => setProjectStartDate(e.target.value)} className="px-3 py-1.5 border border-gray-300 rounded focus:border-brand-primary focus:ring-1 focus:ring-brand-primary outline-none text-sm font-medium transition-all" />
                        <span className="text-gray-500 font-bold">~</span>
                        <input type="date" value={projectEndDate} onChange={e => setProjectEndDate(e.target.value)} className="px-3 py-1.5 border border-gray-300 rounded focus:border-brand-primary focus:ring-1 focus:ring-brand-primary outline-none text-sm font-medium transition-all" />
                     </div>
                     <div className="flex flex-col gap-2">
                     <div className="text-xs text-gray-500 flex items-center gap-1.5">
                        <AlertTriangle size={14} className="text-brand-warning" />
                        若任務時間超出此設定範圍，圖表將自動向外延伸以確保所有任務可見。
                     </div>
                     <div className="text-xs text-blue-700 font-semibold flex items-center gap-2">
                        <span className="inline-flex w-2 h-2 rounded-full bg-blue-600" />
                        依賴線已顯示於任務條上方，從前置任務右側連到後置任務左側。
                     </div>
                     {ganttLinkSourceTaskId && (
                       <div className="text-xs text-blue-700 flex items-center gap-2">
                         <span className="inline-flex w-2 h-2 rounded-full bg-blue-600" />
                         已選擇前置任務 {ganttLinkSourceTaskId}，請點選後置任務完成連結。
                       </div>
                     )}
                   </div>
                   </div>
                   
                   <button 
                     onClick={handleExportGanttExcel} 
                     className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-md text-sm font-bold shadow-sm hover:bg-green-700 transition-colors ml-4"
                   >
                     <FileSpreadsheet size={16} /> {LANGUAGES[language].exportExcel}
                   </button>
                </div>

                <div ref={ganttContainerRef} className="border border-gray-200 rounded-lg shadow-sm min-w-max flex-1 bg-white relative">
                  <svg className="absolute inset-0 pointer-events-none" style={{ zIndex: 15 }}>
                    <defs>
                      <marker id="gantt-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
                        <path d="M0,0 L10,5 L0,10" fill="#1d4ed8" />
                      </marker>
                    </defs>
                    {ganttDependencyLines.map(line => (
                      <path key={line.id} d={line.path} fill="none" stroke="#1d4ed8" strokeWidth="3" strokeDasharray="6 4" markerEnd="url(#gantt-arrow)" strokeLinecap="round" strokeLinejoin="round" opacity="0.95" />
                    ))}
                  </svg>
                  <div className="flex border-b border-gray-200 sticky top-0 bg-gray-50 z-30">
                    <div className="w-72 flex-shrink-0 border-r border-gray-200 p-4 font-bold text-sm sticky left-0 bg-gray-50 z-40">{LANGUAGES[language].taskList}</div>
                    <div className="flex">
                      {ganttData.days.map((d, i) => {
                        const isToday = d.toISOString().split('T')[0] === getToday();
                        return (
                          <div key={i} className={`w-10 border-r border-gray-200 p-2 flex flex-col items-center ${isToday ? 'bg-brand-warning/20' : [0,6].includes(d.getDay()) ? 'bg-gray-100/50' : ''}`}>
                            <span className={`text-[10px] ${isToday ? 'text-brand-warningDark font-bold' : 'text-gray-400'}`}>{d.getMonth() + 1}月</span>
                            <span className={`text-xs font-bold ${isToday ? 'bg-brand-warning text-white rounded-full w-5 h-5 flex items-center justify-center mt-0.5' : ''}`}>{d.getDate()}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                  <div className="flex flex-col relative z-10">
                    {filteredTasks.length === 0 && <div className="p-8 text-center text-sm font-bold text-gray-400 sticky left-0">{LANGUAGES[language].noFilteredTasks}</div>}
                    
                    {ganttTasksByAssignee.map(group => (
                      <React.Fragment key={group.name}>
                        <div 
                          className="flex bg-gray-100/80 border-b border-gray-200 transition-all"
                          onDragOver={(e) => {
                            if (isReadOnly) return;
                            e.preventDefault();
                            e.currentTarget.classList.add('brightness-95', 'border-l-4', 'border-l-brand-primary');
                          }}
                          onDragLeave={(e) => {
                            e.currentTarget.classList.remove('brightness-95', 'border-l-4', 'border-l-brand-primary');
                          }}
                          onDrop={(e) => {
                            if (isReadOnly) return;
                            e.preventDefault();
                            e.currentTarget.classList.remove('brightness-95', 'border-l-4', 'border-l-brand-primary');
                            const draggedId = e.dataTransfer.getData('taskId');
                            if (draggedId) {
                              const targetAssigneeId = group.user ? group.user.id : 'unassigned';
                              const draggedTask = tasks.find(t => t.id === draggedId);
                              if (draggedTask && draggedTask.assigneeId !== targetAssigneeId) {
                                const oldAssigneeName = users.find(u => u.id === draggedTask.assigneeId)?.name || '未指派';
                                const newAssigneeName = users.find(u => u.id === targetAssigneeId)?.name || '未指派';
                                const newHistory = [...(draggedTask.history || []), { date: getNow(), message: `透過進度表拖曳，將經手人由「${oldAssigneeName}」變更為「${newAssigneeName}」` }];
                                
                                const newTasks = tasks.map(t => t.id === draggedId ? { ...t, assigneeId: targetAssigneeId, history: newHistory } : t);
                                updateTasks(newTasks);
                              }
                            }
                          }}
                        >
                           <div className="w-72 flex-shrink-0 border-r border-gray-200 p-2 pl-4 sticky left-0 bg-gray-100 z-20 flex items-center gap-2 pointer-events-none">
                             {group.user ? <UserAvatar user={group.user} size="w-6 h-6" /> : <div className="w-6 h-6 rounded-full bg-gray-200 border border-gray-300 flex items-center justify-center text-gray-500"><User size={12}/></div>}
                             <span className="font-black text-sm text-brand-primary">{group.name}{LANGUAGES[language].calendar}</span>
                             <span className="text-[10px] text-brand-primary font-bold bg-white px-1.5 py-0.5 rounded-full border border-brand-primary/20 ml-auto">{group.tasks.length} {LANGUAGES[language].tasks}</span>
                           </div>
                           <div className="flex relative pointer-events-none">
                             {ganttData.days.map((d, i) => {
                               const isToday = d.toISOString().split('T')[0] === getToday();
                               return <div key={i} className={`w-10 border-r border-gray-200/50 h-10 ${isToday ? 'bg-brand-warning/20' : [0,6].includes(d.getDay()) ? 'bg-gray-200/30' : ''}`} />
                             })}
                           </div>
                        </div>

                        {group.tasks.map(task => {
                          const isInteracting = ganttInteraction.active && ganttInteraction.taskId === task.id;
                          let displayStart = task.startDate;
                          let displayEnd = task.endDate;

                          if (isInteracting) {
                            const deltaDays = Math.round((ganttInteraction.currentX - ganttInteraction.startX) / 40);
                            const oS = new Date(ganttInteraction.originalStart + 'T00:00:00');
                            const oE = new Date(ganttInteraction.originalEnd + 'T00:00:00');
                            const pad = n => n.toString().padStart(2, '0');
                            const formatD = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

                            if (ganttInteraction.type === 'move') {
                              displayStart = formatD(new Date(oS.getTime() + deltaDays * 86400000));
                              displayEnd = formatD(new Date(oE.getTime() + deltaDays * 86400000));
                            } else if (ganttInteraction.type === 'resize') {
                              const newEnd = new Date(oE.getTime() + deltaDays * 86400000);
                              displayEnd = formatD(newEnd >= oS ? newEnd : oS);
                            }
                          }

                          const sD = new Date(displayStart + 'T00:00:00');
                          const eD = new Date(displayEnd + 'T00:00:00');
                          const duration = Math.max(1, (eD - sD) / 86400000 + 1);
                          const left = ((sD - ganttData.minD) / 86400000) * 40;

                          const markerColorInfo = MARKER_COLORS.find(c => c.id === task.colorId);
                          const bgColor = task.colorId ? (markerColorInfo?.stroke || task.colorId) : (task.status === 'done' ? '#e5e7eb' : '#1f2937');
                          const textColor = task.colorId && ['warning', 'white'].includes(task.colorId) ? '#000' : (task.colorId ? '#fff' : (task.status === 'done' ? '#6b7280' : '#fff'));
                          const borderColor = task.colorId ? (markerColorInfo?.stroke || task.colorId) : (task.status === 'done' ? '#d1d5db' : '#111827');

                          return (
                            <div 
                              key={task.id} 
                              className="flex border-b border-gray-100 group hover:bg-gray-50 transition-colors"
                            >
                              <div 
                                className="w-72 flex-shrink-0 border-r border-gray-200 p-3 sticky left-0 bg-white group-hover:bg-gray-50 z-20 shadow-[1px_0_0_0_#e5e7eb] flex flex-col justify-center relative cursor-move"
                                draggable={!isReadOnly}
                                onDragStart={(e) => {
                                  if (isReadOnly) return;
                                  e.dataTransfer.setData('taskId', task.id);
                                  e.dataTransfer.effectAllowed = 'move';
                                  setTimeout(() => e.target.classList.add('opacity-40', 'bg-gray-100'), 0);
                                }}
                                onDragEnd={(e) => {
                                  e.target.classList.remove('opacity-40', 'bg-gray-100');
                                }}
                                onDragOver={(e) => {
                                  if (isReadOnly) return;
                                  e.preventDefault();
